<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="google-site-verification" content="VYruh3znNDFAefM5Rn82etwaMrQLV0m2JvXM7-8HHUw" />   
    <meta name="description" content="ICE TROCAS - Plataforma oficial de trocas.">
    <title>ICE TROCAS - Oficial</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        :root { --bg: #0d1117; --sea: #0f3452; --blue: #1877f2; --gold: #FFD700; --white: #fff; --green: #25d366; --red: #ff4d4d; --mod-blue: #00BFFF; --gray: #30363d; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); color: white; padding-bottom: 90px; overflow-x: hidden; }
        
        /* LOGIN */
        #telaLogin { position: fixed; inset: 0; background: var(--sea); z-index: 5000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: white; padding: 30px; border-radius: 20px; width: 85%; max-width: 350px; text-align: center; color: black; }
        .login-box input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }

        /* NOTIFICAÇÕES (TOAST) */
        #notification-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; width: 90%; max-width: 400px; pointer-events: none; }
        .toast { background: #1c2128; border-left: 4px solid var(--blue); color: white; padding: 15px; border-radius: 10px; margin-bottom: 10px; animation: slideIn 0.4s ease; pointer-events: auto; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        @keyframes slideIn { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* HEADER E ÍCONES */
        header { padding: 15px; background: #161b22; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #30363d; position: sticky; top: 0; z-index: 100; }
        .perfil-icon-container { position: relative; cursor: pointer; }
        .notificacao-balao { position: absolute; top: -5px; right: -5px; background: var(--red); width: 12px; height: 12px; border-radius: 50%; border: 2px solid #161b22; display: none; }

        /* BADGES */
        .badge-star { font-size: 14px; display: flex; gap: 4px; align-items: center; margin-bottom: 5px; }
        .star-mod { color: var(--mod-blue); }
        .star-adm2 { color: var(--red); }
        .star-adm1 { color: var(--gold); }

        /* BOTÕES FLUTUANTES */
        .side-menu { position: fixed; right: 15px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 10px; z-index: 4000; }
        .btn-float { width: 42px; height: 42px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; color: white; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.4); font-size: 16px; }

        /* FEED E CARDS */
        .card-timeline { background: #161b22; border-radius: 15px; overflow: hidden; margin: 15px; border: 1px solid #30363d; position: relative; }
        .card-timeline img { width: 100%; height: 320px; object-fit: cover; }
        .card-info { padding: 15px; }
        .btn-delete-post { position: absolute; top: 10px; right: 10px; background: rgba(255, 77, 77, 0.8); color: white; border: none; width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 10; font-size: 14px; }

        /* TELAS E NAV */
        .tela-full { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 2000; overflow-y: auto; padding: 20px; }
        .nav { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); background: #161b22; display: flex; gap: 30px; padding: 12px 30px; border-radius: 40px; border: 1px solid #30363d; z-index: 3000; }
        .nav i { color: #8b949e; font-size: 22px; }
        .btn-action { background: var(--blue); color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; margin-top: 10px; }
        
        #chatBox { height: 60vh; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; margin-bottom: 10px; }
        .msg { padding: 10px; border-radius: 10px; max-width: 80%; }
        .msg-me { background: var(--blue); align-self: flex-end; }
        .msg-them { background: var(--gray); align-self: flex-start; }
    </style>
</head>
<body>

<div id="notification-container"></div>

<div id="telaLogin">
    <div class="login-box">
        <h2>ICE TROCAS</h2>
        <input type="text" id="userIn" placeholder="E-mail">
        <input type="password" id="passIn" placeholder="Senha">
        <button class="btn-action" onclick="fazerLogin()">ENTRAR</button>
    </div>
</div>

<div id="app" style="display:none;">
    <header>
        <b>ICE TROCAS</b>
        <div class="perfil-icon-container" onclick="abrirMeuPerfil()">
            <div class="notificacao-balao" id="dotNotificacao"></div>
            <i class="fas fa-user-circle" style="font-size:26px; color:var(--blue);"></i>
        </div>
    </header>

    <div id="feed"></div>

    <div class="side-menu">
        <button class="btn-float" style="background:var(--gold)" onclick="verBolsa()"><i class="fas fa-chart-line"></i></button>
        <button class="btn-float" style="background:var(--green)" onclick="compartilhar()"><i class="fas fa-share-alt"></i></button>
    </div>

    <div class="nav">
        <i class="fas fa-home" onclick="fecharTelas()"></i>
        <i class="fas fa-plus-circle" onclick="abrirPostar()" style="color:var(--blue); font-size:28px"></i>
        <i class="fas fa-wallet" onclick="abrirCarteira()"></i>
    </div>
</div>

<div id="telaChat" class="tela-full">
    <h3 id="chatTitle">Chat</h3>
    <div id="chatBox"></div>
    <div style="display:flex; gap:5px;">
        <input type="text" id="msgIn" style="flex:1; padding:10px; border-radius:5px; border:none;">
        <button onclick="enviarMensagem()" style="padding:10px; background:var(--blue); border:none; color:white; border-radius:5px;"><i class="fas fa-paper-plane"></i></button>
    </div>
    <button class="btn-action" onclick="fecharTelas()" style="background:none">Voltar</button>
</div>

<div id="telaPostar" class="tela-full">
    <h2>Novo Post</h2>
    <input type="file" id="filePost" accept="image/*">
    <input type="text" id="descPost" placeholder="Descrição...">
    <button class="btn-action" onclick="enviarPost()">Publicar</button>
    <button class="btn-action" onclick="fecharTelas()" style="background:none">Cancelar</button>
</div>

<div id="telaCarteira" class="tela-full">
    <h2>Minha Carteira</h2>
    <div style="background:var(--sea); padding:20px; border-radius:15px; text-align:center;">
        <h1 id="saldoBlue">0</h1>
        <p>BLUE COINS</p>
    </div>
    <button class="btn-action" onclick="fecharTelas()">Voltar</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, push, set, get, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = { apiKey: "AIzaSyDM5M1_O-wfcBDGYJIiYgiHVbqhiKC-0dw", databaseURL: "https://icek-9cdd7-default-rtdb.firebaseio.com", projectId: "icek-9cdd7" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    let usuarioAtivo = null;
    let chatIdAtual = null;
    let receptorId = null;

    // LOGIN
    window.fazerLogin = () => {
        const email = document.getElementById('userIn').value;
        const pass = document.getElementById('passIn').value;
        signInWithEmailAndPassword(auth, email, pass).catch(err => alert("Erro: " + err.message));
    };

    onAuthStateChanged(auth, async (u) => {
        if(u) {
            const snap = await get(ref(db, `usuarios/${u.uid}`));
            usuarioAtivo = snap.val() || { nome: u.email.split('@')[0], uid: u.uid, moedasBlue: 0 };
            document.getElementById('telaLogin').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            carregarFeed();
            escutarNotificacoes();
        }
    });

    // NOTIFICAÇÕES
    function escutarNotificacoes() {
        onValue(ref(db, `notificacoes/${usuarioAtivo.uid}`), snap => {
            if(snap.exists()) {
                document.getElementById('dotNotificacao').style.display = 'block';
                snap.forEach(n => {
                    mostrarToast(n.val().nome, n.val().texto, n.val().de);
                    remove(ref(db, `notificacoes/${usuarioAtivo.uid}/${n.key}`));
                });
            }
        });
    }

    function mostrarToast(nome, msg, de) {
        const container = document.getElementById('notification-container');
        const t = document.createElement('div');
        t.className = 'toast';
        t.innerHTML = `<b>${nome}</b><br>${msg}`;
        t.onclick = () => abrirChat(de, nome);
        container.appendChild(t);
        setTimeout(() => t.remove(), 5000);
    }

    // FEED
    function carregarFeed() {
        onValue(ref(db, 'posts'), snap => {
            const feed = document.getElementById('feed');
            feed.innerHTML = "";
            snap.forEach(p => {
                const post = p.val();
                feed.innerHTML = `
                <div class="card-timeline">
                    <img src="${post.img}">
                    <div class="card-info">
                        <b>${post.autor}</b><br>
                        <small>${post.desc}</small>
                        <button class="btn-action" onclick="abrirChat('${post.uid}', '${post.autor}')">NEGOCIAR</button>
                    </div>
                </div>` + feed.innerHTML;
            });
        });
    }

    // CHAT
    window.abrirChat = (uid, nome) => {
        receptorId = uid;
        chatIdAtual = [usuarioAtivo.uid, uid].sort().join("_");
        document.getElementById('chatTitle').innerText = nome;
        document.getElementById('telaChat').style.display = 'block';
        document.getElementById('dotNotificacao').style.display = 'none';
        
        onValue(ref(db, `chats/${chatIdAtual}`), snap => {
            const box = document.getElementById('chatBox');
            box.innerHTML = "";
            snap.forEach(m => {
                const msg = m.val();
                box.innerHTML += `<div class="msg ${msg.uid === usuarioAtivo.uid ? 'msg-me':'msg-them'}">${msg.texto}</div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    };

    window.enviarMensagem = () => {
        const txt = document.getElementById('msgIn').value;
        if(!txt) return;
        push(ref(db, `chats/${chatIdAtual}`), { uid: usuarioAtivo.uid, texto: txt });
        push(ref(db, `notificacoes/${receptorId}`), { de: usuarioAtivo.uid, nome: usuarioAtivo.nome, texto: txt });
        document.getElementById('msgIn').value = "";
    };

    // POSTAR
    window.enviarPost = () => {
        const file = document.getElementById('filePost').files[0];
        const desc = document.getElementById('descPost').value;
        const reader = new FileReader();
        reader.onload = (e) => {
            push(ref(db, 'posts'), { autor: usuarioAtivo.nome, uid: usuarioAtivo.uid, img: e.target.result, desc: desc });
            fecharTelas();
        };
        reader.readAsDataURL(file);
    };

    // FUNÇÕES DE TELA
    window.fecharTelas = () => { document.querySelectorAll('.tela-full').forEach(t => t.style.display = 'none'); };
    window.abrirPostar = () => document.getElementById('telaPostar').style.display = 'block';
    window.abrirCarteira = () => {
        document.getElementById('saldoBlue').innerText = usuarioAtivo.moedasBlue;
        document.getElementById('telaCarteira').style.display = 'block';
    };
    window.compartilhar = () => { navigator.share({ title: 'ICE TROCAS', url: window.location.href }); };
</script>

</body>
</html>
