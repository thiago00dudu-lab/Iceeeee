<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICE TROCAS - Oficial</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        :root { 
            --bg: #e3effd; --sea: #0f3452; --blue: #1877f2; --gold: #FFD700; 
            --light-yellow: #FFFF80; --mod-blue: #00BFFF; --white: #fff; 
            --red: #ff4d4d; --green: #28a745;
        }
        body { margin:0; font-family: 'Segoe UI', sans-serif; background: var(--bg); padding-bottom: 90px; }
        header { padding: 15px 20px; background: linear-gradient(135deg, var(--sea), #1a5276); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .wrap { max-width: 500px; margin: auto; padding: 15px; }
        .card-timeline { background: var(--white); border-radius: 20px; overflow: hidden; margin-bottom: 25px; box-shadow: 0 8px 20px rgba(15, 52, 82, 0.15); }
        .card-timeline img { width: 100%; height: 350px; object-fit: cover; }
        .card-info { padding: 18px; }
        .actions { display: flex; padding: 12px 18px; gap: 15px; border-top: 1px solid #eee; background: #fafafa; justify-content: space-around; }
        .btn-action { background: none; border: none; color: var(--sea); font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 6px; font-size: 13px; }
        .capa { height: 160px; background: linear-gradient(to bottom, var(--blue), var(--sea)); position: relative; }
        .avatar { width: 100px; height: 100px; border-radius: 50%; border: 5px solid var(--white); position: absolute; bottom: -50px; left: 20px; background: #eee no-repeat center/cover; }
        .bio-area { margin-top: 60px; padding: 0 20px; }
        .finance-btns { display: flex; gap: 10px; margin: 20px 0; }
        .btn-fin { flex: 1; padding: 12px; border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .deposito { background: var(--green); }
        .saque { background: var(--blue); }
        .nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--sea); display: flex; gap: 50px; padding: 14px 40px; border-radius: 50px; z-index: 3000; }
        .nav i { color: white; font-size: 24px; cursor: pointer; }
        #modalFin { display: none; position: fixed; inset: 0; background: rgba(15, 52, 82, 0.9); z-index: 4000; align-items: center; justify-content: center; padding: 20px; }
        .pix-input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 15px; }
    </style>
</head>
<body>

<div id="loginS" style="position:fixed; inset:0; background:var(--sea); z-index:5000; display:flex; align-items:center; justify-content:center;">
    <div style="background:white; padding:40px 30px; border-radius:30px; width:85%; text-align:center;">
        <h2 style="color:var(--sea);">🧊 ICE LOGIN</h2>
        <input type="text" id="inome" placeholder="Usuário" style="width:100%; padding:15px; margin-bottom:15px; border-radius:12px; border:1px solid #ddd;">
        <input type="password" id="ipass" placeholder="Senha" style="width:100%; padding:15px; margin-bottom:25px; border-radius:12px; border:1px solid #ddd;">
        <button onclick="logar()" style="background:var(--blue); color:white; width:100%; padding:16px; border:none; border-radius:12px; font-weight:bold;">ENTRAR</button>
    </div>
</div>

<div id="app" style="display:none">
    <header>
        <div style="font-weight:900; font-size:22px;">ICE TROCAS</div>
        <button onclick="location.reload()" style="color:white; background:none; border:1px solid #fff; border-radius:20px; padding:4px 10px;">Sair</button>
    </header>
    <div class="wrap"><div id="feed"></div></div>
    <div class="nav">
        <i class="fas fa-home" onclick="fecharTelas()"></i>
        <i class="fas fa-user-circle" onclick="abrirPerfil(window.user.nome)"></i>
    </div>
</div>

<div id="telaPerfil" style="display:none; position:fixed; inset:0; background:var(--bg); z-index:2000; overflow-y:auto;">
    <div class="capa" id="pCapa"><button onclick="fecharTelas()" style="margin:15px; border:none; background:rgba(0,0,0,0.4); color:white; border-radius:50%; width:40px; height:40px;"><i class="fas fa-arrow-left"></i></button></div>
    <div class="avatar" id="pAvatar"></div>
    <div class="bio-area">
        <h2 id="perfNome" style="color:var(--sea);"></h2>
        <div class="finance-btns" id="btnsFinance">
            <button class="btn-fin deposito" onclick="abrirFin()"><i class="fas fa-wallet"></i> DEPÓSITO</button>
            <button class="btn-fin saque"><i class="fas fa-hand-holding-usd"></i> SAQUE</button>
        </div>
        <div id="perfilPosts"></div>
    </div>
</div>

<div id="modalFin">
    <div style="background:white; padding:30px; border-radius:25px; width:85%; max-width:400px; text-align:center;">
        <h3>💰 Realizar Depósito</h3>
        <input type="number" id="finValor" class="pix-input" placeholder="R$ 0,00">
        <button id="btnFinAction" onclick="executarPix()" style="background:var(--sea); color:white; width:100%; padding:15px; border:none; border-radius:12px; font-weight:bold;">GERAR PIX AGORA</button>
        <button onclick="document.getElementById('modalFin').style.display='none'" style="margin-top:15px; background:none; border:none; color:red;">CANCELAR</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = { apiKey: "AIzaSyDM5M1_O-wfcBDGYJIiYgiHVbqhiKC-0dw", databaseURL: "https://icek-9cdd7-default-rtdb.firebaseio.com", projectId: "icek-9cdd7" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    window.user = {};

    // Função ajustada para puxar o Pix do servidor Vercel
    window.executarPix = async () => {
        const valor = document.getElementById('finValor').value;
        const usuario = window.user.nome || "Usuario";

        if (!valor || valor < 1) return alert("Erro no Pix (Min R$ 1,00)");

        try {
            const res = await fetch('/api/Pix', { 
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ valor: valor, usuario: usuario })
            });

            const data = await res.json();
            
            if (data.point_of_interaction && data.point_of_interaction.transaction_data) {
                const copiaCola = data.point_of_interaction.transaction_data.qr_code;
                window.prompt("🧊 PIX GERADO! Copie o código abaixo:", copiaCola);
                document.getElementById('modalFin').style.display = 'none';
            } else { 
                alert("Erro ao gerar Pix. Verifique o Access Token."); 
            }
        } catch (e) { 
            alert("Erro de conexão. Verifique se o arquivo api/Pix.js existe no GitHub."); 
        }
    };

    window.compartilharApp = () => {
        if (navigator.share) {
            navigator.share({ 
                title: 'ICE TROCAS', 
                text: 'Confira essa troca no ICE!', 
                url: window.location.href 
            }).catch(() => console.log('Cancelado'));
        } else {
            window.prompt("Copie o link:", window.location.href);
        }
    };

    window.logar = () => {
        const n = document.getElementById('inome').value.trim();
        if(!n) return;
        window.user = { nome: n };
        document.getElementById('loginS').style.display = 'none';
        document.getElementById('app').style.display = 'block';
    };

    onValue(ref(db, 'posts'), (snap) => {
        const f = document.getElementById('feed'); f.innerHTML = "";
        snap.forEach(c => {
            const p = c.val();
            const div = document.createElement('div');
            div.className = "card-timeline";
            div.innerHTML = `
                <img src="${p.i1}">
                <div class="card-info"><b>${p.u1}</b></div>
                <div class="actions">
                    <button class="btn-action"><i class="fas fa-comment"></i> CHAT</button>
                    <button class="btn-action" onclick="compartilharApp()">
                        <i class="fas fa-share-alt"></i> COMPARTILHAR
                    </button>
                </div>`;
            f.prepend(div);
        });
    });

    window.abrirPerfil = (nome) => {
        document.getElementById('perfNome').innerText = nome;
        document.getElementById('telaPerfil').style.display = 'block';
    };
    window.fecharTelas = () => { document.getElementById('telaPerfil').style.display = 'none'; };
    window.abrirFin = () => { document.getElementById('modalFin').style.display = 'flex'; };
</script>
</body>
</html>
