<html lang="pt">
<head>
    <meta charset="UTF-8">

    <title>ICE TROCAS - Oficial</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        /* TEMA ANTÁRTIDA (GELO) */
        :root { 
            --bg: #050a0f; 
            --sea: rgba(15, 52, 82, 0.7); 
            --blue: #1877f2; 
            --ice: rgba(255, 255, 255, 0.08); 
            --gold: #FFD700; 
            --white: #fff; 
            --green: #25d366; 
            --red: #ff4d4d; 
            --mod-blue: #00BFFF; 
            --gray: #30363d; 
        }

        body { 
            margin:0; 
            font-family: sans-serif; 
            background: radial-gradient(circle at top, #0d1d2d, #050a0f); 
            color: white; 
            padding-bottom: 90px; 
            overflow-x: hidden; 
        }
        
        #telaLogin { position: fixed; inset: 0; background: var(--bg); z-index: 5000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: white; padding: 30px; border-radius: 20px; width: 85%; max-width: 350px; text-align: center; color: black; }
        .login-box input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }

        .badge-star { font-size: 14px; display: flex; gap: 4px; align-items: center; justify-content: center; margin-bottom: 5px; }
        .star-mod { color: var(--mod-blue); }
        .star-adm2 { color: var(--red); }
        .star-adm1 { color: var(--gold); }

        .side-menu { position: fixed; right: 15px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 10px; z-index: 4000; }
        .btn-float { width: 42px; height: 42px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; color: white; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.4); font-size: 16px; }

        header { 
            padding:15px; 
            background: rgba(22, 27, 34, 0.8); 
            backdrop-filter: blur(10px);
            display:flex; 
            justify-content:space-between; 
            align-items:center; 
            border-bottom: 1px solid rgba(255,255,255,0.1); 
            position: sticky; 
            top:0; 
            z-index:100; 
        }
        
        .header-icons { display: flex; align-items: center; gap: 18px; }

        .perfil-icon-container { position: relative; cursor: pointer; z-index: 101; }
        .notificacao-balao { position: absolute; top: -5px; right: -5px; background: var(--red); width: 12px; height: 12px; border-radius: 50%; border: 2px solid #161b22; display: none; }

        .card-timeline { 
            background: var(--ice); 
            backdrop-filter: blur(5px);
            border-radius: 15px; 
            overflow: hidden; 
            margin: 15px; 
            border: 1px solid rgba(255,255,255,0.05); 
            position: relative; 
        }
        .card-timeline img { width: 100%; height: 320px; object-fit: cover; }
        .card-info { padding: 15px; }

        .btn-delete-post { position: absolute; top: 10px; right: 10px; background: rgba(255, 77, 77, 0.8); color: white; border: none; width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 10; font-size: 14px; }

        .nav { 
            position: fixed; 
            bottom: 15px; 
            left: 50%; 
            transform: translateX(-50%); 
            background: rgba(22, 27, 34, 0.9); 
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1); 
            display: flex; 
            gap: 25px; 
            padding: 12px 30px; 
            border-radius: 40px; 
            z-index: 3000; 
        }
        .nav i { color: #8b949e; font-size: 22px; cursor: pointer; }
        .nav i.active { color: var(--mod-blue); }

        .tela-full { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 2000; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .btn-action { background: var(--blue); color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; margin-top: 10px; cursor: pointer; }
        
        .grid-postagens { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-top: 15px; }
        .grid-postagens img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 5px; }
        
        .conversa-item { background: var(--ice); padding: 12px; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.1); }

        .painel-adm { background: rgba(255, 215, 0, 0.05); border: 2px solid var(--gold); padding: 15px; border-radius: 15px; margin-top: 15px; }
        .user-photo { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; border: 3px solid var(--mod-blue); margin-bottom: 10px; background: #161b22; }
        .file-label { display: block; background: #30363d; color: white; padding: 10px; border-radius: 5px; cursor: pointer; margin-bottom: 10px; font-size: 12px; text-align: center; }

        .card-troca-concluida { background: #1c2128; border: 1px solid var(--green); border-radius: 10px; padding: 10px; margin-top: 10px; text-align: left; position: relative; }
        .card-troca-concluida img { width: 100%; height: 120px; object-fit: cover; border-radius: 8px; margin-bottom: 5px; }
        .stars-display { color: var(--gold); font-size: 12px; }
        .badge-concluido { position: absolute; top: 5px; right: 5px; background: var(--green); font-size: 10px; padding: 2px 6px; border-radius: 5px; }

        /* ESTILOS PARA O LEILÃO */
        .input-leilao { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: none; box-sizing: border-box; background: #30363d; color: white; }
        .card-leilao { background: rgba(255, 215, 0, 0.1); border: 1px solid var(--gold); border-radius: 15px; overflow: hidden; margin: 15px; position: relative; box-shadow: 0 4px 15px rgba(255, 215, 0, 0.15); }
        .card-leilao img { width: 100%; height: 250px; object-fit: cover; }
        .info-leilao { padding: 15px; text-align: center; }
        .valor-lance { font-size: 26px; color: var(--green); font-weight: bold; margin: 10px 0; text-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        .btn-lance { background: var(--green); color: white; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 18px; width: 100%; margin-bottom: 10px; box-shadow: 0 4px 10px rgba(37, 211, 102, 0.3);}
        .btn-arrematar { background: var(--gold); color: black; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top:5px;}
        .leilao-encerrado { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; color: var(--gold); font-size: 24px; font-weight: bold; z-index: 10; pointer-events: none; text-align: center; padding: 20px; box-sizing: border-box;}
    </style>
</head>
<body>

<div class="side-menu" id="menuFlutuante" style="display:none;">
    <button class="btn-float" style="background: var(--gold); color:black;" onclick="comprar('ADM1 SUPREMO', 'R$ 22.000.000')"><i class="fas fa-crown"></i></button>
    <button class="btn-float" style="background: var(--red);" onclick="comprar('ADM2', 'R$ 50')"><i class="fas fa-shield-alt"></i></button>
    <button class="btn-float" style="background: var(--mod-blue);" onclick="comprar('MOD', 'R$ 20')"><i class="fas fa-star"></i></button>
    <button class="btn-float" style="background: var(--green);" onclick="window.open('https://wa.me/5511983602504')"><i class="fab fa-whatsapp"></i></button>
</div>

<div id="telaLogin">
    <div class="login-box">
        <h2>ICE TROCAS</h2>
        <input type="text" id="userIn" placeholder="Login">
        <input type="password" id="passIn" placeholder="Senha">
        <button class="btn-action" onclick="fazerLogin()">ENTRAR</button>
    </div>
</div>

<div id="app" style="display:none;">
    <header>
        <b style="color: var(--mod-blue);">ICE TROCAS</b> 
        <div class="header-icons">
            <i class="fas fa-share-nodes" style="font-size:22px; color:white; cursor:pointer;" onclick="compartilharSite()"></i>
            
            <div class="perfil-icon-container" onclick="abrirMeuPerfil()">
                <i class="fas fa-user-circle" style="font-size:26px; color:var(--mod-blue);"></i>
                <div id="balaoAlerta" class="notificacao-balao"></div>
            </div>
        </div>
    </header>
    
    <div id="feed-leiloes"></div>
    
    <div id="feed"></div>
    <div class="nav">
        <i class="fas fa-home active" onclick="fecharTelas()"></i>
        <i class="fas fa-plus-circle" onclick="abrirPostar()" style="color:var(--mod-blue); font-size: 28px;"></i>
        <i class="fas fa-wallet" onclick="abrirCarteira()"></i>
    </div>
</div>

<div id="telaPerfil" class="tela-full">
    <div id="perfilConteudo" style="text-align:center;"></div>
    
    <div id="painelStaffLeilao" class="painel-adm" style="display:none; border-color: var(--mod-blue);">
        <h4 style="color:var(--mod-blue); text-align:center; margin-top:0;"><i class="fas fa-gavel"></i> PAINEL STAFF</h4>
        <button class="btn-action" style="background:var(--mod-blue);" onclick="document.getElementById('telaCriarLeilao').style.display='block'">ABRIR NOVO LEILÃO</button>
    </div>

    <div id="minhasConversas" style="margin-top: 20px; display:none;">
        <h4 style="color:var(--mod-blue); border-bottom: 1px solid #333; padding-bottom: 5px;"><i class="fas fa-comments"></i> Minhas Negociações</h4>
        <div id="listaConversas"></div>
    </div>

    <div id="secaoTrocasConcluidas" style="margin-top:20px;">
        <h4 style="color:var(--green); border-bottom: 1px solid #333; padding-bottom: 5px;"><i class="fas fa-check-double"></i> Trocas Realizadas</h4>
        <div id="gridTrocasConcluidas" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;"></div>
    </div>

    <div id="areaEditarPerfil" style="display:none; margin-top:15px; background: #161b22; padding: 15px; border-radius: 15px;">
        <label for="editFotoFile" class="file-label"><i class="fas fa-image"></i> Alterar Foto da Galeria</label>
        <input type="file" id="editFotoFile" accept="image/*" style="display:none;" onchange="prepararFotoPerfil(this)">
        <input type="text" id="editBio" placeholder="Sua Bio" style="width:100%; padding:10px; margin-bottom:10px; border-radius:5px; border:none; box-sizing:border-box; background:#30363d; color:white;">
        <button class="btn-action" style="background:var(--green); margin-bottom:10px;" onclick="salvarPerfil()">SALVAR PERFIL</button>
    </div>

    <div id="painelAdmControle" class="painel-adm" style="display:none;">
        <h4 style="color:var(--gold); text-align:center; margin-top:0;">👑 MASTER CONTROL</h4>
        <div style="display:flex; gap:5px;">
            <button class="btn-action" style="background:var(--gold); color:black; font-size:10px;" onclick="mudarCargo('ADM1')">ADM1</button>
            <button class="btn-action" style="background:var(--red); font-size:10px;" onclick="mudarCargo('ADM2')">ADM2</button>
            <button class="btn-action" style="background:var(--mod-blue); font-size:10px;" onclick="mudarCargo('MOD')">MOD</button>
        </div>
        <button class="btn-action" style="background:var(--gray); width:100%; margin-top:10px; color:var(--red);" onclick="bloquearUsuario()"><i class="fas fa-ban"></i> BLOQUEAR USUÁRIO</button>
    </div>

    <h4>Postagens</h4>
    <div id="gridUser" class="grid-postagens"></div>
    <button class="btn-action" style="background:var(--gray); margin-top:20px;" onclick="fecharTelas()">VOLTAR</button>
</div>

<div id="telaCriarLeilao" class="tela-full">
    <h3 style="color: var(--gold); text-align: center;"><i class="fas fa-gavel"></i> INICIAR LEILÃO</h3>
    <input type="text" id="leilaoItem" placeholder="Nome do Produto / Item" class="input-leilao">
    <input type="number" id="leilaoValor" placeholder="Valor de Começo (Ex: 100)" class="input-leilao">
    <label for="leilaoFoto" class="file-label"><i class="fas fa-camera"></i> Inserir Foto do Item</label>
    <input type="file" id="leilaoFoto" accept="image/*" style="display:none;" onchange="prepararFotoLeilao(this)">
    <img id="previewFotoLeilao" style="width:100%; max-height:250px; object-fit:cover; display:none; border-radius:10px; margin-bottom:15px;">
    
    <button class="btn-action" style="background:var(--gold); color:black;" onclick="publicarLeilao()">PUBLICAR LEILÃO</button>
    <button class="btn-action" style="background:var(--gray); margin-top:10px;" onclick="fecharTelas()">CANCELAR</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, update, set, push, get, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = { apiKey: "AIzaSyDM5M1_O-wfcBDGYJIiYgiHVbqhiKC-0dw", databaseURL: "https://icek-9cdd7-default-rtdb.firebaseio.com", projectId: "icek-9cdd7" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    window.user = null;
    let targetUid = null;
    let currentRating = 0;
    let fotoPerfilBase64 = null;
    let fotoPostBase64 = null;
    let fotoLeilaoBase64 = null; 
    let idDoChatAtual = null;

    // COMPARTILHAR SITE
    window.compartilharSite = () => {
        const url = "https://iceeeee.vercel.app/";
        if (navigator.share) {
            navigator.share({ title: 'ICE TROCAS', text: 'Confira a plataforma oficial!', url: url });
        } else {
            navigator.clipboard.writeText(url);
            alert("Link copiado!");
        }
    };

    function getBadge(cargo) {
        if(cargo === 'ADM1') return '<div class="badge-star star-adm1"><i class="fas fa-star"></i><i class="fas fa-crown"></i></div>';
        if(cargo === 'ADM2') return '<div class="badge-star star-adm2"><i class="fas fa-star"></i></div>';
        if(cargo === 'MOD') return '<div class="badge-star star-mod"><i class="fas fa-star"></i></div>';
        return '';
    }

    function monitorarNotificacoes() {
        onValue(ref(db, 'chats'), snap => {
            let temNova = false;
            snap.forEach(chat => {
                if (chat.key.includes(window.user.uid)) {
                    const msgs = Object.values(chat.val());
                    const ultima = msgs[msgs.length - 1];
                    if (ultima.remetente !== window.user.uid && (Date.now() - ultima.timestamp < 10000)) temNova = true;
                }
            });
            document.getElementById('balaoAlerta').style.display = temNova ? 'block' : 'none';
        });
    }

    // LÓGICA DO LOGIN CORRIGIDA
    window.fazerLogin = async () => {
        let u = document.getElementById('userIn').value.trim();
        const p = document.getElementById('passIn').value;
        
        // LOGIN MASTER ADM - Bypass Firebase e salva no localStorage
        if(u.toUpperCase() === "ADM" && p === "1533") {
            const m = { nome: "MASTER ADM1", cargo: "ADM1", uid: "master_ice", moedasBlue: 1000000, foto: "", bio: "", pai: "", filhos: 0 };
            await set(ref(db, `usuarios/master_ice`), m);
            localStorage.setItem('ice_user', JSON.stringify(m));
            window.user = m;
            showApp(); 
            return;
        }

        const emailFake = u.includes('@') ? u : u + "@ice.com";
        try { await signInWithEmailAndPassword(auth, emailFake, p); } catch (e) { 
            try {
                const res = await createUserWithEmailAndPassword(auth, emailFake, p);
                const novoUser = { nome: u, cargo: 'user', uid: res.user.uid, moedasBlue: 0, foto:"", bio:"", pai: "", filhos: 0 };
                await set(ref(db, `usuarios/${res.user.uid}`), novoUser);
            } catch (err) { alert("Erro ao entrar."); }
        }
    };

    // VERIFICAÇÃO DE LOGIN CORRIGIDA
    onAuthStateChanged(auth, async (u) => {
        if (u) {
            const s = await get(ref(db, `usuarios/${u.uid}`));
            window.user = s.val(); 
            showApp();
        } else {
            // Verifica se o MASTER ADM está salvo no localStorage
            const localUser = localStorage.getItem('ice_user');
            if (localUser) {
                window.user = JSON.parse(localUser);
                showApp();
            }
        }
    });

    function showApp() {
        document.getElementById('telaLogin').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        document.getElementById('menuFlutuante').style.display = 'flex';
        monitorarNotificacoes();
        
        // MONITORANDO OS LEILÕES (COM HISTÓRICO DE LANCES)
        onValue(ref(db, 'leiloes'), snap => {
            const fl = document.getElementById('feed-leiloes');
            fl.innerHTML = "";
            snap.forEach(l => {
                const le = l.val();
                const lid = l.key;
                const ehDonoOuMaster = window.user && (window.user.uid === le.criadorUid || window.user.cargo === 'ADM1');
                
                let arremateHtml = (le.ativo && ehDonoOuMaster) ? `<button class="btn-arrematar" onclick="arrematarLeilao('${lid}')"><i class="fas fa-gavel"></i> DAR ARREMATE</button>` : '';
                let lanceHtml = le.ativo ? `<button class="btn-lance" onclick="darLance('${lid}', ${le.lanceAtual})"><i class="fas fa-plus"></i> R$ 50</button>` : '';
                let encerradoOverlay = le.ativo ? '' : `<div class="leilao-encerrado">ARREMATADO<br>POR R$ ${le.lanceAtual}</div>`;
                
                // Exibe a caixinha com os 2 últimos lances
                let historicoHtml = '';
                if (le.historico && le.historico.length > 0) {
                    historicoHtml = '<div style="background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; margin-bottom: 12px; font-size: 13px; text-align: left;">';
                    historicoHtml += '<b style="color:var(--gold);"><i class="fas fa-history"></i> Últimos Lances:</b><br>';
                    le.historico.forEach((h, index) => {
                        historicoHtml += `<div style="margin-top:5px;"><span style="color:${index === 0 ? 'var(--green)' : '#aaa'};">● <b>${h.nome}</b> cobriu para R$ ${h.valor}</span></div>`;
                    });
                    historicoHtml += '</div>';
                }
                
                fl.innerHTML = `
                <div class="card-leilao">
                    ${encerradoOverlay}
                    <img src="${le.imagem}">
                    <div class="info-leilao">
                        ${getBadge(le.criadorCargo)} <small>Leilão Oficial de <b>${le.criadorNome}</b></small><br>
                        <h3 style="margin:8px 0;">${le.item}</h3>
                        <div class="valor-lance">R$ ${le.lanceAtual}</div>
                        ${historicoHtml}
                        ${lanceHtml}
                        ${arremateHtml}
                    </div>
                </div>` + fl.innerHTML;
            });
        });

        // MONITORANDO FEED NORMAL
        onValue(ref(db, 'posts'), snap => {
            const f = document.getElementById('feed'); f.innerHTML = "";
            snap.forEach(p => { 
                const pt = p.val();
                const postId = p.key;
                const ehAdm = window.user && (window.user.cargo === 'ADM1' || window.user.cargo === 'ADM2');
                f.innerHTML = `
                <div class="card-timeline">
                    ${ehAdm ? `<button class="btn-delete-post" onclick="removerPost('${postId}')"><i class="fas fa-trash"></i></button>` : ""}
                    <img src="${pt.i1}" onclick="abrirPerfil('${pt.uid}')">
                    <div class="card-info">
                        ${getBadge(pt.cargo)} <b>${pt.u1}</b><br>
                        <small>${pt.d1}</small>
                        <button class="btn-action" style="background:var(--sea);" onclick="abrirChat('${pt.uid}', '${pt.u1}')">NEGOCIAR</button>
                    </div>
                </div>` + f.innerHTML;
            });
        });
    }

    window.abrirPerfil = async (uid) => {
        targetUid = uid;
        const s = await get(ref(db, `usuarios/${uid}`));
        const t = s.val();
        const souEu = window.user.uid === uid;
        const ehStaff = ['ADM1', 'ADM2', 'MOD'].includes(window.user.cargo);
        
        // MOSTRA PAINEL DE LEILÃO APENAS SE FOR O DONO DA CONTA E ELE TIVER CARGO
        document.getElementById('painelStaffLeilao').style.display = (souEu && ehStaff) ? 'block' : 'none';

        document.getElementById('areaEditarPerfil').style.display = souEu ? 'block' : 'none';
        document.getElementById('minhasConversas').style.display = souEu ? 'block' : 'none';
        document.getElementById('perfilConteudo').innerHTML = `<img src="${t.foto || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" class="user-photo">${getBadge(t.cargo)}<h2>${t.nome}</h2><p style="color:#aaa;">${t.bio || 'Membro do Ice'}</p>`;
        
        const grid = document.getElementById('gridUser'); grid.innerHTML = "";
        const allPosts = await get(ref(db, 'posts'));
        allPosts.forEach(p => { if(p.val().uid === uid) grid.innerHTML += `<img src="${p.val().i1}">`; });
        
        document.getElementById('telaPerfil').style.display = 'block';
    };

    window.abrirMeuPerfil = () => { 
        if(window.user) abrirPerfil(window.user.uid); 
    };

    window.fecharTelas = () => { document.querySelectorAll('.tela-full').forEach(t => t.style.display = 'none'); };
    window.abrirPostar = () => { document.getElementById('telaPostar').style.display='block'; };
    window.abrirCarteira = () => { document.getElementById('telaCarteira').style.display='block'; };

    // ============================================
    // FUNÇÕES DO LEILÃO (LÓGICA NOVA + HISTÓRICO)
    // ============================================

    window.prepararFotoLeilao = (input) => {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                fotoLeilaoBase64 = e.target.result;
                document.getElementById('previewFotoLeilao').src = e.target.result;
                document.getElementById('previewFotoLeilao').style.display = 'block';
            };
            reader.readAsDataURL(input.files[0]);
        }
    };

    window.publicarLeilao = async () => {
        const item = document.getElementById('leilaoItem').value;
        const valor = parseFloat(document.getElementById('leilaoValor').value);
        if(!item || isNaN(valor)) return alert("Preencha o nome do item e o valor inicial.");
        
        const novoLeilao = {
            criadorUid: window.user.uid,
            criadorNome: window.user.nome,
            criadorCargo: window.user.cargo,
            item: item,
            valorInicial: valor,
            lanceAtual: valor,
            maiorLicitante: null,
            maiorLicitanteNome: "Nenhum lance ainda",
            historico: [], // Array que vai armazenar os últimos lances
            imagem: fotoLeilaoBase64 || "https://images.unsplash.com/photo-1555850935-43098e982181",
            ativo: true,
            timestamp: Date.now()
        };
        
        await set(push(ref(db, 'leiloes')), novoLeilao);
        
        alert("Leilão iniciado com sucesso!");
        document.getElementById('leilaoItem').value = '';
        document.getElementById('leilaoValor').value = '';
        document.getElementById('previewFotoLeilao').style.display = 'none';
        fotoLeilaoBase64 = null;
        fecharTelas();
    };

    window.darLance = async (lid, valorAtual) => {
        if(!window.user) return alert("Faça login para dar lances!");
        const novoValor = valorAtual + 50;
        
        // Pega as informações atuais do leilão direto do banco para não perder o histórico
        const snap = await get(ref(db, `leiloes/${lid}`));
        const leilao = snap.val();
        
        let historico = leilao.historico || [];
        
        // Adiciona o novo lance no início da lista
        historico.unshift({ nome: window.user.nome, valor: novoValor });
        
        // Se a lista ficar maior que 2, remove o mais antigo (do final)
        if(historico.length > 2) {
            historico.pop();
        }

        await update(ref(db, `leiloes/${lid}`), {
            lanceAtual: novoValor,
            maiorLicitante: window.user.uid,
            maiorLicitanteNome: window.user.nome,
            historico: historico
        });
    };

    window.arrematarLeilao = async (lid) => {
        if(confirm("Deseja bater o martelo e DAR O ARREMATE FINAL neste leilão?")) {
            await update(ref(db, `leiloes/${lid}`), {
                ativo: false
            });
            alert("Leilão encerrado com sucesso! O vencedor e o valor final estão cravados.");
        }
    };
</script>
</body>
</html>
