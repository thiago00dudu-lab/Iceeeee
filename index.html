<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICE - Sistema de Comando</title>
<style>
:root {
    --bg: #dff6ff; --sea: #0f3452; --gold: #ffd700; --blue: #007bff;
}
body { margin: 0; font-family: sans-serif; background: var(--bg); color: var(--sea); }
.header { padding: 15px; background: rgba(255,255,255,0.7); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #7ec8e6; }
.admin-star { color: var(--gold); font-size: 12px; display: block; }
.mod-star { color: var(--blue); font-size: 12px; display: block; }

.login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
.card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 80%; max-width: 300px; text-align: center; }
input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
button { width: 100%; padding: 10px; background: #1d5277; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }

.main-content { display: none; padding: 15px; }
.post-box { background: white; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
.feed-item { background: white; padding: 10px; border-radius: 10px; margin-bottom: 10px; position: relative; border-left: 5px solid #1d5277; }
.badge { font-weight: bold; font-size: 14px; }
.btn-block { background: #ff6b7a; margin-top: 5px; font-size: 11px; width: auto; padding: 5px 10px; }
</style>
</head>
<body>

<!-- TELA DE LOGIN -->
<div id="loginScreen" class="login-screen">
    <div class="card">
        <h3>Acesso ICE</h3>
        <input type="text" id="userName" placeholder="Seu Nome">
        <input type="password" id="userPass" placeholder="Senha (ADM: 1533)">
        <button onclick="fazerLogin()">Entrar no Sistema</button>
    </div>
</div>

<!-- CONTEÚDO PRINCIPAL -->
<div id="appContent" class="main-content">
    <header class="header">
        <div>
            <span id="userBadge"></span>
            <strong id="displayName"></strong>
        </div>
        <button onclick="location.reload()" style="width: auto; background: none; color: red;">Sair</button>
    </header>

    <div class="status-bar" style="text-align: center; font-size: 11px; margin: 10px 0;">Firebase Conectado: icek-9cdd7 ✅</div>

    <!-- ÁREA DE POSTAGEM (TELA DUPLA/POST) -->
    <div class="post-box" id="postArea">
        <textarea id="postText" placeholder="O que deseja postar?" style="width:100%; height:60px; border-radius: 5px; border:1px solid #ddd; padding:5px;"></textarea>
        <button onclick="criarPost()" style="margin-top:10px;">Publicar Comando</button>
    </div>

    <!-- FEED DE POSTAGENS -->
    <div id="feed">
        <!-- Posts aparecem aqui -->
    </div>
</div>

<script>
let currentUser = { nome: "", cargo: "" };

function fazerLogin() {
    const nome = document.getElementById('userName').value;
    const pass = document.getElementById('userPass').value;

    if(!nome) return alert("Digite seu nome!");

    if(pass === "1533") {
        currentUser = { nome: nome, cargo: "ADM" };
    } else {
        currentUser = { nome: nome, cargo: "MODERADOR" };
    }

    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('appContent').style.display = 'block';
    
    // Define a Estrela
    const badge = document.getElementById('userBadge');
    if(currentUser.cargo === "ADM") {
        badge.innerHTML = '<span class="admin-star">★ ADM OURO</span>';
        badge.className = "badge";
    } else {
        badge.innerHTML = '<span class="mod-star">★ MOD AZUL</span>';
        badge.className = "badge";
    }
    document.getElementById('displayName').innerText = currentUser.nome;
}

function criarPost() {
    const text = document.getElementById('postText').value;
    if(!text) return;

    const feed = document.getElementById('feed');
    const item = document.createElement('div');
    item.className = 'feed-item';
    
    // Verifica se quem postou é ADM ou MOD para colocar a estrela no post
    const star = currentUser.cargo === "ADM" ? '<span class="admin-star">★</span>' : '<span class="mod-star">★</span>';

    item.innerHTML = `
        <div style="font-size:12px; margin-bottom:5px;">${star} <strong>${currentUser.nome}</strong></div>
        <div>${text}</div>
        ${currentUser.cargo === "ADM" ? '<button class="btn-block" onclick="this.parentElement.style.opacity=0.3">BLOQUEAR DEMANDA</button>' : ''}
    `;
    
    feed.prepend(item);
    document.getElementById('postText').value = "";
}
</script>

<!-- SEU FIREBASE JÁ CONFIGURADO -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com";
    const firebaseConfig = {
      apiKey: "AIzaSyDM5M1_O-wfcBDGYJIiYgiHVbqhiKC-0dw",
      authDomain: "icek-9cdd7.firebaseapp.com",
      projectId: "icek-9cdd7",
      appId: "1:929781654380:web:ddda1fdf6689ebd7cc8949"
    };
    initializeApp(firebaseConfig);
</script>
</body>
</html>
