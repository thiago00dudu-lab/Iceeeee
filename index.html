<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ICE TROCAS - Oficial</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        :root { --bg: #0d1117; --sea: #0f3452; --blue: #1877f2; --gold: #FFD700; --white: #fff; --green: #25d366; --red: #ff4d4d; --mod-blue: #00BFFF; --gray: #30363d; }
        body { margin:0; font-family: sans-serif; background: var(--bg); color: white; padding-bottom: 90px; overflow-x: hidden; }
        
        /* LOGIN */
        #telaLogin { position: fixed; inset: 0; background: var(--sea); z-index: 5000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: white; padding: 30px; border-radius: 20px; width: 85%; max-width: 350px; text-align: center; color: black; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .login-box input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }

        /* ESTRELAS */
        .star-mod { color: var(--mod-blue); }
        .star-adm2 { color: var(--red); }
        .star-adm1 { color: var(--gold); }

        /* LAYOUT */
        header { padding:15px; background: #161b22; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:100; border-bottom: 1px solid #30363d; }
        .card-timeline { background: #161b22; border-radius: 15px; overflow: hidden; margin: 15px; border: 1px solid #30363d; }
        .card-timeline img { width: 100%; height: 300px; object-fit: cover; }

        .nav { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); background: #161b22; border: 1px solid #30363d; display: flex; gap: 25px; padding: 12px 30px; border-radius: 40px; z-index: 3000; }
        .nav i { color: #8b949e; font-size: 22px; cursor: pointer; }
        .nav i.active { color: var(--blue); }

        .tela-full { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 2000; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .btn-action { background: var(--blue); color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; margin-top: 10px; cursor: pointer; }
        
        /* PAINEL ADM */
        .painel-adm { background: #1c2128; border: 1px solid var(--gold); padding: 15px; border-radius: 12px; margin-top: 15px; }
        .btn-adm-tool { padding: 8px; font-size: 11px; margin: 2px; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; }

        /* GALERIA PERFIL */
        .grid-postagens { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-top: 15px; }
        .grid-postagens img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 5px; background: #30363d; }
    </style>
</head>
<body>

<div id="telaLogin">
    <div class="login-box">
        <h2>ICE TROCAS</h2>
        <input type="text" id="userIn" placeholder="E-mail">
        <input type="password" id="passIn" placeholder="Senha">
        <button class="btn-action" onclick="fazerLogin()">ENTRAR</button>
    </div>
</div>

<div id="app" style="display:none;">
    <header>
        <b>ICE TROCAS</b>
        <div onclick="abrirMeuPerfil()"><i class="fas fa-user-circle" style="font-size:24px;"></i></div>
    </header>
    <div id="feed"></div>
    <div class="nav">
        <i class="fas fa-home active" onclick="fecharTelas()"></i>
        <i class="fas fa-plus-circle" onclick="abrirPostar()" style="color:var(--blue)"></i>
        <i class="fas fa-wallet" onclick="abrirCarteira()"></i>
    </div>
</div>

<div id="telaPerfil" class="tela-full">
    <div id="perfilConteudo"></div>
    
    <div id="painelAdmControle" style="display:none;" class="painel-adm">
        <h4 style="color:var(--gold); margin:0 0 10px 0;">GESTÃO ADM1</h4>
        <button class="btn-adm-tool" style="background:var(--mod-blue);" onclick="admAlterarCargo('MOD')">DAR MOD</button>
        <button class="btn-adm-tool" style="background:var(--red);" onclick="admAlterarCargo('ADM2')">DAR ADM2</button>
        <button class="btn-adm-tool" style="background:var(--gray); color:white;" onclick="admAlterarCargo('user')">REBAIXAR</button>
        <button class="btn-adm-tool" style="background:var(--gold); color:black;" onclick="admAlterarSaldo()">ADD/TIRAR BLUE</button>
        <button class="btn-adm-tool" style="background:black; color:white;" onclick="admAlterarStatus('banido')">BANIR</button>
    </div>

    <h4 style="margin: 20px 0 10px 0; border-bottom: 1px solid #30363d; padding-bottom: 5px;">Minhas Trocas</h4>
    <div id="minhasPostagens" class="grid-postagens"></div>

    <button class="btn-action" style="background:var(--gray);" onclick="fecharTelas()">VOLTAR</button>
</div>

<div id="telaEditPerfil" class="tela-full">
    <h2>Configurar Perfil</h2>
    <p>Foto de Perfil:</p>
    <input type="file" id="editFoto" accept="image/*">
    <p>Bio / Descrição:</p>
    <textarea id="editBio" style="width:100%; height:80px; background:#161b22; color:white; border:1px solid #30363d; border-radius:8px; padding:10px;"></textarea>
    <button class="btn-action" onclick="salvarPerfil()">SALVAR ALTERAÇÕES</button>
    <button class="btn-action" style="background:none" onclick="document.getElementById('telaEditPerfil').style.display='none'">CANCELAR</button>
</div>

<div id="telaPostar" class="tela-full">
    <h2>Nova Troca</h2>
    <input type="file" id="filePost" accept="image/*">
    <input type="text" id="descPost" placeholder="O que você quer trocar?" style="width:100%; padding:15px; margin-top:10px; background:#161b22; color:white; border:1px solid #30363d;">
    <button class="btn-action" onclick="enviarPost()">PUBLICAR</button>
    <button class="btn-action" style="background:none" onclick="fecharTelas()">CANCELAR</button>
</div>

<div id="telaChat" class="tela-full">
    <h3 id="chatTitle">Chat</h3>
    <div id="chatBox" style="height:300px; overflow-y:auto; display:flex; flex-direction:column; gap:10px; padding:10px; background:#0d1117;"></div>
    <div style="display:flex; gap:5px; margin-top:10px;">
        <input type="text" id="msgIn" placeholder="Mensagem..." style="flex:1; padding:10px; border-radius:8px; border:none;">
        <button onclick="enviarMensagem()" style="background:var(--blue); border:none; color:white; padding:10px; border-radius:8px;"><i class="fas fa-paper-plane"></i></button>
    </div>
    <button class="btn-action" style="background:none" onclick="fecharTelas()">FECHAR</button>
</div>

<div id="telaCarteira" class="tela-full">
    <div style="background:linear-gradient(135deg, var(--sea), var(--blue)); padding:40px; border-radius:20px; text-align:center;">
        <p>Saldo Atual</p>
        <h1 id="saldoBlue">0</h1>
        <small>BLUE COINS</small>
    </div>
    <button class="btn-action" style="margin-top:20px;" onclick="fecharTelas()">VOLTAR</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, update, set, push, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = { apiKey: "AIzaSyDM5M1_O-wfcBDGYJIiYgiHVbqhiKC-0dw", databaseURL: "https://icek-9cdd7-default-rtdb.firebaseio.com", projectId: "icek-9cdd7" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    window.user = null;
    let targetUidGlobal = null;

    function renderEstrela(cargo) {
        if(cargo === 'MOD') return '<i class="fas fa-star star-mod"></i>';
        if(cargo === 'ADM2') return '<i class="fas fa-star star-adm2"></i>';
        if(cargo === 'ADM1') return '<i class="fas fa-star star-adm1"></i>';
        return '';
    }

    window.fazerLogin = async () => {
        const u = document.getElementById('userIn').value;
        const p = document.getElementById('passIn').value;
        if(u.toUpperCase() === "ADM" && p === "1533") {
            window.user = { nome: "DONO ICE", cargo: "ADM1", uid: "master", moedasBlue: 999999, foto: '' };
            localStorage.setItem('ice_master', JSON.stringify(window.user));
            location.reload(); return;
        }
        try { await signInWithEmailAndPassword(auth, u, p); } catch (e) { await createUserWithEmailAndPassword(auth, u, p); }
    };

    onAuthStateChanged(auth, async (u) => {
        const local = localStorage.getItem('ice_master');
        if (local) { window.user = JSON.parse(local); entrarNoApp(); } 
        else if (u) {
            const snap = await get(ref(db, `usuarios/${u.uid}`));
            window.user = snap.val() || { nome: "Novo Membro", cargo: 'user', uid: u.uid, moedasBlue: 0, status: 'ativo' };
            if(!snap.exists()) await set(ref(db, `usuarios/${u.uid}`), window.user);
            if(window.user.status === 'banido') { alert("Banido!"); return; }
            entrarNoApp();
        }
    });

    function entrarNoApp() {
        document.getElementById('telaLogin').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        onValue(ref(db, 'posts'), snap => {
            const feed = document.getElementById('feed'); feed.innerHTML = "";
            snap.forEach(p => {
                const post = p.val();
                feed.innerHTML = `<div class="card-timeline" onclick="abrirPerfilAlheio('${post.uid}')">
                    <img src="${post.i1}">
                    <div style="padding:15px;"><b>${post.u1 || 'Usuário'} ${renderEstrela(post.cargo)}</b><br><small>${post.d1}</small></div>
                </div>` + feed.innerHTML;
            });
        });
        onValue(ref(db, `usuarios/${window.user.uid}`), s => { if(s.exists()) document.getElementById('saldoBlue').innerText = s.val().moedasBlue || 0; });
    }

    window.abrirPerfilAlheio = async (uid) => {
        targetUidGlobal = uid;
        const snap = await get(ref(db, `usuarios/${uid}`));
        const t = snap.val();
        const eMeu = window.user.uid === uid;
        const souDono = window.user.cargo === 'ADM1';

        document.getElementById('painelAdmControle').style.display = (souDono && !eMeu) ? 'block' : 'none';

        document.getElementById('perfilConteudo').innerHTML = `
            <div style="text-align:center; padding:20px;">
                <img src="${t.foto || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" style="width:100px; height:100px; border-radius:50%; border:3px solid var(--blue); object-fit:cover;">
                <h2 style="margin:10px 0 5px 0;">${renderEstrela(t.cargo)}<br>${t.nome || 'Sem Nome'}</h2>
                <p style="color:#8b949e; font-size:14px; margin-bottom:15px;">${t.bio || 'Sem bio definida.'}</p>
                <div style="display:flex; justify-content:space-around; margin:20px 0;">
                    <div><b>${t.moedasBlue || 0}</b><br><small>BLUE</small></div>
                    <div><b>${t.status || 'ativo'}</b><br><small>STATUS</small></div>
                </div>
                ${eMeu ? `<button class="btn-action" style="background:#30363d" onclick="document.getElementById('telaEditPerfil').style.display='block'">CONFIGURAR PERFIL</button>` : `<button class="btn-action" onclick="abrirChat('${t.uid}', '${t.nome}')">NEGOCIAR</button>`}
            </div>`;

        // Carregar fotos dessa pessoa
        const postsSnap = await get(ref(db, 'posts'));
        const grid = document.getElementById('minhasPostagens'); grid.innerHTML = "";
        postsSnap.forEach(p => { if(p.val().uid === uid) grid.innerHTML += `<img src="${p.val().i1}">`; });

        document.getElementById('telaPerfil').style.display = 'block';
    };

    window.salvarPerfil = () => {
        const bio = document.getElementById('editBio').value;
        const file = document.getElementById('editFoto').files[0];
        const updates = { bio: bio };
        if(file) {
            const r = new FileReader();
            r.onload = async (e) => { 
                updates.foto = e.target.result; 
                await update(ref(db, `usuarios/${window.user.uid}`), updates);
                alert("Perfil Atualizado!"); location.reload();
            };
            r.readAsDataURL(file);
        } else {
            update(ref(db, `usuarios/${window.user.uid}`), updates).then(() => { alert("Bio atualizada!"); location.reload(); });
        }
    };

    window.admAlterarCargo = async (c) => { await update(ref(db, `usuarios/${targetUidGlobal}`), { cargo: c }); abrirPerfilAlheio(targetUidGlobal); };
    window.admAlterarStatus = async (s) => { await update(ref(db, `usuarios/${targetUidGlobal}`), { status: s }); abrirPerfilAlheio(targetUidGlobal); };
    window.admAlterarSaldo = async () => {
        const val = prompt("Quanto adicionar ou tirar (use -)?");
        if(val) {
            const snap = await get(ref(db, `usuarios/${targetUidGlobal}`));
            await update(ref(db, `usuarios/${targetUidGlobal}`), { moedasBlue: (snap.val().moedasBlue || 0) + parseInt(val) });
            abrirPerfilAlheio(targetUidGlobal);
        }
    };

    window.enviarPost = () => {
        const f = document.getElementById('filePost').files[0];
        const d = document.getElementById('descPost').value;
        if(!f) return alert("Selecione uma foto!");
        const r = new FileReader();
        r.onload = (e) => {
            push(ref(db, 'posts'), { u1: window.user.nome, uid: window.user.uid, cargo: window.user.cargo, i1: e.target.result, d1: d });
            fecharTelas();
        };
        r.readAsDataURL(f);
    };

    window.fecharTelas = () => { document.querySelectorAll('.tela-full').forEach(t=>t.style.display='none'); };
    window.abrirMeuPerfil = () => abrirPerfilAlheio(window.user.uid);
    window.abrirPostar = () => document.getElementById('telaPostar').style.display='block';
    window.abrirCarteira = () => document.getElementById('telaCarteira').style.display='block';
</script>
</body>
</html>
