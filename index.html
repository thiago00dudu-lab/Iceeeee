<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ICE TROCAS - Oficial</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        :root { --bg: #f4f7f9; --sea: #0f3452; --blue: #1877f2; --gold: #FFD700; --white: #fff; --green: #25d366; --red: #ff4d4d; }
        body { margin:0; font-family: sans-serif; background: var(--bg); padding-bottom: 90px; }
        header { padding:15px; background: var(--white); display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:100; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .wrap { max-width: 500px; margin: auto; padding: 15px; }
        
        .card-timeline { background: var(--white); border-radius: 15px; overflow: hidden; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .card-timeline img { width: 100%; height: 320px; object-fit: cover; cursor: pointer; }
        
        .nav { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); background: var(--sea); display: flex; gap: 25px; padding: 12px 25px; border-radius: 40px; z-index: 3000; box-shadow: 0 10px 20px rgba(0,0,0,0.2); align-items: center; }
        .nav i { color: white; font-size: 20px; cursor: pointer; }

        #telaPerfil, #telaChat, #telaFinanceiro { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 2000; overflow-y: auto; }
        #msgs { flex:1; overflow-y:auto; padding:15px; background:#e5ddd5; display:flex; flex-direction:column; gap: 10px; min-height: 75vh; }
        
        .card-financeiro { background: white; padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 15px; border: 1px solid #ddd; }
        .btn-compra { background: var(--sea); color: white; border: none; padding: 10px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        /* BOTÃO ADM BLUE */
        .btn-blue { background: var(--blue); color: white; border: none; padding: 8px; border-radius: 5px; font-size: 10px; font-weight: bold; margin-top: 10px; cursor: pointer; width: 100%; }
    </style>
</head>
<body>

<div id="app">
    <header>
        <div><b>ICE TROCAS</b><br><small id="btcValue" style="color:var(--blue); font-weight: bold;"></small></div>
        <button onclick="location.reload()" style="border:none; background:none; color:red; font-weight:bold;">SAIR</button>
    </header>
    
    <div class="wrap" id="feed"></div>
    
    <div class="nav">
        <i class="fas fa-home" onclick="fecharTelas()"></i>
        <i class="fas fa-university" onclick="abrirFin()"></i>
        <i class="fas fa-share-alt" onclick="compartilharApp()" style="color: var(--gold);"></i>
        <i class="fas fa-wallet" onclick="abrirFin()"></i>
        <i class="fas fa-user-circle" onclick="abrirPerfil(window.user.nome)"></i>
    </div>
</div>

<div id="telaFinanceiro">
    <div class="wrap">
        <h2 style="text-align:center; color:var(--sea);">Loja de Cargos</h2>
        <div class="card-financeiro">
            <h3>MODERADOR</h3>
            <p style="color: var(--green); font-size: 20px; font-weight: bold;">R$ 20,00</p>
            <button class="btn-compra" onclick="comprarCargo('MODERADOR', 0.0050)">COPIAR PIX R$ 20</button>
        </div>
        <div class="card-financeiro">
            <h3>ADM 2</h3>
            <p style="color: var(--blue); font-size: 20px; font-weight: bold;">R$ 50,00</p>
            <button class="btn-compra" onclick="comprarCargo('ADM2', 0.0150)">COPIAR PIX R$ 50</button>
        </div>
        <div style="text-align:center; background: white; padding: 15px; border-radius: 15px;">
             <p style="font-size:12px;">Suas Moedas: <b id="meuSaldoBlue" style="color:var(--blue);">0</b> BLUE</p>
             <button onclick="fecharTelas()" style="color:red; border:none; background:none;">Sair da Loja</button>
        </div>
    </div>
</div>

<div id="telaPerfil">
    <div style="height:140px; background:var(--sea);">
        <button onclick="fecharTelas()" style="margin:10px; border:none; background:rgba(0,0,0,0.5); color:white; border-radius:50%; width:35px; height:35px;">←</button>
    </div>
    <div class="wrap" style="margin-top:-45px;">
        <div id="pAvatar" style="width:90px; height:90px; border-radius:50%; border:4px solid white; background:#eee center/cover;"></div>
        <h2 id="perfNome" style="margin-bottom:0;"></h2>
        <p id="perfCargo" style="font-size:12px; color:var(--blue); font-weight:bold;"></p>
        <p style="font-size:13px;">Saldo: <span id="perfSaldoBlue" style="font-weight:bold; color:var(--blue);">0</span> BLUE</p>
        
        <div id="painelAdm1" style="display:none; border:1px dashed var(--blue); padding:10px; border-radius:10px; margin-top:10px;">
            <small>Painel Supremo ADM 1</small>
            <button class="btn-blue" onclick="enviarBlue()">+ ENVIAR 100 MOEDAS BLUE</button>
        </div>

        <hr>
        <div id="perfilPosts"></div>
    </div>
</div>

<div id="telaChat"><div id="msgs"></div></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push, onValue, update, set, get, runTransaction } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = { apiKey: "AIzaSyDM5M1_O-wfcBDGYJIiYgiHVbqhiKC-0dw", databaseURL: "https://icek-9cdd7-default-rtdb.firebaseio.com", projectId: "icek-9cdd7" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Mude aqui para "ADM 1" para testar o seu poder
    window.user = { 
        nome: localStorage.getItem('ice_user') || "User_" + Math.floor(Math.random()*999),
        cargo: localStorage.getItem('ice_cargo') || "USER", // Ex: "ADM 1"
        id: localStorage.getItem('ice_id') || "ID_" + Math.floor(Math.random()*9999)
    };

    // --- LÓGICA DE MOEDA (ICE) ---
    onValue(ref(db, 'economia/valor_ice'), (snap) => {
        const v = snap.val() || 0.7099;
        document.getElementById('btcValue').innerHTML = `<i class="fas fa-coins"></i> ICE: $${v.toFixed(4)}`;
    });

    // --- COMPRA DE CARGO (VALORIZA A MOEDA NA HORA) ---
    window.comprarCargo = (cargo, pump) => {
        // 1. Valoriza a moeda no banco para todo mundo
        const econRef = ref(db, 'economia/valor_ice');
        runTransaction(econRef, (atual) => (atual || 0.7099) + pump);

        // 2. Copia o Pix
        navigator.clipboard.writeText("thiago00dudu@gmail.com");
        alert("Chave Pix Copiada! O valor do ICE subiu devido a sua demanda!");
    };

    // --- MOEDAS BLUE (PODER DO ADM 1) ---
    let perfilSendoVisto = "";
    window.abrirPerfil = (nome) => {
        perfilSendoVisto = nome;
        onValue(ref(db, 'usuarios/' + nome), (snap) => {
            const d = snap.val() || { nome: nome, cargo: "USER", blue: 0 };
            document.getElementById('perfNome').innerText = d.nome;
            document.getElementById('perfCargo').innerText = "Cargo: " + d.cargo;
            document.getElementById('perfSaldoBlue').innerText = d.blue || 0;
            
            // Se EU sou ADM 1 e estou vendo o perfil de OUTRA pessoa
            if(window.user.cargo === "ADM 1" && nome !== window.user.nome) {
                document.getElementById('painelAdm1').style.display = 'block';
            } else {
                document.getElementById('painelAdm1').style.display = 'none';
            }
            document.getElementById('telaPerfil').style.display = 'block';
        }, { onlyOnce: true });
    };

    window.enviarBlue = () => {
        const userRef = ref(db, 'usuarios/' + perfilSendoVisto + '/blue');
        runTransaction(userRef, (saldo) => (saldo || 0) + 100);
        alert("Você enviou 100 BLUE para " + perfilSendoVisto);
    };

    // Feed, Navegação e Share (Mantidos para não quebrar a estrutura)
    onValue(ref(db, 'posts'), (snap) => {
        const f = document.getElementById('feed'); f.innerHTML = "";
        snap.forEach(c => {
            const p = c.val();
            const div = document.createElement('div');
            div.className = "card-timeline";
            div.innerHTML = `<img src="${p.i1}" onclick="abrirPerfil('${p.u1}')"><div style="padding:15px;"><b>${p.u1}</b></div>`;
            f.prepend(div);
        });
    });

    window.compartilharApp = () => {
        const link = window.location.origin + "?ref=" + window.user.id;
        navigator.clipboard.writeText(link);
        alert("Link de afiliado copiado!");
    };
    window.abrirFin = () => { 
        fecharTelas(); 
        document.getElementById('telaFinanceiro').style.display = 'block';
        // Atualiza meu saldo blue na loja
        get(ref(db, 'usuarios/' + window.user.nome + '/blue')).then(s => {
            document.getElementById('meuSaldoBlue').innerText = s.val() || 0;
        });
    };
    window.fecharTelas = () => { document.querySelectorAll('#telaPerfil, #telaChat, #telaFinanceiro').forEach(t => t.style.display = 'none'); };

</script>
</body>
</html>
