<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICE</title>

<style>

body{
margin:0;
font-family:Arial;
background:#07131f;
color:white;
}

header{
padding:15px;
background:#0c2031;
border-bottom:1px solid #294861;
display:flex;
justify-content:space-between;
align-items:center;
}

h1{
margin:0;
font-size:22px;
}

.wrap{
max-width:900px;
margin:auto;
padding:15px;
}

.card{
background:#0d1e31;
padding:15px;
border-radius:12px;
margin-bottom:15px;
border:1px solid #294861;
}

input,textarea{
width:100%;
padding:10px;
margin:5px 0;
background:#081521;
border:1px solid #294861;
color:white;
border-radius:8px;
}

button{
padding:10px 15px;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:5px;
}

.btn{
background:#67d7ff;
color:#001320;
font-weight:bold;
}

.btn-danger{
background:#ff6b6b;
color:white;
}

.btn-ok{
background:#1dd1a1;
}

.timeline-post{
background:#10253b;
padding:12px;
border-radius:10px;
margin-bottom:10px;
cursor:pointer;
}

.timeline-post img{
width:100%;
border-radius:10px;
margin-top:8px;
}

.star-admin{
color:#ffd700;
font-size:18px;
}

.star-mod{
color:#00eaff;
font-size:18px;
}

.star-user{
color:#4a7fa0;
opacity:.4;
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.8);
display:none;
justify-content:center;
align-items:center;
padding:20px;
}

.modal-content{
background:#0d1e31;
padding:15px;
border-radius:12px;
width:100%;
max-width:600px;
max-height:90vh;
overflow:auto;
}

.profile-cover{
height:160px;
background:#24445f;
border-radius:10px;
margin-bottom:10px;
overflow:hidden;
}

.profile-cover img{
width:100%;
height:100%;
object-fit:cover;
}

.profile-avatar{
width:80px;
height:80px;
border-radius:50%;
background:#274b69;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
margin-top:-40px;
border:3px solid #0d1e31;
overflow:hidden;
}

.profile-avatar img{
width:100%;
height:100%;
object-fit:cover;
}

.nav{
position:fixed;
bottom:10px;
left:10px;
right:10px;
display:flex;
gap:10px;
}

.nav button{
flex:1;
background:#0d1e31;
color:white;
border:1px solid #31526d;
}

.promo{
position:fixed;
bottom:80px;
left:50%;
transform:translateX(-50%);
background:#163047;
padding:12px 20px;
border-radius:10px;
border:1px solid #4f7aa0;
display:none;
}

</style>
</head>

<body>

<header>
<h1>ICE</h1>
<div id="status">Não logado</div>
</header>

<div class="promo" id="promoBox">
Suporte Ice, compra de moderação, 11983602504
</div>

<div class="wrap">

<div class="card">

<h3>Login</h3>

<input id="user" placeholder="Usuário">
<input id="pass" type="password" placeholder="Senha">

<button class="btn" onclick="login()">Entrar</button>

</div>


<div class="card">

<h3>Publicar troca</h3>

<input id="titulo" placeholder="Nome do item">
<textarea id="desc" placeholder="Descrição"></textarea>

<input type="file" id="foto">

<button class="btn" onclick="publicar()">Publicar</button>

</div>


<div class="card">

<h3>Timeline</h3>

<div id="timeline"></div>

</div>

</div>

<div class="nav">
<button onclick="minhasTrocas()">Trocas</button>
<button onclick="abrirPerfil(usuario?.nome)">Perfil</button>
</div>


<div class="modal" id="perfilModal">

<div class="modal-content">

<div id="perfilBody"></div>

<button onclick="fecharPerfil()">Fechar</button>

</div>

</div>

<script>

let usuario=null

let usuarios=JSON.parse(localStorage.getItem("usuarios")||"{}")
let posts=JSON.parse(localStorage.getItem("posts")||"[]")

function salvar(){

localStorage.setItem("usuarios",JSON.stringify(usuarios))
localStorage.setItem("posts",JSON.stringify(posts))

}

function garantirUser(nome){

if(!usuarios[nome]){

usuarios[nome]={

nome:nome,
tipo:"normal",
bio:"",
foto:"",
capa:"",
bloqueado:false

}

}

}

function login(){

let u=document.getElementById("user").value.trim()
let p=document.getElementById("pass").value.trim()

garantirUser(u)

if(u==="ADM" && p==="1533"){

usuarios[u].tipo="admin"

usuario={nome:u,tipo:"admin"}

}else{

usuario={nome:u,tipo:usuarios[u].tipo}

}

salvar()

status()

renderTimeline()

}

function status(){

if(!usuario){

document.getElementById("status").innerText="Não logado"

return

}

document.getElementById("status").innerHTML=nomeExibicao(usuario.nome)

}

function nomeExibicao(nome){

let u=usuarios[nome]

if(u.tipo==="admin")return "⭐ "+nome
if(u.tipo==="mod")return "🔷 "+nome

return nome

}

function publicar(){

if(!usuario)return alert("login primeiro")

let titulo=document.getElementById("titulo").value
let desc=document.getElementById("desc").value

let file=document.getElementById("foto").files[0]

let post={

id:Date.now(),
titulo,
desc,
dono:usuario.nome,
img:"",
data:new Date().toLocaleString()

}

if(file){

let r=new FileReader()

r.onload=e=>{

post.img=e.target.result

posts.unshift(post)

salvar()

renderTimeline()

}

r.readAsDataURL(file)

}else{

posts.unshift(post)

salvar()

renderTimeline()

}

}

function renderTimeline(){

let t=document.getElementById("timeline")

t.innerHTML=""

posts.forEach(p=>{

let div=document.createElement("div")

div.className="timeline-post"

div.onclick=()=>abrirTroca(p.id)

div.innerHTML=`

<b>${p.titulo}</b><br>

${p.desc}<br>

<small>${nomeExibicao(p.dono)}</small>

<br>

<button onclick="event.stopPropagation();abrirPerfil('${p.dono}')">Ver perfil</button>

${p.img?`<img src="${p.img}">`:""}

`

t.appendChild(div)

})

}

function minhasTrocas(){

if(!usuario)return

let t=document.getElementById("timeline")

t.innerHTML=""

posts.filter(p=>p.dono===usuario.nome).forEach(p=>{

let div=document.createElement("div")

div.className="timeline-post"

div.innerHTML=`<b>${p.titulo}</b><br>${p.desc}`

t.appendChild(div)

})

}

function abrirPerfil(nome){

garantirUser(nome)

let u=usuarios[nome]

let html=`


<div class="profile-cover">

${u.capa?`<img src="${u.capa}">`:""}

</div>

<div class="profile-avatar">

${u.foto?`<img src="${u.foto}">`:nome[0]}

</div>

<h2>${nomeExibicao(nome)}</h2>

<textarea id="bioInput">${u.bio}</textarea>

<button onclick="salvarBio('${nome}')">Salvar bio</button>

`

if(usuario?.nome==="ADM" && nome!=="ADM"){

html+=`

<button onclick="tornarModerador('${nome}')">Tornar moderador</button>

<button class="btn-danger" onclick="bloquear('${nome}')">Bloquear</button>

`

}

if(usuario?.tipo==="mod" && usuarios[nome].tipo==="normal"){

html+=`<button class="btn-danger" onclick="bloquear('${nome}')">Bloquear</button>`

}

document.getElementById("perfilBody").innerHTML=html

document.getElementById("perfilModal").style.display="flex"

}

function fecharPerfil(){

document.getElementById("perfilModal").style.display="none"

}

function salvarBio(nome){

usuarios[nome].bio=document.getElementById("bioInput").value

salvar()

}

function tornarModerador(nome){

if(usuario?.nome!=="ADM")return

usuarios[nome].tipo="mod"

salvar()

alert(nome+" agora é moderador")

}

function bloquear(nome){

usuarios[nome].bloqueado=true

salvar()

alert("Usuário bloqueado")

}

function abrirTroca(id){

alert("Sistema de troca aqui")

}

function promo(){

let p=document.getElementById("promoBox")

p.style.display="block"

setTimeout(()=>{

p.style.display="none"

},6000)

}

setInterval(promo,240000)

setTimeout(promo,8000)

renderTimeline()

status()

</script>

</body>
</html>
