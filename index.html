<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICE TROCAS - Oficial</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        :root { --bg: #f0f7ff; --ice: #a8dadc; --sea: #0f3452; --blue: #1877f2; --gold: #FFD700; --light-yellow: #FFFF80; --mod-blue: #00BFFF; --white: #fff; --red: #ff4d4d; }
        body { margin:0; font-family: sans-serif; background: var(--bg); color: var(--sea); padding-bottom: 80px; }
        
        header { padding:15px; background: var(--white); display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:100; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .wrap { max-width: 500px; margin: auto; padding: 15px; }

        /* ESTRELA ÚNICA */
        .badge { font-size: 12px; font-weight: bold; display: flex; align-items: center; gap: 5px; margin-top: 3px; }
        .star-gold { color: var(--gold); }
        .star-yellow { color: var(--light-yellow); }
        .star-blue { color: var(--mod-blue); }

        /* TIMELINE */
        .card-timeline { background: var(--white); border-radius: 15px; overflow: hidden; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 1px solid #e1e8ed; }
        .card-timeline img { width: 100%; height: 300px; object-fit: cover; }
        .card-info { padding: 15px; }
        .post-actions { display: flex; gap: 15px; padding: 10px 15px; border-top: 1px solid #eee; }

        /* PERFIL CUSTOM */
        .capa-perfil { height: 120px; background: #ddd; position: relative; background-size: cover; background-position: center; }
        .avatar-perfil { width: 80px; height: 80px; border-radius: 50%; border: 4px solid var(--white); position: absolute; bottom: -40px; left: 20px; background: #eee; background-size: cover; }
        .bio-box { margin-top: 50px; padding: 0 20px; font-size: 14px; color: #555; }

        /* MENU FLUTUANTE RODAPÉ */
        .nav-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--sea); display: flex; gap: 30px; padding: 12px 30px; border-radius: 30px; box-shadow: 0 5px 20px rgba(0,0,0,0.3); z-index: 3000; }
        .nav-item { color: white; font-size: 20px; cursor: pointer; text-decoration: none; }

        /* TELAS */
        #telaPerfil, #telaEdit, #telaChat { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 2000; overflow-y: auto; }
        .master-panel { background: #fff3cd; border: 2px dashed orange; padding: 15px; border-radius: 10px; margin-top: 15px; }
        .btn-adm { padding: 8px 12px; border-radius: 5px; border: none; font-weight: bold; margin: 3px; color: #333; cursor: pointer; }
    </style>
</head>
<body>

<div id="loginS" style="position:fixed; inset:0; background:var(--bg); z-index:5000; display:flex; align-items:center; justify-content:center;">
    <div style="background:white; padding:30px; border-radius:20px; width:80%; text-align:center;">
        <h2>ICE Login</h2>
        <input type="text" id="inome" placeholder="Usuário" style="width:90%; padding:12px; margin-bottom:10px; border-radius:8px; border:1px solid #ddd;">
        <input type="password" id="ipass" placeholder="Senha" style="width:90%; padding:12px; margin-bottom:20px; border-radius:8px; border:1px solid #ddd;">
        <button onclick="logar()" style="background:var(--sea); color:white; width:100%; padding:12px; border:none; border-radius:8px; font-weight:bold;">ENTRAR</button>
    </div>
</div>

<div id="app" style="display:none">
    <header>
        <div style="font-weight:900; font-size:22px;">ICE</div>
        <button onclick="location.reload()" style="border:none; background:none; color:var(--red); font-weight:bold;">SAIR</button>
    </header>

    <div class="wrap">
        <div id="feed"></div>
    </div>

    <div class="nav-bar">
        <div class="nav-item" onclick="window.scrollTo(0,0)"><i class="fas fa-home"></i></div>
        <div class="nav-item" onclick="abrirPerfil(window.user.nome)"><i class="fas fa-user-circle"></i></div>
    </div>
</div>

<div id="telaPerfil">
    <div class="capa-perfil" id="pCapa">
        <button onclick="fecharPerfil()" style="margin:10px; border:none; background:rgba(0,0,0,0.5); color:white; border-radius:50%; width:35px; height:35px;">←</button>
    </div>
    <div class="avatar-perfil" id="pAvatar"></div>
    
    <div class="bio-box">
        <div style="display:flex; justify-content:space-between; align-items:flex-start;">
            <div>
                <h2 id="perfNome" style="margin:0"></h2>
                <div id="perfBadge"></div>
            </div>
            <button id="btnEdit" onclick="abrirEditor()" style="display:none; padding:5px 15px; border-radius:15px; border:1px solid #ddd; background:white; font-size:12px;">Editar Perfil</button>
        </div>
        <p id="perfBio" style="margin-top:10px; line-height:1.4;">Sem bio definida.</p>
        
        <div id="masterControl" class="master-panel" style="display:none;">
            <b>⚙️ GESTÃO MASTER: <span id="targetUser"></span></b><br>
            <button class="btn-adm" style="background:var(--light-yellow);" onclick="mudarCargo('ADM2')">ADM2</button>
            <button class="btn-adm" style="background:var(--mod-blue);" onclick="mudarCargo('MOD')">MODERADOR</button>
            <button class="btn-adm" style="background:#eee;" onclick="mudarCargo('USER')">REBAIXAR USER</button>
            <button class="btn-adm" style="background:var(--red); color:white;" onclick="bloquearUser()">BANIR</button>
        </div>
        <hr>
        <div id="perfilPosts"></div>
    </div>
</div>

<div id="telaEdit">
    <div style="padding:20px;">
        <h3>Editar Meu Perfil</h3>
        <label>Foto de Capa:</label><input type="file" id="eCapa" accept="image/*" style="width:100%; margin:10px 0;">
        <label>Foto de Perfil:</label><input type="file" id="eAvatar" accept="image/*" style="width:100%; margin:10px 0;">
        <label>Bio (Sua história):</label><textarea id="eBio" style="width:100%; height:80px; margin:10px 0; border-radius:8px; border:1px solid #ddd;"></textarea>
        <button onclick="salvarPerfil()" style="background:var(--blue); color:white; width:100%; padding:12px; border:none; border-radius:8px; font-weight:bold;">SALVAR ALTERAÇÕES</button>
        <button onclick="document.getElementById('telaEdit').style.display='none'" style="width:100%; margin-top:10px; background:none; border:none; color:red;">Cancelar</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push, onValue, update, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = { apiKey: "AIzaSyDM5M1_O-wfcBDGYJIiYgiHVbqhiKC-0dw", databaseURL: "https://icek-9cdd7-default-rtdb.firebaseio.com", projectId: "icek-9cdd7" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let userAlvo = "";
    window.user = {};

    window.logar = () => {
        const n = document.getElementById('inome').value.trim();
        const p = document.getElementById('ipass').value;
        if(!n) return;
        let c = (p === "1533") ? "ADM1" : (p === "1122" ? "ADM2" : (p === "1234" ? "MOD" : "USER"));
        onValue(ref(db, 'usuarios/' + n), (snap) => {
            const d = snap.val() || { nome: n, cargo: c, bio: "", capa: "", avatar: "", bloqueado: false };
            if(d.bloqueado) return alert("BANIDO!");
            if(!snap.val()) set(ref(db, 'usuarios/' + n), d);
            window.user = d;
            document.getElementById('loginS').style.display = 'none';
            document.getElementById('app').style.display = 'block';
        }, { onlyOnce: true });
    };

    function renderEstrela(cargo) {
        if(cargo === "ADM1") return '<span class="badge star-gold"><i class="fas fa-star"></i> ADM1 MASTER</span>';
        if(cargo === "ADM2") return '<span class="badge star-yellow"><i class="fas fa-star"></i> ADM2</span>';
        if(cargo === "MOD") return '<span class="badge star-blue"><i class="fas fa-star"></i> MOD</span>';
        return '<span class="badge" style="color:#aaa"><i class="far fa-star"></i> USER</span>';
    }

    onValue(ref(db, 'posts'), (snap) => {
        const f = document.getElementById('feed'); f.innerHTML = "";
        snap.forEach(c => {
            const p = c.val();
            const div = document.createElement('div');
            div.className = "card-timeline";
            div.innerHTML = `<img src="${p.i1}" onclick="abrirPerfil('${p.u1}')">
                <div class="card-info"><b>${p.u1}</b> ${renderEstrela(p.c1)}<p>${p.d1 || ''}</p></div>`;
            f.prepend(div);
        });
    });

    window.abrirPerfil = (nome) => {
        userAlvo = nome;
        onValue(ref(db, 'usuarios/' + nome), (snap) => {
            const d = snap.val();
            document.getElementById('perfNome').innerText = d.nome;
            document.getElementById('perfBadge').innerHTML = renderEstrela(d.cargo);
            document.getElementById('perfBio').innerText = d.bio || "Sem bio definida.";
            document.getElementById('pCapa').style.backgroundImage = `url(${d.capa || ''})`;
            document.getElementById('pAvatar').style.backgroundImage = `url(${d.avatar || ''})`;
            document.getElementById('btnEdit').style.display = (nome === window.user.nome) ? 'block' : 'none';
            document.getElementById('targetUser').innerText = d.nome;
            document.getElementById('masterControl').style.display = (window.user.cargo === 'ADM1' && nome !== window.user.nome) ? 'block' : 'none';
            document.getElementById('telaPerfil').style.display = 'block';
        });
    };

    window.abrirEditor = () => {
        document.getElementById('eBio').value = window.user.bio || "";
        document.getElementById('telaEdit').style.display = 'block';
    };

    window.salvarPerfil = () => {
        const bio = document.getElementById('eBio').value;
        const fCapa = document.getElementById('eCapa').files[0];
        const fAvat = document.getElementById('eAvatar').files[0];

        let updates = { bio: bio };
        const processar = (file, key, callback) => {
            if(!file) return callback();
            const r = new FileReader();
            r.onload = (e) => { updates[key] = e.target.result; callback(); };
            r.readAsDataURL(file);
        };

        processar(fCapa, 'capa', () => {
            processar(fAvat, 'avatar', () => {
                update(ref(db, `usuarios/${window.user.nome}`), updates);
                alert("Perfil Atualizado!");
                document.getElementById('telaEdit').style.display = 'none';
            });
        });
    };

    window.mudarCargo = (c) => { update(ref(db, `usuarios/${userAlvo}`), { cargo: c }); alert("Cargo Alterado!"); };
    window.bloquearUser = () => { if(confirm("Banir?")) update(ref(db, `usuarios/${userAlvo}`), { bloqueado: true }); };
    window.fecharPerfil = () => document.getElementById('telaPerfil').style.display = 'none';
</script>
</body>
</html>
