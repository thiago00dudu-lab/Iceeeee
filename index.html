<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ICE TROCAS - Oficial</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        :root { --bg: #0d1117; --sea: #0f3452; --blue: #1877f2; --gold: #FFD700; --white: #fff; --green: #25d366; --red: #ff4d4d; --mod-blue: #00BFFF; --gray: #30363d; }
        body { margin:0; font-family: sans-serif; background: var(--bg); color: white; padding-bottom: 90px; overflow-x: hidden; }
        
        /* LOGIN */
        #telaLogin { position: fixed; inset: 0; background: var(--sea); z-index: 5000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: white; padding: 30px; border-radius: 20px; width: 85%; max-width: 350px; text-align: center; color: black; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .login-box input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }

        /* BADGES ESTRELAS */
        .badge-star { font-size: 14px; margin-bottom: 2px; display: flex; gap: 4px; align-items: center; }
        .star-mod { color: var(--mod-blue); }
        .star-adm2 { color: var(--red); }
        .star-adm1 { color: var(--gold); }

        /* MENU LATERAL COMPRAS */
        .side-menu { position: fixed; right: 15px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 15px; z-index: 4000; }
        .btn-float { width: 45px; height: 45px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; color: white; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.4); font-size: 18px; }

        /* FEED E NAV */
        header { padding:15px; background: #161b22; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:100; border-bottom: 1px solid #30363d; }
        .card-timeline { background: #161b22; border-radius: 15px; overflow: hidden; margin: 15px; border: 1px solid #30363d; }
        .card-timeline img { width: 100%; height: 320px; object-fit: cover; }
        .card-info { padding: 15px; }

        .nav { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); background: #161b22; border: 1px solid #30363d; display: flex; gap: 25px; padding: 12px 30px; border-radius: 40px; z-index: 3000; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .nav i { color: #8b949e; font-size: 22px; cursor: pointer; }
        .nav i.active { color: var(--blue); }

        /* TELAS FULL */
        .tela-full { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 2000; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .btn-action { background: var(--blue); color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; margin-top: 10px; cursor: pointer; }
        
        /* BOTÕES COM ÍCONES DO PAINEL ADM */
        .btn-adm-icon { display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 11px; padding: 10px; border-radius: 8px; border: none; color: white; cursor: pointer; font-weight: bold; flex: 1; }
    </style>
</head>
<body>

<div class="side-menu" id="menuFlutuante" style="display:none;">
    <button class="btn-float" style="background: var(--mod-blue);" onclick="comprarCargo('MODERADOR', 'R$ 20,00')"><i class="fas fa-star"></i></button>
    <button class="btn-float" style="background: var(--red);" onclick="comprarCargo('ADM 2', 'R$ 50,00')"><i class="fas fa-crown"></i></button>
    <button class="btn-float" style="background: var(--gold); color:black;" onclick="alert('Market Cap: R$ 22M')"><i class="fas fa-chart-line"></i></button>
    <button class="btn-float" style="background: var(--green);" onclick="alert('Link copiado!')"><i class="fas fa-share-alt"></i></button>
</div>

<div id="telaLogin">
    <div class="login-box">
        <h2>ICE TROCAS</h2>
        <input type="text" id="userIn" placeholder="E-mail ou ADM">
        <input type="password" id="passIn" placeholder="Senha">
        <button class="btn-action" onclick="fazerLogin()">ENTRAR</button>
    </div>
</div>

<div id="app" style="display:none;">
    <header><b>ICE TROCAS</b> <i class="fas fa-user-circle" onclick="abrirMeuPerfil()" style="font-size:26px; color:var(--blue);"></i></header>
    <div id="feed"></div>
    <div class="nav">
        <i class="fas fa-home active" onclick="fecharTelas()"></i>
        <i class="fas fa-plus-circle" onclick="abrirPostar()" style="color:var(--blue); font-size: 28px;"></i>
        <i class="fas fa-wallet" onclick="abrirCarteira()"></i>
    </div>
</div>

<div id="telaPerfil" class="tela-full">
    <div id="perfilConteudo"></div>
    
    <div id="painelAdmControle" style="display:none; background:rgba(255,215,0,0.05); border:2px solid var(--gold); padding:15px; border-radius:15px; margin-top:15px;">
        <h3 style="margin:0 0 15px 0; text-align:center; color: var(--gold);"><i class="fas fa-user-shield"></i> GESTÃO ADM1</h3>
        
        <p style="font-size:12px; color:#aaa; margin-bottom:8px;">Modificar Cargo:</p>
        <div style="display:flex; flex-wrap:wrap; gap:5px; margin-bottom:15px;">
            <button class="btn-adm-icon" style="background:var(--gold); color:black;" onclick="setCargo('ADM1')"><i class="fas fa-king"></i> ADM1</button>
            <button class="btn-adm-icon" style="background:var(--red);" onclick="setCargo('ADM2')"><i class="fas fa-shield-alt"></i> ADM2</button>
            <button class="btn-adm-icon" style="background:var(--mod-blue);" onclick="setCargo('MOD')"><i class="fas fa-star"></i> MOD</button>
            <button class="btn-adm-icon" style="background:#444;" onclick="setCargo('user')"><i class="fas fa-user"></i> USER</button>
        </div>

        <p style="font-size:12px; color:#aaa; margin-bottom:8px;">Controle de Moedas BLUE:</p>
        <div style="display:flex; gap:10px;">
            <button class="btn-adm-icon" style="background:var(--green);" onclick="setMoedas(true)"><i class="fas fa-plus-circle"></i> ADICIONAR</button>
            <button class="btn-adm-icon" style="background:var(--red);" onclick="setMoedas(false)"><i class="fas fa-minus-circle"></i> RETIRAR</button>
        </div>
    </div>

    <button class="btn-action" style="background:var(--gray); margin-top:30px;" onclick="fecharTelas()">VOLTAR</button>
</div>

<div id="telaCarteira" class="tela-full">
    <div style="background:linear-gradient(135deg, var(--sea), var(--blue)); padding:40px; border-radius:20px; text-align:center;">
        <p>Saldo em Carteira</p>
        <h1 id="saldoBlue">0</h1>
        <small>BLUE COINS</small>
    </div>
    <button class="btn-action" style="margin-top:20px;" onclick="fecharTelas()">VOLTAR</button>
</div>

<div id="telaPostar" class="tela-full">
    <h2>Nova Postagem</h2>
    <input type="file" id="filePost" accept="image/*">
    <input type="text" id="descPost" placeholder="Descrição da troca...">
    <button class="btn-action" onclick="enviarPost()">PUBLICAR</button>
    <button class="btn-action" style="background:none" onclick="fecharTelas()">CANCELAR</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, update, set, push, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = { apiKey: "AIzaSyDM5M1_O-wfcBDGYJIiYgiHVbqhiKC-0dw", databaseURL: "https://icek-9cdd7-default-rtdb.firebaseio.com", projectId: "icek-9cdd7" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    window.user = null;
    let targetUid = null;

    window.comprarCargo = (cargo, preco) => {
        const pix = "thiago00dudu@gmail.com";
        const zap = "5511983602504";
        alert(`PIX: ${pix}\nValor: ${preco}\nEnvie o comprovante no Zap!`);
        window.open(`https://wa.me/${zap}?text=Comprovante PIX ${cargo}. ID: ${window.user.uid}`, '_blank');
    };

    function getBadge(cargo) {
        if(cargo === 'ADM1') return '<div class="badge-star star-adm1"><i class="fas fa-star"></i><i class="fas fa-crown"></i></div>';
        if(cargo === 'ADM2') return '<div class="badge-star star-adm2"><i class="fas fa-star"></i></div>';
        if(cargo === 'MOD') return '<div class="badge-star star-mod"><i class="fas fa-star"></i></div>';
        return '';
    }

    window.fazerLogin = async () => {
        const u = document.getElementById('userIn').value;
        const p = document.getElementById('passIn').value;
        if(u.toUpperCase() === "ADM" && p === "1533") {
            const master = { nome: "ADMIN MASTER", cargo: "ADM1", uid: "master_ice", moedasBlue: 1000000 };
            await set(ref(db, `usuarios/master_ice`), master);
            localStorage.setItem('ice_session', JSON.stringify(master));
            location.reload(); return;
        }
        try { await signInWithEmailAndPassword(auth, u, p); } catch (e) { 
            const res = await createUserWithEmailAndPassword(auth, u, p);
            await set(ref(db, `usuarios/${res.user.uid}`), { nome: u.split('@')[0], cargo: 'user', uid: res.user.uid, moedasBlue: 0 });
        }
    };

    onAuthStateChanged(auth, async (u) => {
        const local = localStorage.getItem('ice_session');
        if (local) { window.user = JSON.parse(local); startApp(); }
        else if (u) {
            const snap = await get(ref(db, `usuarios/${u.uid}`));
            window.user = snap.val(); startApp();
        }
    });

    function startApp() {
        document.getElementById('telaLogin').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        document.getElementById('menuFlutuante').style.display = 'flex';

        onValue(ref(db, 'posts'), snap => {
            const feed = document.getElementById('feed'); feed.innerHTML = "";
            snap.forEach(p => {
                const post = p.val();
                feed.innerHTML = `<div class="card-timeline">
                    <img src="${post.i1}" onclick="abrirPerfil('${post.uid}')">
                    <div class="card-info">
                        <div class="badge-container">${getBadge(post.cargo)}<b>${post.u1}</b></div>
                        <small>${post.d1}</small>
                        <button class="btn-action" onclick="abrirPerfil('${post.uid}')">VER PERFIL</button>
                    </div>
                </div>` + feed.innerHTML;
            });
        });
        onValue(ref(db, `usuarios/${window.user.uid}`), s => { if(s.exists()){ window.user = s.val(); document.getElementById('saldoBlue').innerText = s.val().moedasBlue || 0; } });
    }

    window.abrirPerfil = async (uid) => {
        targetUid = uid;
        const snap = await get(ref(db, `usuarios/${uid}`));
        const t = snap.val();
        const painel = document.getElementById('painelAdmControle');
        painel.style.display = (window.user.cargo === 'ADM1' && window.user.uid !== uid) ? 'block' : 'none';

        document.getElementById('perfilConteudo').innerHTML = `
            <div style="text-align:center; padding:20px;">
                <i class="fas fa-user-circle" style="font-size:70px; color:var(--blue);"></i>
                <div style="display:flex; justify-content:center; margin-top:10px;">${getBadge(t.cargo)}</div>
                <h2>${t.nome}</h2>
                <div style="background:#161b22; padding:15px; border-radius:12px; margin-top:10px;">
                    <small>SALDO:</small><br><b style="font-size:22px; color:var(--blue);">${t.moedasBlue || 0} BLUE</b>
                </div>
            </div>`;
        document.getElementById('telaPerfil').style.display = 'block';
    };

    window.setCargo = async (c) => {
        await update(ref(db, `usuarios/${targetUid}`), { cargo: c });
        alert("Cargo alterado com sucesso!"); abrirPerfil(targetUid);
    };

    window.setMoedas = async (somar) => {
        const qtd = prompt("Quantidade de Blues:");
        if(!qtd) return;
        const snap = await get(ref(db, `usuarios/${targetUid}`));
        let novoSaldo = somar ? (snap.val().moedasBlue + parseInt(qtd)) : (snap.val().moedasBlue - parseInt(qtd));
        await update(ref(db, `usuarios/${targetUid}`), { moedasBlue: Math.max(0, novoSaldo) });
        abrirPerfil(targetUid);
    };

    window.enviarPost = () => {
        const f = document.getElementById('filePost').files[0];
        const r = new FileReader();
        r.onload = (e) => {
            push(ref(db, 'posts'), { u1: window.user.nome, uid: window.user.uid, cargo: window.user.cargo, i1: e.target.result, d1: document.getElementById('descPost').value });
            fecharTelas();
        };
        r.readAsDataURL(f);
    };

    window.fecharTelas = () => { document.querySelectorAll('.tela-full').forEach(t=>t.style.display='none'); };
    window.abrirMeuPerfil = () => abrirPerfil(window.user.uid);
    window.abrirPostar = () => document.getElementById('telaPostar').style.display='block';
    window.abrirCarteira = () => document.getElementById('telaCarteira').style.display='block';
</script>
</body>
</html>
