<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ICE TROCAS - Oficial</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        :root { --bg: #0d1117; --sea: #0f3452; --blue: #1877f2; --gold: #FFD700; --white: #fff; --green: #25d366; --red: #ff4d4d; --mod-blue: #00BFFF; --gray: #30363d; }
        body { margin:0; font-family: sans-serif; background: var(--bg); color: white; padding-bottom: 90px; overflow-x: hidden; }
        #telaLogin { position: fixed; inset: 0; background: var(--sea); z-index: 5000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: white; padding: 30px; border-radius: 20px; width: 85%; max-width: 350px; text-align: center; color: black; }
        .login-box input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        .badge-star { font-size: 14px; display: flex; gap: 4px; align-items: center; justify-content: center; margin-bottom: 5px; }
        .star-mod { color: var(--mod-blue); } .star-adm2 { color: var(--red); } .star-adm1 { color: var(--gold); }
        .side-menu { position: fixed; right: 15px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 10px; z-index: 999; }
        .btn-float { width: 42px; height: 42px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; color: white; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.4); font-size: 16px; }
        header { padding:15px; background: #161b22; display:flex; justify-content:space-between; align-items:center; border-bottom: 1px solid #30363d; position: sticky; top:0; z-index:100; }
        .card-timeline { background: #161b22; border-radius: 15px; overflow: hidden; margin: 15px; border: 1px solid #30363d; }
        .card-timeline img { width: 100%; height: 320px; object-fit: cover; }
        .card-info { padding: 15px; }
        .nav { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); background: #161b22; border: 1px solid #30363d; display: flex; gap: 25px; padding: 12px 30px; border-radius: 40px; z-index: 3000; }
        .nav i { color: #8b949e; font-size: 22px; cursor: pointer; }
        .tela-full { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 2000; overflow-y: auto; padding: 20px; }
        .btn-action { background: var(--blue); color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .grid-postagens { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-top: 15px; }
        .user-photo { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; border: 3px solid var(--blue); margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="side-menu" id="menuFlutuante" style="display:none;">
    <button class="btn-float" style="background: var(--gold); color:black;" onclick="comprar('ADM1 SUPREMO', 'R$ 22.000.000')"><i class="fas fa-crown"></i></button>
    <button class="btn-float" style="background: var(--red);" onclick="comprar('ADM2', 'R$ 50')"><i class="fas fa-shield-alt"></i></button>
    <button class="btn-float" style="background: var(--mod-blue);" onclick="comprar('MOD', 'R$ 20')"><i class="fas fa-star"></i></button>
</div>

<div id="telaLogin"><div class="login-box"><h2>ICE TROCAS</h2><input type="text" id="userIn" placeholder="Login"><input type="password" id="passIn" placeholder="Senha"><button class="btn-action" onclick="fazerLogin()">ENTRAR</button></div></div>

<div id="app" style="display:none;">
    <header><b>ICE TROCAS</b> <i class="fas fa-user-circle" onclick="abrirPerfil(window.user.uid)" style="font-size:26px; color:var(--blue);"></i></header>
    <div id="feed"></div>
    <div class="nav">
        <i class="fas fa-home" onclick="fecharTelas()"></i>
        <i class="fas fa-plus-circle" onclick="abrirPostar()" style="color:var(--blue); font-size: 28px;"></i>
        <i class="fas fa-wallet" onclick="abrirCarteira()"></i>
    </div>
</div>

<div id="telaPerfil" class="tela-full">
    <div id="perfilConteudo" style="text-align:center;"></div>
    <div id="areaEditar" style="display:none;">
        <input type="file" id="fFoto" accept="image/*" onchange="prepararFoto(this)">
        <button class="btn-action" onclick="salvarPerfil()">SALVAR</button>
        <button class="btn-action" style="background:var(--green)" onclick="compartilhar()">CONVIDAR AMIGOS</button>
    </div>
    <div id="painelAdm" style="display:none;">
        <button class="btn-action" onclick="mudarCargo('ADM1')">TORNAR ADM1</button>
        <button class="btn-action" onclick="mudarCargo('MOD')">TORNAR MOD</button>
    </div>
    <button class="btn-action" onclick="fecharTelas()">VOLTAR</button>
</div>

<div id="telaChat" class="tela-full">
    <h2 id="chatTitle">Chat</h2>
    <div id="mensagens" style="height:300px; overflow-y:auto; background:#161b22; padding:10px;"></div>
    <input type="text" id="msgIn" placeholder="Mensagem...">
    <button class="btn-action" onclick="enviarMsg()">ENVIAR</button>
    <button class="btn-action" style="background:var(--red)" onclick="fecharTelas()">FECHAR</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, update, set, push, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const db = getDatabase(initializeApp({ apiKey: "AIzaSyDM5M1_O-wfcBDGYJIiYgiHVbqhiKC-0dw", databaseURL: "https://icek-9cdd7-default-rtdb.firebaseio.com", projectId: "icek-9cdd7" }));
    const auth = getAuth();
    let targetUid = null;
    let base64Foto = "";

    window.fazerLogin = async () => {
        const u = document.getElementById('userIn').value;
        const p = document.getElementById('passIn').value;
        if(u==="ADM" && p==="1533"){ const m = {nome:"MASTER", cargo:"ADM1", uid:"master_ice", filhos:0}; await set(ref(db, 'usuarios/master_ice'), m); localStorage.setItem('ice_user', JSON.stringify(m)); location.reload(); }
        else { try { const res = await createUserWithEmailAndPassword(auth, u, p); await set(ref(db, 'usuarios/'+res.user.uid), {nome:u, cargo:'user', uid:res.user.uid, filhos:0}); } catch(e) { await signInWithEmailAndPassword(auth, u, p); } }
    };

    onAuthStateChanged(auth, async (u) => {
        if(u) { const s = await get(ref(db, 'usuarios/'+u.uid)); window.user = s.val(); document.getElementById('telaLogin').style.display='none'; document.getElementById('app').style.display='block'; document.getElementById('menuFlutuante').style.display='flex'; }
    });

    window.abrirPerfil = async (uid) => {
        targetUid = uid;
        const s = await get(ref(db, 'usuarios/'+uid)); const t = s.val();
        document.getElementById('perfilConteudo').innerHTML = `<img src="${t.foto||''}" class="user-photo"><h2>${t.nome}</h2><p>Pai de: ${t.filhos||0}</p>`;
        document.getElementById('areaEditar').style.display = (uid === window.user.uid) ? 'block' : 'none';
        document.getElementById('painelAdm').style.display = (window.user.cargo === 'ADM1' && uid !== window.user.uid) ? 'block' : 'none';
        document.getElementById('telaPerfil').style.display = 'block';
    };

    window.mudarCargo = async (c) => { await update(ref(db, 'usuarios/'+targetUid), {cargo:c}); alert("Cargo atualizado!"); abrirPerfil(targetUid); };
    window.prepararFoto = (i) => { const r = new FileReader(); r.onload=(e)=>{ base64Foto = e.target.result; }; r.readAsDataURL(i.files[0]); };
    window.salvarPerfil = async () => { await update(ref(db, 'usuarios/'+window.user.uid), {foto: base64Foto}); alert("Salvo!"); };
    window.compartilhar = () => { navigator.clipboard.writeText(window.location.origin + window.location.pathname + "?ref="+window.user.uid); alert("Link copiado!"); };
    window.abrirChat = (n, uid) => { document.getElementById('telaChat').style.display='block'; };
    window.fecharTelas = () => { document.querySelectorAll('.tela-full').forEach(t=>t.style.display='none'); };
    window.comprar = (c, v) => alert("PIX: thiago00dudu@gmail.com | Valor: "+v);
</script>
</body>
</html>
