<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ICE TROCAS - Oficial</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        :root { --bg: #f4f7f9; --sea: #0f3452; --blue: #1877f2; --gold: #FFD700; --white: #fff; --green: #25d366; --red: #ff4d4d; }
        body { margin:0; font-family: sans-serif; background: var(--bg); padding-bottom: 90px; }
        header { padding:15px; background: var(--white); display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:100; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .wrap { max-width: 500px; margin: auto; padding: 15px; }
        
        .card-timeline { background: var(--white); border-radius: 15px; overflow: hidden; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); position: relative; }
        .card-timeline img { width: 100%; height: 320px; object-fit: cover; cursor: pointer; }
        
        .nav { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); background: var(--sea); display: flex; gap: 25px; padding: 12px 25px; border-radius: 40px; z-index: 3000; box-shadow: 0 10px 20px rgba(0,0,0,0.2); align-items: center; }
        .nav i { color: white; font-size: 20px; cursor: pointer; }

        #telaPerfil, #telaChat, #telaFinanceiro { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 2000; overflow-y: auto; }
        
        .card-financeiro { background: white; padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 15px; border: 1px solid #ddd; }
        .btn-adm { background: var(--sea); color: white; border: none; padding: 8px; border-radius: 5px; font-size: 11px; cursor: pointer; margin: 2px; width: 100%; font-weight: bold; }
        .btn-ban { background: var(--red); color: white; border: none; padding: 5px 10px; border-radius: 5px; font-size: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div id="app">
    <header>
        <div><b>ICE TROCAS</b><br><small id="btcValue" style="color:var(--blue); font-weight: bold;"></small></div>
        <button onclick="deslogar()" style="border:none; background:none; color:red; font-weight:bold; cursor:pointer;">SAIR</button>
    </header>
    
    <div class="wrap" id="feed"></div>
    
    <div class="nav">
        <i class="fas fa-home" onclick="fecharTelas()"></i>
        <i class="fas fa-university" onclick="abrirFin()"></i>
        <i class="fas fa-share-alt" onclick="compartilharApp()" style="color: var(--gold);"></i>
        <i class="fas fa-wallet" onclick="abrirFin()"></i>
        <i class="fas fa-user-circle" onclick="abrirPerfil(window.user.nome)"></i>
    </div>
</div>

<div id="telaFinanceiro">
    <div class="wrap">
        <h2 style="text-align:center; color:var(--sea);">Loja de Cargos</h2>
        <div class="card-financeiro">
            <h3>MODERADOR</h3>
            <p style="color: var(--green); font-size: 20px; font-weight: bold;">R$ 20,00</p>
            <button class="btn-adm" onclick="comprarCargo(0.0050)">COPIAR PIX R$ 20</button>
        </div>
        <div style="text-align:center; background: white; padding: 15px; border-radius: 15px;">
             <p style="font-size:12px;">Seu Saldo: <b id="meuSaldoBlue" style="color:var(--blue);">0</b> BLUE</p>
             <button onclick="fecharTelas()" style="color:red; border:none; background:none; font-weight:bold;">Voltar ao App</button>
        </div>
    </div>
</div>

<div id="telaPerfil">
    <div style="height:140px; background:var(--sea);">
        <button onclick="fecharTelas()" style="margin:10px; border:none; background:rgba(0,0,0,0.5); color:white; border-radius:50%; width:35px; height:35px;">←</button>
    </div>
    <div class="wrap" style="margin-top:-45px;">
        <div id="pAvatar" style="width:90px; height:90px; border-radius:50%; border:4px solid white; background:#eee center/cover;"></div>
        <h2 id="perfNome" style="margin-bottom:0;"></h2>
        <p id="perfCargo" style="font-size:12px; color:var(--blue); font-weight:bold;"></p>
        <p style="font-size:13px;">Saldo: <span id="perfSaldoBlue" style="font-weight:bold; color:var(--blue);">0</span> BLUE</p>
        
        <div id="painelGestao" style="display:none; border:1px solid #ccc; padding:15px; border-radius:15px; background:white; margin-top:10px;">
            <small id="txtGestao" style="font-weight:bold; color:var(--sea);"></small><br><br>
            <div id="botoesGestao"></div>
        </div>

        <hr>
        <div id="perfilPosts"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, update, set, runTransaction, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = { apiKey: "AIzaSyDM5M1_O-wfcBDGYJIiYgiHVbqhiKC-0dw", databaseURL: "https://icek-9cdd7-default-rtdb.firebaseio.com", projectId: "icek-9cdd7" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Carrega ou Cria Usuário
    window.user = { 
        nome: localStorage.getItem('ice_user') || "User_" + Math.floor(Math.random()*999),
        id: localStorage.getItem('ice_id') || "ID_" + Math.floor(Math.random()*9999)
    };
    localStorage.setItem('ice_user', window.user.nome);
    localStorage.setItem('ice_id', window.user.id);

    // Sincroniza Cargo Real do Usuário Logado
    onValue(ref(db, 'usuarios/' + window.user.nome), (s) => {
        if(s.exists()) window.user.cargo = s.val().cargo || "USER";
        else window.user.cargo = "USER";
    });

    // CORREÇÃO: Função Sair
    window.deslogar = () => {
        localStorage.clear();
        location.reload();
    };

    // MOEDA ICE
    onValue(ref(db, 'economia/valor_ice'), (snap) => {
        const v = snap.val() || 0.7099;
        document.getElementById('btcValue').innerHTML = `<i class="fas fa-coins"></i> ICE: $${v.toFixed(4)}`;
    });

    // FEED COM MODERAÇÃO (ADM 1 APAGA TUDO)
    onValue(ref(db, 'posts'), (snap) => {
        const f = document.getElementById('feed'); f.innerHTML = "";
        snap.forEach(c => {
            const p = c.val();
            const div = document.createElement('div');
            div.className = "card-timeline";
            let btnDel = (window.user.cargo === "ADM 1") ? `<button class="btn-ban" style="position:absolute; top:10px; right:10px;" onclick="apagarPost('${c.key}')">Apagar</button>` : "";
            div.innerHTML = `${btnDel}<img src="${p.i1}" onclick="abrirPerfil('${p.u1}')"><div style="padding:15px;"><b>${p.u1}</b></div>`;
            f.prepend(div);
        });
    });

    window.apagarPost = (id) => { if(confirm("Apagar post?")) remove(ref(db, 'posts/' + id)); };

    // GESTÃO DE USUÁRIOS POR HIERARQUIA
    let alvo = "";
    window.abrirPerfil = (nome) => {
        alvo = nome;
        onValue(ref(db, 'usuarios/' + nome), (snap) => {
            const d = snap.val() || { nome: nome, cargo: "USER", blue: 0 };
            document.getElementById('perfNome').innerText = d.nome;
            document.getElementById('perfCargo').innerText = "Cargo: " + d.cargo;
            document.getElementById('perfSaldoBlue').innerText = d.blue || 0;
            
            const painel = document.getElementById('painelGestao');
            const bts = document.getElementById('botoesGestao');
            bts.innerHTML = ""; painel.style.display = "none";

            if(nome !== window.user.nome) {
                // Lógica de Poderes
                let podeGerir = false;
                
                // ADM 1: Poder Total
                if(window.user.cargo === "ADM 1") {
                    podeGerir = true;
                    document.getElementById('txtGestao').innerText = "CONTROLE SUPREMO ADM 1";
                    bts.innerHTML += `<button class="btn-adm" onclick="mudarCargo('MODERADOR')">SUBIR MODERADOR</button>`;
                    bts.innerHTML += `<button class="btn-adm" onclick="mudarCargo('ADM 2')">SUBIR ADM 2</button>`;
                    bts.innerHTML += `<button class="btn-adm" onclick="mudarCargo('ADM 1')">SUBIR ADM 1</button>`;
                    bts.innerHTML += `<button class="btn-adm" style="background:var(--blue)" onclick="addBlue()">ENVIAR 100 BLUE</button>`;
                    bts.innerHTML += `<button class="btn-adm" style="background:var(--red)" onclick="banir()">BANIR USUÁRIO</button>`;
                } 
                // ADM 2: Sobe Moderador e ADM 2
                else if(window.user.cargo === "ADM 2") {
                    podeGerir = true;
                    document.getElementById('txtGestao').innerText = "GESTÃO ADM 2";
                    bts.innerHTML += `<button class="btn-adm" onclick="mudarCargo('MODERADOR')">SUBIR MODERADOR</button>`;
                    bts.innerHTML += `<button class="btn-adm" onclick="mudarCargo('ADM 2')">SUBIR ADM 2</button>`;
                    bts.innerHTML += `<button class="btn-adm" style="background:var(--red)" onclick="banir()">BLOQUEAR USUÁRIO</button>`;
                }
                // MODERADOR: Sobe apenas Moderador
                else if(window.user.cargo === "MODERADOR") {
                    podeGerir = true;
                    document.getElementById('txtGestao').innerText = "GESTÃO MODERAÇÃO";
                    bts.innerHTML += `<button class="btn-adm" onclick="mudarCargo('MODERADOR')">SUBIR MODERADOR</button>`;
                    bts.innerHTML += `<button class="btn-adm" style="background:var(--red)" onclick="banir()">BLOQUEAR USUÁRIO</button>`;
                }

                if(podeGerir) painel.style.display = "block";
            }
            document.getElementById('telaPerfil').style.display = 'block';
        }, { onlyOnce: true });
    };

    window.mudarCargo = (c) => { update(ref(db, 'usuarios/' + alvo), { cargo: c }); alert(alvo + " agora é " + c); };
    window.addBlue = () => { runTransaction(ref(db, 'usuarios/' + alvo + '/blue'), (s) => (s || 0) + 100); };
    window.banir = () => { if(confirm("Deseja bloquear "+alvo+"?")) remove(ref(db, 'usuarios/' + alvo)); };

    // FINANCEIRO
    window.comprarCargo = (pump) => {
        runTransaction(ref(db, 'economia/valor_ice'), (v) => (v || 0.7099) + pump);
        navigator.clipboard.writeText("thiago00dudu@gmail.com");
        alert("Chave Pix Copiada!");
    };

    window.abrirFin = () => { 
        fecharTelas(); 
        document.getElementById('telaFinanceiro').style.display = 'block';
        onValue(ref(db, 'usuarios/' + window.user.nome + '/blue'), s => { document.getElementById('meuSaldoBlue').innerText = s.val() || 0; }, {onlyOnce: true});
    };
    window.fecharTelas = () => { document.querySelectorAll('#telaPerfil, #telaFinanceiro').forEach(t => t.style.display = 'none'); };
    window.compartilharApp = () => { navigator.clipboard.writeText(window.location.origin + "?ref=" + window.user.id); alert("Link Copiado!"); };

</script>
</body>
</html>
