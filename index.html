<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICE "trocas" - Rede de Trocas</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        /* DESIGN JOGADO PARA A IMAGEM - TEMA CONGELADO */
        :root {
            --bg: #f0f7ff; /* Fundo gelo bem claro */
            --ice-blue: #a8dadc; /* Azul gelo */
            --sea: #0f3452; /* Azul escuro original */
            --blue: #1877f2; /* Azul Bitcoin */
            --gold: #ffd700; /* Dourado Bitcoin */
            --white: #fff;
            --crystal-border: 1px solid rgba(255, 255, 255, 0.5); /* Borda cristal */
        }

        body { 
            margin:0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg); 
            color: var(--sea); 
        }

        /* CABEÇALHO GIGANTE COM DESIGN DA IMAGEM */
        .topo-visual {
            height: 350px;
            background: 
                linear-gradient(rgba(15, 52, 82, 0.7), rgba(168, 218, 220, 0.5)),
                url('https://i.imgur.com/kS5xT6g.png'); /* AQUI VAI A IMAGEM DO URSO/BITCOIN */
            background-size: cover;
            background-position: center;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-bottom: 5px solid var(--ice-blue);
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        .topo-visual h1 {
            margin: 0;
            font-size: 60px;
            color: white;
            letter-spacing: 10px;
            font-weight: 900;
            text-shadow: 0 0 15px rgba(255,255,255,0.8), 3px 3px 5px rgba(0,0,0,0.5);
            -webkit-text-stroke: 1px var(--sea);
        }

        .topo-visual p {
            margin: 5px 0 0;
            font-size: 16px;
            color: white;
            background: rgba(15, 52, 82, 0.5);
            padding: 5px 15px;
            border-radius: 15px;
            letter-spacing: 3px;
        }

        header { 
            padding:15px; 
            background: rgba(255, 255, 255, 0.9); 
            display:flex; 
            justify-content:space-between; 
            align-items:center; 
            position:sticky; 
            top:0; 
            z-index:100; 
            border-bottom: 1px solid #ddd; 
            backdrop-filter: blur(5px); /* Efeito vidro */
        }

        .wrap { 
            max-width: 500px; 
            margin: auto; 
            padding: 15px; 
            padding-bottom: 100px; 
        }

        /* CARDS ESTILO CRISTAL */
        .card { 
            background: rgba(255, 255, 255, 0.8); 
            border-radius: 15px; 
            padding: 15px; 
            margin-bottom: 15px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.1); 
            border: var(--crystal-border); 
        }

        /* FEED E NEGOCIAÇÃO */
        .dupla { display: flex; gap: 10px; position: relative; margin-top: 10px; }
        .lado { 
            flex: 1; 
            text-align: center; 
            background: #f1f9ff; 
            padding: 10px; 
            border-radius: 12px; 
            border: 1px solid var(--ice-blue); 
        }
        .lado img { width: 100%; height: 140px; object-fit: cover; border-radius: 10px; border: 1px solid #ddd; }
        
        .vs { 
            position: absolute; 
            left: 50%; top: 50%; 
            transform: translate(-50%, -50%); 
            background: var(--sea); 
            color: white; 
            border-radius: 50%; 
            width: 35px; height: 35px; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 12px; 
            border: 3px solid white; 
            font-weight: bold; 
            z-index: 10; 
        }

        /* PERFIL SOCIAL */
        #telaPerfil { 
            display: none; 
            background: white; 
            min-height: 100vh; 
            position: fixed; 
            inset: 0; 
            z-index: 500; 
            overflow-y: auto; 
        }
        .capa { 
            height: 180px; 
            background: linear-gradient(135deg, var(--sea), var(--ice-blue)); 
            width: 100%; 
            position: relative; 
            border-bottom: 4px solid var(--gold);
        }
        .foto-perfil { 
            width: 120px; 
            height: 120px; 
            border-radius: 50%; 
            border: 5px solid white; 
            position: absolute; 
            bottom: -60px; 
            left: 20px; 
            background: #eee; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 60px; 
            color: #ccc; 
        }
        .info-perfil { margin-top: 70px; padding: 20px; }

        /* UTILITÁRIOS */
        .user-link { cursor: pointer; color: var(--blue); font-weight: bold; text-decoration: none; display: block; margin-top: 5px; }
        .user-link:hover { text-decoration: underline; }
        
        .btn-main { background: var(--sea); color: white; border: none; font-weight: bold; padding: 12px; border-radius: 10px; cursor: pointer; width: 100%; }
        .btn-adm { background: var(--gold); color: #000; margin-top: 10px; width: 100%; }
        .btn-block { background: #ff4d4d; color: #fff; margin-top: 5px; width: 100%; }
        
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid var(--ice-blue); border-radius: 10px; box-sizing: border-box; background: #fff; }
    </style>
</head>
<body>

<div id="loginS" style="position:fixed; inset:0; background:var(--bg); z-index:1000; display:flex; align-items:center; justify-content:center;">
    <div class="card" style="width:85%; text-align:center; max-width: 350px;">
        <div style="font-size: 40px; color: var(--sea); font-weight: 900; margin-bottom: 10px; text-transform:uppercase; letter-spacing:5px;">ICE</div>
        <p>Acesse a Rede de Trocas</p>
        <input type="text" id="inome" placeholder="Seu nome">
        <input type="password" id="ipass" placeholder="Senha">
        <button class="btn-main" onclick="logar()">ENTRAR</button>
    </div>
</div>

<div id="app" style="display:none">
    <div class="topo-visual">
        <h1>ICE</h1>
        <p>REDE DE TROCAS</p>
    </div>

    <header>
        <div id="statusUser" class="user-link" onclick="abrirPerfil(window.user.nome)">👤 Carregando...</div>
        <button onclick="location.reload()" style="width:auto; background:none; color:red; font-size:12px; border:none; cursor:pointer;">SAIR</button>
    </header>

    <div class="wrap">
        <div class="card">
            <b>Postar Troca</b>
            <input type="file" accept="image/*" onchange="preview(this)">
            <img id="p1" style="width:100%; display:none; margin:10px 0; border-radius:10px">
            <textarea id="d1" placeholder="O que você está trocando?"></textarea>
            <button class="btn-main" onclick="subirPost()">PUBLICAÇÃO RÁPIDA</button>
        </div>
        <div id="feed"></div>
    </div>
</div>

<div id="telaPerfil">
    <div class="capa">
        <button onclick="document.getElementById('telaPerfil').style.display='none'" style="position:absolute; top:20px; left:20px; width:auto; background:rgba(0,0,0,0.5); color:white; border-radius:20px; padding:5px 15px; border:none;">← Voltar</button>
        <div class="foto-perfil"><i class="fas fa-user"></i></div>
    </div>
    <div class="info-perfil">
        <h2 id="perfNome" style="margin:0">Nome do Usuário</h2>
        <p id="perfCargo" style="color: #666;"></p>
        <hr style="opacity:0.2">
        <div id="perfPai" style="color:green; font-weight:bold; margin-bottom:5px;"></div>
        <div id="perfFilhos" style="color:var(--sea); font-weight:bold;"></div>
        
        <div id="controlesAdm" style="display:none; margin-top:30px; padding:15px; background:#f9f9f9; border-radius:12px; border:1px solid #ddd;">
            <p style="margin:0"><b>Painel de Controle</b></p>
            <button class="btn-main btn-adm" onclick="mudarCargo('ADM2')">Promover a ADM Ouro</button>
            <button class="btn-main btn-adm" style="background:var(--blue); color:white;" onclick="mudarCargo('MOD')">Tornar Moderador</button>
            <button class="btn-main btn-block" onclick="mudarCargo('BLOCK')">Bloquear Usuário</button>
        </div>
    </div>
</div>

<script type="module">
    // LÓGICA DO FIREBASE MANTIDA
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push, onValue, update, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // MANTIVE SUAS CONFIGURAÇÕES ORIGINAIS
    const firebaseConfig = {
        apiKey: "AIzaSyDM5M1_O-wfcBDGYJIiYgiHVbqhiKC-0dw",
        databaseURL: "https://icek-9cdd7-default-rtdb.firebaseio.com",
        projectId: "icek-9cdd7"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let imgBase = "";
    window.user = { nome: "", cargo: "USER", pai: "" };
    window.alvoNome = "";

    window.logar = () => {
        const n = document.getElementById('inome').value.trim();
        const p = document.getElementById('ipass').value;
        if(!n) return alert("Nome!");

        onValue(ref(db, 'usuarios/' + n), (snap) => {
            let dados = snap.val();
            if(!dados) {
                dados = { nome: n, cargo: (p === "1533" ? "ADM1" : "USER"), pai: "Sistema" };
                set(ref(db, 'usuarios/' + n), dados);
            }
            if(dados.cargo === "BLOCK") return alert("Bloqueado!");
            window.user = dados;
            document.getElementById('loginS').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            document.getElementById('statusUser').innerText = "👤 " + n;
        }, { onlyOnce: true });
    };

    window.abrirPerfil = (nome) => {
        if(!nome) return;
        window.alvoNome = nome;
        onValue(ref(db, 'usuarios/' + nome), (snap) => {
            const d = snap.val();
            if(!d) return;

            document.getElementById('perfNome').innerText = d.nome;
            document.getElementById('perfCargo').innerText = "Cargo: " + (d.cargo === "ADM1" ? "ADM SUPREMO" : d.cargo === "ADM2" ? "ADM OURO" : d.cargo === "MOD" ? "MODERADOR" : "MEMBRO");
            document.getElementById('perfPai').innerText = "Convidado por: " + d.pai;
            
            // Lógica de Hierarquia nos botões
            const box = document.getElementById('controlesAdm');
            box.style.display = "none";
            if(window.user.nome !== nome) {
                if(window.user.cargo === "ADM1") box.style.display = "block";
                else if(window.user.cargo === "ADM2" && d.cargo !== "ADM1") box.style.display = "block";
                else if(window.user.cargo === "MOD" && d.cargo === "USER") box.style.display = "block";
            }

            document.getElementById('telaPerfil').style.display = 'block';
        }, { onlyOnce: true });
    };

    // FUNÇÕES DE POST
    window.preview = (input) => {
        const reader = new FileReader();
        reader.onload = (e) => {
            imgBase = e.target.result;
            document.getElementById('p1').src = imgBase;
            document.getElementById('p1').style.display = 'block';
        };
        reader.readAsDataURL(input.files[0]);
    };

    window.subirPost = () => {
        const d = document.getElementById('d1').value;
        if(!imgBase || !d) return alert("Preencha tudo!");
        push(ref(db, 'posts'), { u1: window.user.nome, d1: d, i1: imgBase, u2: "", d2: "", i2: "" });
        document.getElementById('d1').value = "";
        document.getElementById('p1').style.display = "none";
        imgBase = "";
    };

    // FEED
    onValue(ref(db, 'posts'), (snap) => {
        const feed = document.getElementById('feed');
        feed.innerHTML = "";
        let posts = [];
        snap.forEach(c => { posts.push({id: c.key, ...c.val()}) });
        posts.reverse().forEach(p => {
            const div = document.createElement('div');
            div.className = "card";
            div.innerHTML = `
                <div class="dupla">
                    <div class="lado">
                        <img src="${p.i1}">
                        <a class="user-link" onclick="abrirPerfil('${p.u1}')">${p.u1}</a>
                        <p style="font-size:11px; margin:5px 0;">${p.d1}</p>
                    </div>
                    <div class="vs">VS</div>
                    <div class="lado">
                        ${p.u2 ? `
                            <img src="${p.i2}">
                            <a class="user-link" onclick="abrirPerfil('${p.u2}')">${p.u2}</a>
                            <p style="font-size:11px; margin:5px 0;">${p.d2}</p>
                        ` : `<button onclick="ofertar('${p.id}')" style="margin-top:30px; font-size:10px; background:var(--blue); color:white; border:none; padding:10px; border-radius:10px; cursor:pointer;">OFERECER</button>`}
                    </div>
                </div>
            `;
            feed.appendChild(div);
        });
    });

    window.mudarCargo = (novo) => {
        update(ref(db, 'usuarios/' + window.alvoNome), { cargo: novo });
        alert("Atualizado!");
        abrirPerfil(window.alvoNome);
    };

    window.ofertar = (id) => {
        const txt = prompt("Sua oferta:");
        if(!txt) return;
        const inp = document.createElement('input');
        inp.type = 'file'; inp.accept = 'image/*';
        inp.onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                update(ref(db, `posts/${id}`), { u2: window.user.nome, d2: txt, i2: ev.target.result });
            };
            reader.readAsDataURL(e.target.files[0]);
        };
        inp.click();
    };
</script>
</body>
</html>
