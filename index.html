<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ICE TROCAS - Oficial</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        :root { --bg: #0d1117; --sea: #0f3452; --blue: #1877f2; --gold: #FFD700; --white: #fff; --green: #25d366; --red: #ff4d4d; --mod-blue: #00BFFF; --gray: #30363d; }
        body { margin:0; font-family: sans-serif; background: var(--bg); color: white; padding-bottom: 90px; overflow-x: hidden; }
        
        /* LOGIN */
        #telaLogin { position: fixed; inset: 0; background: var(--sea); z-index: 5000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: white; padding: 30px; border-radius: 20px; width: 85%; max-width: 350px; text-align: center; color: black; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .login-box input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }

        /* BANNER */
        .hero-banner { width: 100%; height: 220px; background: url('https://img2.unifans.io/67b9308608886.jpg') center/cover; position: relative; border-bottom: 3px solid var(--blue); }
        .hero-overlay { position: absolute; bottom: 0; background: linear-gradient(transparent, rgba(0,0,0,0.9)); width: 100%; padding: 15px; box-sizing: border-box; }

        /* ADS LATERAIS */
        .ads-side { position: fixed; right: 10px; top: 40%; transform: translateY(-50%); z-index: 4000; display: flex; flex-direction: column; gap: 12px; }
        .ad-circle { width: 70px; height: 70px; border-radius: 50%; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 9px; font-weight: bold; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5); cursor: pointer; border: 2px solid rgba(255,255,255,0.3); transition: 0.3s; }
        
        /* ESTRELAS */
        .star-mod { color: #00BFFF; margin-left: 5px; }
        .star-adm2 { color: #ff4d4d; margin-left: 5px; }
        .star-adm1 { color: #FFD700; margin-left: 5px; }

        header { padding:15px; background: #161b22; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:100; border-bottom: 1px solid #30363d; }
        .card-timeline { background: #161b22; border-radius: 15px; overflow: hidden; margin: 15px; border: 1px solid #30363d; cursor: pointer; }
        .card-timeline img { width: 100%; height: 300px; object-fit: cover; }

        .nav { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); background: #161b22; border: 1px solid #30363d; display: flex; gap: 25px; padding: 12px 30px; border-radius: 40px; z-index: 3000; }
        .nav i { color: #8b949e; font-size: 22px; cursor: pointer; }
        .nav i.active { color: var(--blue); }

        .tela-full { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 2000; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .btn-action { background: var(--blue); color: white; border: none; padding: 14px; border-radius: 8px; width: 100%; font-weight: bold; margin-top: 10px; cursor: pointer; }
        
        .profile-header { text-align: center; padding: 20px 0; }
        .profile-img { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid var(--blue); margin-bottom: 10px; }
        .profile-stats { display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid var(--gray); border-bottom: 1px solid var(--gray); margin: 15px 0; }
        
        #chatBox { height: 300px; overflow-y: auto; background: #0d1117; border-radius: 10px; padding: 10px; border: 1px solid var(--gray); margin-bottom: 10px; display: flex; flex-direction: column; }
        .msg { margin-bottom: 10px; padding: 8px 12px; border-radius: 10px; max-width: 80%; }
        .msg-me { background: var(--blue); align-self: flex-end; }
        .msg-them { background: var(--gray); align-self: flex-start; }
    </style>
</head>
<body>

<div id="telaLogin">
    <div class="login-box">
        <h2 style="margin-top:0;">ICE TROCAS</h2>
        <p style="font-size:12px; color:#666;">Entre como ADM ou use o Google</p>
        <input type="text" id="userIn" placeholder="Usuário ou E-mail">
        <input type="password" id="passIn" placeholder="Senha">
        <button class="btn-action" style="background:var(--sea);" onclick="fazerLogin()">ENTRAR / CADASTRAR</button>
        <button class="btn-action" style="background:#db4437;" onclick="loginGoogle()">ENTRAR COM GOOGLE</button>
    </div>
</div>

<div class="ads-side">
    <div class="ad-circle" style="background: var(--mod-blue);" onclick="comprarCargo('MOD')">MOD<br>R$ 20</div>
    <div class="ad-circle" style="background: var(--red);" onclick="comprarCargo('ADM2')">ADM 2<br>R$ 1k</div>
    <div class="ad-circle" style="background: var(--gold); color: black;" onclick="comprarCargo('ADM1')">DONO<br>ICE $</div>
    <div class="ad-circle" style="background: var(--green);" onclick="compartilharApp()"><i class="fas fa-share-alt"></i><br>CONVIDAR</div>
</div>

<div id="app" style="display:none;">
    <header>
        <div><b>ICE TROCAS</b><br><small id="statusConect" style="color:var(--blue);">Online</small></div>
        <div onclick="abrirMeuPerfil()" style="cursor:pointer;"><i class="fas fa-user-circle" style="font-size:24px;"></i></div>
    </header>
    <div class="hero-banner"><div class="hero-overlay"><h2>O que vamos trocar hoje?</h2><small>1 BLUE = R$ 1,00</small></div></div>
    <div id="feed"></div>
    <div class="nav">
        <i class="fas fa-home active" onclick="fecharTelas()"></i>
        <i class="fas fa-plus-circle" onclick="abrirPostar()" style="color: var(--blue);"></i>
        <i class="fas fa-wallet" onclick="abrirCarteira()"></i>
    </div>
</div>

<div id="telaPerfil" class="tela-full">
    <div id="perfilConteudo"></div>
    <div id="minhasPostagens" style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-top: 20px;"></div>
    <button class="btn-action" style="background:#30363d; margin-top:20px;" onclick="fecharTelas()">VOLTAR</button>
    <button class="btn-action" style="background:var(--red);" onclick="deslogar()">SAIR</button>
</div>

<div id="telaPostar" class="tela-full">
    <h2>Nova Postagem</h2>
    <input type="file" id="filePost" accept="image/*">
    <input type="text" id="descPost" placeholder="O que você quer trocar?" style="width:100%; padding:15px; margin: 15px 0; background:#161b22; color:white; border:1px solid #30363d; border-radius:8px;">
    <button class="btn-action" onclick="enviarPost()">POSTAR AGORA</button>
    <button class="btn-action" style="background:none;" onclick="fecharTelas()">Cancelar</button>
</div>

<div id="telaCarteira" class="tela-full">
    <div style="background:linear-gradient(135deg, var(--sea), var(--blue)); padding:50px 20px; border-radius:20px; text-align:center;">
        <p>Meu Saldo Atual</p>
        <h1 id="saldoBlue">0</h1>
        <small>BLUE COINS</small>
    </div>
    <button class="btn-action" style="margin-top:20px;" onclick="fecharTelas()">VOLTAR</button>
</div>

<div id="telaChat" class="tela-full">
    <h3 id="chatTitle">Chat</h3>
    <div id="chatBox"></div>
    <div style="display:flex; gap:5px;">
        <input type="text" id="msgIn" placeholder="Sua mensagem..." style="flex:1; padding:12px; border-radius:8px; border:none;">
        <button onclick="enviarMensagem()" style="background:var(--blue); border:none; color:white; padding:10px 20px; border-radius:8px;"><i class="fas fa-paper-plane"></i></button>
    </div>
    <button class="btn-action" style="background:none;" onclick="fecharTelas()">Fechar</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, update, set, push, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = { apiKey: "AIzaSyDM5M1_O-wfcBDGYJIiYgiHVbqhiKC-0dw", databaseURL: "https://icek-9cdd7-default-rtdb.firebaseio.com", projectId: "icek-9cdd7" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    window.user = null;
    let chatAtivoId = null;

    // --- HIERARQUIA ---
    function obterEstrela(cargo) {
        if(cargo === 'MOD') return '<i class="fas fa-star star-mod"></i>';
        if(cargo === 'ADM2') return '<i class="fas fa-star star-adm2"></i>';
        if(cargo === 'ADM1') return '<i class="fas fa-star star-adm1"></i>';
        return '';
    }

    // --- LOGIN DESTRAVADO ---
    window.mostrarApp = () => {
        document.getElementById('telaLogin').style.display = 'none';
        document.getElementById('app').style.display = 'block';
    };

    window.fazerLogin = async () => {
        const u = document.getElementById('userIn').value;
        const p = document.getElementById('passIn').value;
        
        if(u.toUpperCase() === "ADM" && p === "1533") {
            window.user = { nome: "ADM MASTER", cargo: "ADM1", uid: "master", moedasBlue: 999999, foto: 'https://cdn-icons-png.flaticon.com/512/711/711769.png' };
            localStorage.setItem('ice_master', JSON.stringify(window.user));
            mostrarApp();
            carregarDadosIniciais();
            return;
        }

        try { 
            await signInWithEmailAndPassword(auth, u, p); 
        } catch (e) { 
            try { await createUserWithEmailAndPassword(auth, u, p); } 
            catch (err) { alert("Erro no login ou senha curta."); } 
        }
    };
    
    window.loginGoogle = () => signInWithPopup(auth, provider);

    onAuthStateChanged(auth, async (u) => {
        const local = localStorage.getItem('ice_master');
        if (local) { 
            window.user = JSON.parse(local); 
            mostrarApp(); 
            carregarDadosIniciais();
        } else if (u) {
            const snap = await get(ref(db, `usuarios/${u.uid}`));
            let dados = snap.val();
            if(!dados) {
                dados = { nome: u.displayName || "Novato", cargo: 'user', moedasBlue: 0, uid: u.uid, foto: u.photoURL || '', bio: 'Disponível para trocas!' };
                await set(ref(db, `usuarios/${u.uid}`), dados);
            }
            window.user = dados; 
            mostrarApp();
            carregarDadosIniciais();
        }
    });

    function carregarDadosIniciais() {
        onValue(ref(db, 'posts'), carregarFeed);
        onValue(ref(db, `usuarios/${window.user.uid}`), s => { 
            if(s.exists()) {
                window.user = s.val();
                document.getElementById('saldoBlue').innerText = window.user.moedasBlue || 0;
            }
        });
    }

    // --- FEED ---
    function carregarFeed(snap) {
        const f = document.getElementById('feed'); f.innerHTML = "";
        snap.forEach(c => {
            const p = c.val();
            const div = document.createElement('div');
            div.className = "card-timeline";
            div.onclick = () => abrirPerfilAlheio(p.uid);
            div.innerHTML = `<img src="${p.i1}"><div style="padding:15px;"><b>${p.u1} ${obterEstrela(p.cargo)}</b><br><small>${p.d1}</small></div>`;
            f.prepend(div);
        });
    }

    // --- PERFIL E BLUE ---
    window.abrirMeuPerfil = () => abrirPerfilAlheio(window.user.uid);

    window.abrirPerfilAlheio = async (targetUid) => {
        const snap = await get(ref(db, `usuarios/${targetUid}`));
        const target = snap.val();
        if(!target) return;

        const eMeu = window.user.uid === targetUid;
        const souAdmin = window.user.cargo === 'ADM1' || window.user.uid === 'master';

        let htmlAcao = eMeu ? `<p>Seu Perfil</p>` : `<button class="btn-action" onclick="abrirChat('${target.uid}', '${target.nome}')">NEGOCIAR</button>`;
        
        // BOTÃO DE ADD/REMOVER BLUE (SÓ ADM VÊ)
        if(souAdmin && !eMeu) {
            htmlAcao += `<button class="btn-action" style="background:var(--gold); color:black;" onclick="modificarBlue('${target.uid}', ${target.moedasBlue || 0})">EDITAR BLUE COINS</button>`;
        }

        document.getElementById('perfilConteudo').innerHTML = `
            <div class="profile-header">
                <img src="${target.foto || 'https://www.w3schools.com/howto/img_avatar.png'}" class="profile-img">
                <h2>${target.nome} ${obterEstrela(target.cargo)}</h2>
                <p>${target.bio || ''}</p>
                ${htmlAcao}
            </div>
            <div class="profile-stats">
                <div><b>${target.moedasBlue || 0}</b><br><small>BLUE</small></div>
                <div><b>${target.cargo}</b><br><small>CARGO</small></div>
            </div>
        `;
        document.getElementById('telaPerfil').style.display = 'block';
    };

    window.modificarBlue = async (uid, atual) => {
        const valor = prompt("Saldo atual: " + atual + "\nDigite o valor para ADICIONAR ou REMOVER (use - para tirar):");
        if(valor === null) return;
        const novo = parseInt(atual) + parseInt(valor);
        await update(ref(db, `usuarios/${uid}`), { moedasBlue: novo });
        alert("Saldo atualizado!");
        abrirPerfilAlheio(uid);
    };

    // --- POSTAR ---
    window.enviarPost = () => {
        const file = document.getElementById('filePost').files[0];
        if(!file) return alert("Falta a foto!");
        const r = new FileReader();
        r.onload = (e) => {
            push(ref(db, 'posts'), { 
                u1: window.user.nome, 
                uid: window.user.uid, 
                cargo: window.user.cargo, 
                i1: e.target.result, 
                d1: document.getElementById('descPost').value 
            });
            fecharTelas();
        };
        r.readAsDataURL(file);
    };

    // --- CHAT ---
    window.abrirChat = (id, nome) => {
        chatAtivoId = [window.user.uid, id].sort().join("_");
        document.getElementById('chatTitle').innerText = nome;
        document.getElementById('telaChat').style.display = 'block';
        onValue(ref(db, `chats/${chatAtivoId}`), (s) => {
            const b = document.getElementById('chatBox'); b.innerHTML = "";
            s.forEach(m => {
                const msg = m.val();
                b.innerHTML += `<div class="msg ${msg.uid === window.user.uid ? 'msg-me':'msg-them'}"><b>${msg.u}:</b><br>${msg.t}</div>`;
            });
            b.scrollTop = b.scrollHeight;
        });
    };

    window.enviarMensagem = () => {
        const t = document.getElementById('msgIn').value;
        if(!t) return;
        push(ref(db, `chats/${chatAtivoId}`), { uid: window.user.uid, u: window.user.nome, t: t });
        document.getElementById('msgIn').value = "";
    };

    // --- AUXILIARES ---
    window.fecharTelas = () => {
        document.querySelectorAll('.tela-full').forEach(t => t.style.display = 'none');
    };
    window.abrirPostar = () => document.getElementById('telaPostar').style.display = 'block';
    window.abrirCarteira = () => document.getElementById('telaCarteira').style.display = 'block';
    window.deslogar = () => { localStorage.removeItem('ice_master'); signOut(auth).then(() => location.reload()); };
    window.comprarCargo = (c) => { window.open("https://wa.me/5511983602504?text=Quero+ser+" + c); };
    window.compartilharApp = () => { alert("Link copiado!"); navigator.clipboard.writeText(window.location.href); };
</script>
</body>
    </html>
