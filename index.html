<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ICE TROCAS - Oficial</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        :root { --bg: #f4f7f9; --sea: #0f3452; --blue: #1877f2; --gold: #FFD700; --white: #fff; --green: #25d366; --red: #ff4d4d; }
        body { margin:0; font-family: sans-serif; background: var(--bg); padding-bottom: 90px; }
        header { padding:15px; background: var(--white); display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:100; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .wrap { max-width: 500px; margin: auto; padding: 15px; }
        
        /* TIMELINE */
        .card-timeline { background: var(--white); border-radius: 15px; overflow: hidden; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); position: relative; }
        .card-timeline img { width: 100%; height: 320px; object-fit: cover; cursor: pointer; }
        .post-info { padding: 12px; }

        /* NAV RODAPÉ */
        .nav { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); background: var(--sea); display: flex; gap: 20px; padding: 12px 20px; border-radius: 40px; z-index: 3000; box-shadow: 0 10px 20px rgba(0,0,0,0.2); align-items: center; }
        .nav i { color: white; font-size: 18px; cursor: pointer; }

        /* TELAS */
        #telaPerfil, #telaFinanceiro, #telaPostar { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 2000; overflow-y: auto; }
        
        .btn-adm { background: var(--sea); color: white; border: none; padding: 8px; border-radius: 5px; font-size: 11px; cursor: pointer; margin: 2px; width: 100%; font-weight: bold; }
        .btn-whats { background: var(--green); color: white; text-decoration: none; display: block; padding: 12px; border-radius: 8px; font-weight: bold; text-align: center; margin-top: 10px; }
        
        /* INPUTS DISCRETOS */
        .input-file { display: none; }
        .edit-label { font-size: 10px; background: rgba(0,0,0,0.5); color: white; padding: 4px 8px; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div id="app">
    <header>
        <div><b>ICE TROCAS</b><br><small id="btcValue" style="color:var(--blue); font-weight: bold;"></small></div>
        <button onclick="deslogar()" style="border:none; background:none; color:red; font-weight:bold; cursor:pointer;">SAIR / TROCAR</button>
    </header>
    
    <div class="wrap" id="feed"></div>
    
    <div class="nav">
        <i class="fas fa-home" onclick="fecharTelas()"></i>
        <i class="fas fa-plus-circle" onclick="abrirPostar()" style="font-size: 24px; color: var(--blue);"></i>
        <i class="fas fa-university" onclick="abrirFin()"></i>
        <i class="fas fa-share-alt" onclick="compartilharApp()" style="color: var(--gold);"></i>
        <i class="fas fa-user-circle" onclick="abrirPerfil(window.user.nome)"></i>
    </div>
</div>

<div id="telaPostar">
    <div class="wrap">
        <h2 style="color:var(--sea);">Nova Troca</h2>
        <div style="background:white; padding:20px; border-radius:15px; text-align:center;">
            <label class="btn-adm" style="display:block; padding:20px; background:#eee; color:#666; border:2px dashed #ccc;">
                <i class="fas fa-camera fa-2x"></i><br>Escolher Foto do Produto
                <input type="file" id="filePost" class="input-file" accept="image/*">
            </label>
            <input type="text" id="descPost" placeholder="O que você está trocando?" style="width:100%; padding:12px; margin-top:15px; border-radius:10px; border:1px solid #ddd; box-sizing:border-box;">
            <button class="btn-adm" onclick="enviarPost()" style="margin-top:15px; background:var(--green);">POSTAR NA TIMELINE</button>
            <button onclick="fecharTelas()" style="margin-top:10px; border:none; background:none; color:red;">Cancelar</button>
        </div>
    </div>
</div>

<div id="telaFinanceiro">
    <div class="wrap">
        <h2 style="text-align:center; color:var(--sea);">Loja e Suporte</h2>
        <div class="card-financeiro">
            <h3>MODERADOR</h3>
            <p style="color: var(--green); font-size: 20px; font-weight: bold;">R$ 20,00</p>
            <button class="btn-adm" onclick="comprarCargo(0.0050)">COPIAR PIX R$ 20</button>
        </div>
        
        <div style="background:white; padding:15px; border-radius:15px;">
            <p style="font-size:13px; text-align:center;">Chave: <b>thiago00dudu@gmail.com</b></p>
            <a href="https://wa.me/5511983602504?text=Olá ADM, enviei o Pix!" class="btn-whats">
                <i class="fab fa-whatsapp"></i> ENVIAR COMPROVANTE
            </a>
            <button onclick="fecharTelas()" style="width:100%; margin-top:15px; border:none; background:none; color:red;">Voltar</button>
        </div>
    </div>
</div>

<div id="telaPerfil">
    <div id="perfCapa" style="height:140px; background:var(--sea) no-repeat center/cover; position:relative;">
        <button onclick="fecharTelas()" style="margin:10px; border:none; background:rgba(0,0,0,0.5); color:white; border-radius:50%; width:35px; height:35px;">←</button>
        <label id="btnEditCapa" class="edit-label" style="position:absolute; bottom:10px; right:10px; display:none;">Editar Capa <input type="file" id="inCapa" class="input-file"></label>
    </div>
    <div class="wrap" style="margin-top:-45px;">
        <div id="pAvatar" style="width:90px; height:90px; border-radius:50%; border:4px solid white; background:#eee center/cover; position:relative;">
            <label id="btnEditAvatar" class="edit-label" style="position:absolute; bottom:0; right:0; display:none;"><i class="fas fa-camera"></i> <input type="file" id="inAvatar" class="input-file"></label>
        </div>
        <h2 id="perfNome" style="margin-bottom:0;"></h2>
        <p id="perfBio" style="font-size:13px; color:#555; margin:5px 0;"></p>
        <button id="btnEditBio" onclick="editarBio()" style="display:none; font-size:10px; border:none; background:none; color:var(--blue); padding:0;">Editar Bio</button>
        <p id="perfCargo" style="font-size:12px; color:var(--blue); font-weight:bold; margin-top:5px;"></p>
        
        <div id="painelGestao" style="display:none; border:1px solid #ccc; padding:15px; border-radius:15px; background:white; margin-top:10px;">
            <small id="txtGestao" style="font-weight:bold; color:var(--sea);"></small><div id="botoesGestao"></div>
        </div>
        <hr>
        <div id="perfilPosts"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, update, set, push, runTransaction, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = { apiKey: "AIzaSyDM5M1_O-wfcBDGYJIiYgiHVbqhiKC-0dw", databaseURL: "https://icek-9cdd7-default-rtdb.firebaseio.com", projectId: "icek-9cdd7" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // LOGIN / SAIR
    if(!localStorage.getItem('ice_user')) {
        let n = prompt("Seu Nome de Usuário:");
        if(n) localStorage.setItem('ice_user', n); else location.reload();
    }
    window.user = { nome: localStorage.getItem('ice_user'), cargo: "USER" };
    window.deslogar = () => { localStorage.clear(); location.reload(); };

    // CARREGA DADOS DO USUÁRIO LOGADO
    onValue(ref(db, 'usuarios/' + window.user.nome), (s) => {
        if(s.exists()) window.user = {...window.user, ...s.val()};
    });

    // MOEDA
    onValue(ref(db, 'economia/valor_ice'), (s) => {
        document.getElementById('btcValue').innerText = "ICE: $" + (s.val() || 0.7099).toFixed(4);
    });

    // POSTAR PRODUTO
    window.abrirPostar = () => { document.getElementById('telaPostar').style.display='block'; };
    window.enviarPost = () => {
        const file = document.getElementById('filePost').files[0];
        const desc = document.getElementById('descPost').value;
        if(!file) return alert("Selecione uma foto!");
        const reader = new FileReader();
        reader.onload = (e) => {
            push(ref(db, 'posts'), { u1: window.user.nome, i1: e.target.result, d1: desc, t: Date.now() });
            fecharTelas();
            alert("Postado com sucesso!");
        };
        reader.readAsDataURL(file);
    };

    // FEED
    onValue(ref(db, 'posts'), (snap) => {
        const f = document.getElementById('feed'); f.innerHTML = "";
        snap.forEach(c => {
            const p = c.val();
            const div = document.createElement('div');
            div.className = "card-timeline";
            let btnDel = (window.user.cargo === "ADM 1") ? `<button onclick="apagarPost('${c.key}')" style="position:absolute; top:10px; right:10px; background:red; color:white; border:none; border-radius:5px; font-size:10px; z-index:10;">Apagar</button>` : "";
            div.innerHTML = `${btnDel}<img src="${p.i1}" onclick="abrirPerfil('${p.u1}')">
                <div class="post-info"><b>${p.u1}</b><p style="font-size:12px; margin:5px 0;">${p.d1 || ''}</p></div>`;
            f.prepend(div);
        });
    });

    window.apagarPost = (id) => { if(confirm("Apagar?")) remove(ref(db, 'posts/' + id)); };

    // PERFIL E EDIÇÃO
    window.abrirPerfil = (nome) => {
        onValue(ref(db, 'usuarios/' + nome), (snap) => {
            const d = snap.val() || { nome: nome, cargo: "USER", bio: "Sem bio..." };
            document.getElementById('perfNome').innerText = d.nome;
            document.getElementById('perfCargo').innerText = "Cargo: " + d.cargo;
            document.getElementById('perfBio').innerText = d.bio || "Sem bio...";
            document.getElementById('pAvatar').style.backgroundImage = `url(${d.avatar || ''})`;
            document.getElementById('perfCapa').style.backgroundImage = `url(${d.capa || ''})`;
            
            // Mostrar botões de editar apenas no meu perfil
            const isMe = (nome === window.user.nome);
            document.getElementById('btnEditCapa').style.display = isMe ? 'block' : 'none';
            document.getElementById('btnEditAvatar').style.display = isMe ? 'block' : 'none';
            document.getElementById('btnEditBio').style.display = isMe ? 'block' : 'none';

            // Painel de ADM
            const painel = document.getElementById('painelGestao');
            const bts = document.getElementById('botoesGestao');
            bts.innerHTML = ""; painel.style.display = "none";
            if(!isMe && window.user.cargo.includes("ADM")) {
                painel.style.display = "block";
                document.getElementById('txtGestao').innerText = "Gestão " + window.user.cargo;
                if(window.user.cargo === "ADM 1") bts.innerHTML += `<button class="btn-adm" onclick="setCargo('${nome}','ADM 1')">SUBIR ADM 1</button>`;
                bts.innerHTML += `<button class="btn-adm" onclick="setCargo('${nome}','ADM 2')">SUBIR ADM 2</button>`;
                bts.innerHTML += `<button class="btn-adm" onclick="setCargo('${nome}','MODERADOR')">SUBIR MODERADOR</button>`;
                if(window.user.cargo === "ADM 1") bts.innerHTML += `<button class="btn-adm" style="background:var(--blue)" onclick="darBlue('${nome}')">+100 BLUE</button>`;
            }
            document.getElementById('telaPerfil').style.display = 'block';
        }, { onlyOnce: true });
    };

    // FUNÇÕES DE EDIÇÃO
    window.editarBio = () => { 
        let b = prompt("Sua nova bio:"); 
        if(b) update(ref(db, 'usuarios/'+window.user.nome), { bio: b }); 
    };
    document.getElementById('inAvatar').onchange = (e) => uploadImg(e, 'avatar');
    document.getElementById('inCapa').onchange = (e) => uploadImg(e, 'capa');

    function uploadImg(e, campo) {
        const file = e.target.files[0];
        const r = new FileReader();
        r.onload = (ev) => {
            let obj = {}; obj[campo] = ev.target.result;
            update(ref(db, 'usuarios/'+window.user.nome), obj);
            alert("Atualizado!");
        };
        r.readAsDataURL(file);
    }

    // GESTÃO
    window.setCargo = (n, c) => update(ref(db, 'usuarios/'+n), { cargo: c });
    window.darBlue = (n) => runTransaction(ref(db, 'usuarios/'+n+'/blue'), (s) => (s||0)+100);
    window.comprarCargo = (p) => { runTransaction(ref(db, 'economia/valor_ice'), (v)=>(v||0.7099)+p); navigator.clipboard.writeText("thiago00dudu@gmail.com"); alert("Copiado!"); };
    
    window.abrirFin = () => { fecharTelas(); document.getElementById('telaFinanceiro').style.display = 'block'; };
    window.fecharTelas = () => { document.querySelectorAll('#telaPerfil,#telaFinanceiro,#telaPostar').forEach(t=>t.style.display='none'); };
    window.compartilharApp = () => { navigator.clipboard.writeText(window.location.origin); alert("Link Copiado!"); };
</script>
</body>
</html>
