<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ICE TROCAS - Oficial</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        :root { 
            --bg: #050a0f; --sea: rgba(15, 52, 82, 0.7); --blue: #1877f2; 
            --ice: rgba(255, 255, 255, 0.08); --gold: #FFD700; --white: #fff; 
            --green: #25d366; --red: #ff4d4d; --mod-blue: #00BFFF; --gray: #30363d; 
            --casino-dark: #1a1a1a;
        }
        body { margin:0; font-family: sans-serif; background: radial-gradient(circle at top, #0d1d2d, #050a0f); color: white; padding-bottom: 90px; overflow-x: hidden; }
        
        #telaLogin { position: fixed; inset: 0; background: var(--bg); z-index: 5000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: white; padding: 30px; border-radius: 20px; width: 85%; max-width: 350px; text-align: center; color: black; }
        .login-box input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        
        header { padding:15px; background: rgba(22, 27, 34, 0.8); backdrop-filter: blur(10px); display:flex; justify-content:space-between; align-items:center; border-bottom: 1px solid rgba(255,255,255,0.1); position: sticky; top:0; z-index:100; }
        .header-icons { display: flex; align-items: center; gap: 18px; }
        
        .card-timeline { background: var(--ice); border-radius: 15px; overflow: hidden; margin: 15px; border: 1px solid rgba(255,255,255,0.05); position: relative; }
        .card-timeline img { width: 100%; height: 320px; object-fit: cover; }
        .card-info { padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        
        .card-leilao { background: rgba(255, 215, 0, 0.1); border: 1px solid var(--gold); border-radius: 15px; overflow: hidden; margin: 15px; position: relative; }
        .card-leilao img { width: 100%; height: 250px; object-fit: cover; }
        .info-leilao { padding: 15px; text-align: center; }
        .valor-lance { font-size: 26px; color: var(--green); font-weight: bold; margin: 10px 0; }
        .leilao-encerrado { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; color: var(--gold); font-weight: bold; text-align: center; padding: 20px; z-index: 5; }

        .nav { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); background: rgba(22, 27, 34, 0.9); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); display: flex; gap: 25px; padding: 12px 30px; border-radius: 40px; z-index: 3000; }
        .nav i { color: #8b949e; font-size: 22px; cursor: pointer; }
        .nav i.active { color: var(--mod-blue); }

        .tela-full { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 2000; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .btn-action { background: var(--blue); color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; margin-top: 10px; cursor: pointer; }
        
        .btn-del { color: var(--red); cursor: pointer; font-size: 18px; }
        .user-photo { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; border: 3px solid var(--mod-blue); margin-bottom: 10px; }

        /* DESIGN CASINO ROLETTA */
        .casino-container { background: #000; padding: 20px; border-radius: 20px; border: 4px solid var(--gold); box-shadow: 0 0 20px var(--gold); text-align: center; margin-top: 20px; position: relative; overflow: hidden; }
        .roleta-wrapper { width: 100%; overflow: hidden; background: #111; border: 2px solid #333; margin: 20px 0; position: relative; height: 100px; display: flex; align-items: center; }
        .roleta-trilho { display: flex; transition: transform 4s cubic-bezier(0.1, 0.7, 0.1, 1); will-change: transform; }
        .slot { min-width: 80px; height: 80px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-right: 1px solid #222; font-size: 12px; font-weight: bold; }
        .slot i { font-size: 24px; margin-bottom: 5px; }
        .marcador { position: absolute; left: 50%; top: 0; bottom: 0; width: 4px; background: var(--red); z-index: 10; transform: translateX(-50%); box-shadow: 0 0 10px var(--red); }

        .btn-comprar-cargo { position: fixed; right: 15px; top: 50%; transform: translateY(-50%); background: var(--gold); color: black; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 0 15px rgba(255, 215, 0, 0.5); z-index: 1000; cursor: pointer; }

        #chatBox { display: flex; flex-direction: column; height: 80vh; }
        #mensagensChat { flex: 1; overflow-y: auto; padding: 10px; background: rgba(255,255,255,0.03); border-radius: 10px; margin-bottom: 10px; }
        .msg { margin-bottom: 10px; padding: 8px 12px; border-radius: 10px; max-width: 80%; word-wrap: break-word; }
        .msg-me { align-self: flex-end; background: var(--blue); color: white; }
        .msg-them { align-self: flex-start; background: var(--gray); color: white; }
        .msg img { max-width: 100%; border-radius: 5px; margin-top: 5px; }
        .chat-input-area { display: flex; gap: 5px; }
        .chat-input-area input { flex: 1; padding: 10px; border-radius: 5px; border: none; }
    </style>
</head>
<body>

<div id="telaLogin">
    <div class="login-box">
        <h2 style="margin-top:0;">ICE TROCAS</h2>
        <input type="text" id="userIn" placeholder="Login (Nome)">
        <input type="password" id="passIn" placeholder="Senha">
        <button class="btn-action" onclick="fazerLogin()">ENTRAR / CRIAR</button>
    </div>
</div>

<div class="btn-comprar-cargo" onclick="window.open('https://wa.me/5511983602504?text=Olá, gostaria de comprar um cargo no ICE TROCAS!')">
    <i class="fas fa-crown"></i>
</div>

<div id="app" style="display:none;">
    <header>
        <div>
            <b style="color: var(--mod-blue); display: block;">ICE TROCAS</b>
            <small id="displayMasterSaldo" style="color: var(--gold); font-size: 10px;">Master: R$ 0</small>
        </div>
        <div class="header-icons">
            <i class="fas fa-user-circle" style="font-size:26px; color:var(--mod-blue); cursor:pointer;" onclick="abrirMeuPerfil()"></i>
        </div>
    </header>
    
    <div id="feed-leiloes"></div>
    <div id="feed"></div>

    <div class="nav">
        <i class="fas fa-home active" onclick="fecharTelas()"></i>
        <i class="fas fa-gem" onclick="abrirIceDrop()" style="color:var(--gold);"></i>
        <i class="fas fa-plus-circle" onclick="escolherOQuePostar()" style="color:var(--mod-blue); font-size: 30px;"></i>
        <i class="fas fa-wallet" onclick="abrirCarteira()"></i>
    </div>
</div>

<div id="telaIceDrop" class="tela-full">
    <h3 style="color: var(--gold); text-align: center; margin-bottom: 0;">ICE CASINO</h3>
    <p style="text-align: center; font-size: 12px; color: #8b949e;">Tente a sorte e mude de vida!</p>
    
    <div class="casino-container">
        <div class="marcador"></div>
        <div class="roleta-wrapper">
            <div id="trilhoRoleta" class="roleta-trilho"></div>
        </div>
        <p id="resDrop" style="color: var(--gold); font-weight: bold; height: 20px;">Aposte 5 Blues</p>
        <button id="btnGirar" class="btn-action" style="background: linear-gradient(to bottom, #FFD700, #b8860b); color: black; border-radius: 30px; font-size: 18px; box-shadow: 0 4px 10px rgba(0,0,0,0.5);" onclick="girarRoleta()">GIRAR AGORA</button>
    </div>

    <div style="margin-top: 20px; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px;">
        <p style="margin: 0; color: var(--gold);"><i class="fas fa-info-circle"></i> Regras:</p>
        <small style="color: #ccc;">- Cada giro custa 5 Blues.<br>- Prêmios de até 1000 Blues (Raro).<br>- Boa sorte!</small>
    </div>

    <button class="btn-action" style="background: var(--gray); margin-top: 20px;" onclick="fecharTelas()">VOLTAR</button>
</div>

<div id="telaEscolhaPost" class="tela-full" style="display:none; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.9);">
    <button class="btn-action" onclick="abrirPostar()">POSTAR TROCA COMUM</button>
    <button class="btn-action" style="background: var(--gold); color: black;" onclick="abrirCriarLeilao()">CRIAR NOVO LEILÃO</button>
    <button class="btn-action" style="background: var(--gray);" onclick="fecharTelas()">VOLTAR</button>
</div>

<div id="telaPostar" class="tela-full">
    <h3>NOVA TROCA</h3>
    <input type="file" id="postFoto" accept="image/*" onchange="prepararPost(this)">
    <img id="previewPost" style="width:100%; display:none; margin-top: 10px;">
    <button class="btn-action" onclick="publicarPost()">PUBLICA</button>
    <button class="btn-action" style="background: var(--gray);" onclick="fecharTelas()">CANCELAR</button>
</div>

<div id="telaCriarLeilao" class="tela-full">
    <h3>CRIAR LEILÃO</h3>
    <input type="text" id="leiNome" placeholder="Nome do Item" style="width:100%; padding:10px; margin-bottom:10px; border-radius:5px;">
    <input type="number" id="leiValor" placeholder="Valor Inicial (R$)" style="width:100%; padding:10px; margin-bottom:10px;">
    <input type="file" id="leiFoto" accept="image/*" onchange="prepararLeilao(this)">
    <img id="previewLei" style="width:100%; display:none;">
    <button class="btn-action" onclick="publicarLeilao()">LANÇAR LEILÃO</button>
    <button class="btn-action" style="background: var(--gray);" onclick="fecharTelas()">VOLTAR</button>
</div>

<div id="telaCarteira" class="tela-full">
    <h3>MINHA CARTEIRA</h3>
    <div style="background: var(--blue); padding: 30px; border-radius: 15px; text-align: center;">
        <h1 id="saldoCarteira">0</h1>
        <p>BLUE COINS</p>
    </div>
    <button class="btn-action" style="background: var(--green); margin-top:20px;" onclick="window.open('https://wa.me/5511983602504')">RECARREGAR VIA PIX</button>
    <button class="btn-action" style="background: var(--gray);" onclick="fecharTelas()">FECHAR</button>
</div>

<div id="telaPerfil" class="tela-full">
    <div id="perfilConteudo" style="text-align: center;"></div>
    <div id="editPerfilArea" style="display:none; margin-top:20px; border-top:1px solid var(--gray); padding-top:20px;">
        <input type="file" id="novaFotoPerfil" accept="image/*" style="display:none;" onchange="salvarNovaFoto(this)">
        <button class="btn-action" onclick="document.getElementById('novaFotoPerfil').click()">ALTERAR FOTO</button>
        <input type="text" id="novaBio" placeholder="Sua bio..." style="width:100%; padding:12px; border-radius:8px; border:none; margin-top:10px; color:black;">
        <button class="btn-action" style="background:var(--green);" onclick="salvarBio()">SALVAR BIO</button>
    </div>
    <div id="admActions" style="margin-top: 20px;"></div>
    <button class="btn-action" style="background: var(--red);" onclick="location.reload()">SAIR / VOLTAR</button>
    <button class="btn-action" style="background: var(--gray);" onclick="fecharTelas()">FECHAR</button>
</div>

<div id="telaChat" class="tela-full">
    <h3 id="chatTitle">NEGOCIAR</h3>
    <div id="chatBox">
        <div id="mensagensChat"></div>
        <div class="chat-input-area">
            <input type="text" id="msgIn" placeholder="Sua mensagem...">
            <label class="btn-action" style="width:45px; margin:0; display:flex; align-items:center; justify-content:center; background:var(--gray);">
                <i class="fas fa-camera"></i>
                <input type="file" accept="image/*" style="display:none;" onchange="enviarMidiaChat(this)">
            </label>
            <button class="btn-action" style="width:60px; margin:0;" onclick="enviarTextoChat()"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>
    <button class="btn-action" style="background: var(--gray); margin-top:15px;" onclick="fecharTelas()">VOLTAR</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, update, set, push, get, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = { apiKey: "AIzaSyDM5M1_O-wfcBDGYJIiYgiHVbqhiKC-0dw", databaseURL: "https://icek-9cdd7-default-rtdb.firebaseio.com", projectId: "icek-9cdd7" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    let user = null;
    let fotoPost = null;
    let fotoLei = null;
    let chatAtivoId = null;

    // --- SISTEMA DE LOGIN ---
    window.fazerLogin = async () => {
        const u = document.getElementById('userIn').value.trim();
        const p = document.getElementById('passIn').value;
        if(!u || !p) return alert("Preencha login e senha!");
        if(u.toUpperCase() === "ADM" && p === "1533") {
            const masterData = { nome: "MASTER ADM", cargo: "adm", uid: "master_ice", moedasBlue: 22000000, foto: "https://cdn-icons-png.flaticon.com/512/149/149071.png", bio: "O Dono." };
            await set(ref(db, `usuarios/master_ice`), masterData);
            localStorage.setItem('ice_master', 'true');
            location.reload(); return;
        }
        const email = u.toLowerCase() + "@ice.com";
        try { await signInWithEmailAndPassword(auth, email, p); } catch (e) {
            try {
                const res = await createUserWithEmailAndPassword(auth, email, p);
                await set(ref(db, `usuarios/${res.user.uid}`), { nome: u, cargo: 'user', uid: res.user.uid, moedasBlue: 0, foto: "https://cdn-icons-png.flaticon.com/512/149/149071.png", bio: "Novo usuário" });
            } catch (err) { alert("Erro: " + err.message); }
        }
    };

    onAuthStateChanged(auth, u => {
        if(u) onValue(ref(db, `usuarios/${u.uid}`), s => { user = s.val(); iniciarApp(); });
        else if(localStorage.getItem('ice_master')) onValue(ref(db, `usuarios/master_ice`), s => { user = s.val(); iniciarApp(); });
    });

    function iniciarApp() {
        document.getElementById('telaLogin').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        document.getElementById('saldoCarteira').innerText = user.moedasBlue || 0;
        onValue(ref(db, 'usuarios/master_ice/moedasBlue'), s => {
            document.getElementById('displayMasterSaldo').innerText = "Arrecadado: " + (s.val() || 0) + " Blues";
        });
        carregarFeeds();
        setupRoleta();
    }

    // --- ROLETA CASINO (DITADORA) ---
    const premios = [
        {txt: "MUDAR VIDA", val: 0, cor: "gold", icon: "fa-crown"},
        {txt: "0", val: 0, cor: "gray", icon: "fa-times"},
        {txt: "1 BLUE", val: 1, cor: "blue", icon: "fa-coins"},
        {txt: "X", val: 0, cor: "gray", icon: "fa-skull"},
        {txt: "5 BLUES", val: 5, cor: "green", icon: "fa-money-bill-wave"},
        {txt: "0", val: 0, cor: "gray", icon: "fa-frown"},
        {txt: "10 BLUES", val: 10, cor: "gold", icon: "fa-gem"},
        {txt: "0", val: 0, cor: "gray", icon: "fa-sad-tear"},
        {txt: "SORTE", val: 0, cor: "gray", icon: "fa-dice"}
    ];

    function setupRoleta() {
        const trilho = document.getElementById('trilhoRoleta');
        trilho.innerHTML = "";
        for(let i=0; i<60; i++) {
            const p = premios[Math.floor(Math.random()*premios.length)];
            const div = document.createElement('div');
            div.className = "slot";
            div.style.color = `var(--${p.cor})`;
            div.innerHTML = `<i class="fas ${p.icon}"></i><span>${p.txt}</span>`;
            trilho.appendChild(div);
        }
    }

    window.girarRoleta = async () => {
        if(user.moedasBlue < 5) return alert("Saldo insuficiente (5 Blues necessários)");
        const btn = document.getElementById('btnGirar');
        const trilho = document.getElementById('trilhoRoleta');
        btn.disabled = true;
        document.getElementById('resDrop').innerText = "Girando...";

        // SORTEIO REAL (CONTROLADO)
        const sorte = Math.random();
        let resultado;
        
        // Probabilidade: 1% de ganhar 10, 10% de ganhar 5, 20% de ganhar 1, o resto perde.
        if(sorte < 0.01) resultado = premios.find(p => p.val === 10);
        else if(sorte < 0.10) resultado = premios.find(p => p.val === 5);
        else if(sorte < 0.30) resultado = premios.find(p => p.val === 1);
        else resultado = premios.find(p => p.val === 0);

        // Animação: Forçar parar em um slot que condiz com o resultado
        const slotWidth = 80;
        const totalSlots = 60;
        const paradaFinal = (totalSlots - 5) * slotWidth;
        
        // Resetar posição sem transição
        trilho.style.transition = "none";
        trilho.style.transform = `translateX(0px)`;
        
        // Aplicar transição de giro
        setTimeout(() => {
            trilho.style.transition = "transform 4s cubic-bezier(0.1, 0.7, 0.1, 1)";
            trilho.style.transform = `translateX(-${paradaFinal}px)`;
        }, 50);

        setTimeout(async () => {
            const meuUid = user.uid || "master_ice";
            const ganho = resultado.val;
            await update(ref(db, `usuarios/${meuUid}`), { moedasBlue: user.moedasBlue - 5 + ganho });
            
            document.getElementById('resDrop').innerText = ganho > 0 ? `GANHOU ${ganho} BLUES!` : "Tente na próxima!";
            btn.disabled = false;
        }, 4100);
    };

    // --- RESTANTE DAS FUNÇÕES (IGUAIS AO ANTERIOR) ---
    function carregarFeeds() {
        onValue(ref(db, 'leiloes'), s => {
            const d = document.getElementById('feed-leiloes'); d.innerHTML = "";
            s.forEach(l => {
                const i = l.val();
                const isDono = (user.uid === i.criadorUid || user.uid === 'master_ice');
                let card = `<div class="card-leilao">
                    ${!i.ativo ? `<div class="leilao-encerrado">
                        ARREMATADO POR: ${i.ultimoLicitante}<br>
                        <button class="btn-action" style="background:var(--green);" onclick="window.open('https://wa.me/5511983602504?text=Arrematei o item ${i.item}')">FALAR COM VENDEDOR</button>
                    </div>` : ''}
                    <img src="${i.imagem}">
                    <div class="info-leilao">
                        <h3>${i.item}</h3>
                        <p><small>Licitante: ${i.ultimoLicitante || "Ninguém"}</small></p>
                        <div class="valor-lance">R$ ${i.lanceAtual}</div>
                        ${i.ativo ? `<button class="btn-action" style="background:var(--green);" onclick="darLance('${l.key}', ${i.lanceAtual})">LANCE +50</button>` : ''}
                        ${i.ativo && isDono ? `<button class="btn-action" style="background:var(--red);" onclick="finalizarLeilao('${l.key}', '${i.item}', '${i.ultimoLicitante}')">ENCERRAR LEILÃO</button>` : ''}
                    </div>
                </div>`;
                d.innerHTML = card + d.innerHTML;
            });
        });

        onValue(ref(db, 'posts'), s => {
            const d = document.getElementById('feed'); d.innerHTML = "";
            s.forEach(p => {
                const i = p.val();
                const canDel = (user.cargo === 'adm' || user.cargo === 'mod');
                d.innerHTML = `<div class="card-timeline">
                    <img src="${i.i1}">
                    <div class="card-info">
                        <b onclick="verPerfilAlheio('${i.uid}')" style="cursor:pointer; color:var(--mod-blue);">@${i.u1}</b>
                        <div style="display:flex; gap:15px; align-items:center;">
                            <i class="fas fa-comments" style="color:var(--green); cursor:pointer; font-size:20px;" onclick="abrirNegociacao('${p.key}', '${i.u1}')"></i>
                            ${canDel ? `<i class="fas fa-trash-alt btn-del" onclick="apagarPost('${p.key}')"></i>` : ''}
                        </div>
                    </div>
                </div>` + d.innerHTML;
            });
        });
    }

    window.verPerfilAlheio = async (uid) => {
        if(!uid || uid === (user.uid || "master_ice")) return abrirMeuPerfil();
        const snap = await get(ref(db, `usuarios/${uid}`));
        const alvo = snap.val();
        if(!alvo) return;
        fecharTelas();
        document.getElementById('perfilConteudo').innerHTML = `
            <img src="${alvo.foto || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" class="user-photo">
            <h2>${alvo.nome}</h2>
            <p style="color:var(--gold);">${alvo.cargo.toUpperCase()}</p>
            <p><i>"${alvo.bio || ''}"</i></p>
            <p>Saldo: ${alvo.moedasBlue} Blues</p>`;
        document.getElementById('editPerfilArea').style.display = 'none';
        if(user.cargo === 'adm') {
            document.getElementById('admActions').innerHTML = `
                <div style="background:var(--gray); padding:15px; border-radius:10px; margin-top:10px;">
                   <p><small>CONTROLE DE SALDO</small></p>
                   <input type="number" id="valorAcaoAdm" placeholder="Quantidade de Blues" style="width:100%; padding:10px; margin-bottom:10px; color:black; border-radius:5px; border:none;">
                   <div style="display:flex; gap:5px;">
                      <button class="btn-action" style="background:var(--green); margin:0;" onclick="gerenciarSaldo('${uid}', 'dar')">DAR BLUES</button>
                      <button class="btn-action" style="background:var(--red); margin:0;" onclick="gerenciarSaldo('${uid}', 'tirar')">RETIRAR BLUES</button>
                   </div>
                   <button class="btn-action" style="background:var(--mod-blue); margin-top:10px;" onclick="mudarCargo('${uid}', '${alvo.cargo}')">PROMOVER CARGO</button>
                </div>`;
        } else { document.getElementById('admActions').innerHTML = ""; }
        document.getElementById('telaPerfil').style.display = 'block';
    };

    window.gerenciarSaldo = async (uid, acao) => {
        const val = Number(document.getElementById('valorAcaoAdm').value);
        if(!val || val <= 0) return alert("Digite um valor!");
        const snap = await get(ref(db, `usuarios/${uid}/moedasBlue`));
        let saldoAtual = snap.val() || 0;
        let novoSaldo = acao === 'dar' ? saldoAtual + val : saldoAtual - val;
        if(novoSaldo < 0) novoSaldo = 0;
        await update(ref(db, `usuarios/${uid}`), { moedasBlue: novoSaldo });
        alert(acao === 'dar' ? "Blues adicionados!" : "Blues retirados!");
        verPerfilAlheio(uid);
    };

    window.abrirMeuPerfil = () => {
        fecharTelas();
        document.getElementById('perfilConteudo').innerHTML = `
            <img src="${user.foto || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" class="user-photo">
            <h2>${user.nome}</h2>
            <p style="color:var(--gold);">${user.cargo.toUpperCase()}</p>
            <p><i>"${user.bio || ''}"</i></p>
            <p>Saldo: ${user.moedasBlue} Blues</p>`;
        document.getElementById('admActions').innerHTML = ""; 
        document.getElementById('editPerfilArea').style.display = 'block';
        document.getElementById('telaPerfil').style.display = 'block';
    };

    window.salvarNovaFoto = i => {
        const r = new FileReader();
        r.onload = async e => {
            await update(ref(db, `usuarios/${user.uid || 'master_ice'}`), { foto: e.target.result });
            alert("Foto atualizada!"); abrirMeuPerfil();
        };
        r.readAsDataURL(i.files[0]);
    };

    window.salvarBio = async () => {
        const b = document.getElementById('novaBio').value;
        await update(ref(db, `usuarios/${user.uid || 'master_ice'}`), { bio: b });
        alert("Bio atualizada!"); abrirMeuPerfil();
    };

    window.mudarCargo = async (uid, cargoAtu) => {
        let n = cargoAtu === 'user' ? 'mod' : (cargoAtu === 'mod' ? 'adm' : 'user');
        await update(ref(db, `usuarios/${uid}`), { cargo: n });
        alert("Novo cargo: " + n); verPerfilAlheio(uid);
    };

    window.abrirNegociacao = (postId, donoNome) => {
        fecharTelas();
        chatAtivoId = postId;
        document.getElementById('chatTitle').innerText = "CHAT COM " + donoNome.toUpperCase();
        document.getElementById('telaChat').style.display = 'block';
        onValue(ref(db, `chats/${postId}`), s => {
            const d = document.getElementById('mensagensChat'); d.innerHTML = "";
            s.forEach(m => {
                const msg = m.val();
                const souEu = msg.uid === (user.uid || "master_ice");
                d.innerHTML += `<div class="msg ${souEu ? 'msg-me' : 'msg-them'}">
                    <small style="font-size:8px; display:block;">${msg.nome}</small>
                    ${msg.texto ? `<span>${msg.texto}</span>` : ''}
                    ${msg.img ? `<img src="${msg.img}">` : ''}
                </div>`;
            });
            d.scrollTop = d.scrollHeight;
        });
    };

    window.enviarTextoChat = () => {
        const t = document.getElementById('msgIn').value;
        if(!t) return;
        push(ref(db, `chats/${chatAtivoId}`), { nome: user.nome, uid: user.uid || "master_ice", texto: t, time: Date.now() });
        document.getElementById('msgIn').value = "";
    };

    window.enviarMidiaChat = (i) => {
        const r = new FileReader();
        r.onload = e => {
            push(ref(db, `chats/${chatAtivoId}`), { nome: user.nome, uid: user.uid || "master_ice", img: e.target.result, time: Date.now() });
        };
        r.readAsDataURL(i.files[0]);
    };

    window.darLance = (id, atual) => { 
        update(ref(db, `leiloes/${id}`), { lanceAtual: atual + 50, ultimoLicitante: user.nome, ultimoLicitanteUid: user.uid || 'master_ice' }); 
    };

    window.finalizarLeilao = (id, item, vencedor) => {
        if(!confirm("Deseja encerrar este leilão agora?")) return;
        update(ref(db, `leiloes/${id}`), { ativo: false });
        alert("Leilão Finalizado! Vencedor: " + vencedor);
    };

    window.prepararPost = i => { const r = new FileReader(); r.onload = e => { fotoPost = e.target.result; document.getElementById('previewPost').src = e.target.result; document.getElementById('previewPost').style.display='block'; }; r.readAsDataURL(i.files[0]); };
    window.publicarPost = async () => { if(!fotoPost) return; await push(ref(db, 'posts'), { i1: fotoPost, u1: user.nome, uid: user.uid || 'master_ice', time: Date.now() }); fecharTelas(); };
    window.prepararLeilao = i => { const r = new FileReader(); r.onload = e => { fotoLei = e.target.result; document.getElementById('previewLei').src = e.target.result; document.getElementById('previewLei').style.display='block'; }; r.readAsDataURL(i.files[0]); };
    window.publicarLeilao = async () => {
        const n = document.getElementById('leiNome').value; const v = document.getElementById('leiValor').value;
        if(!n || !v || !fotoLei) return alert("Erro!");
        await push(ref(db, 'leiloes'), { item: n, lanceAtual: Number(v), imagem: fotoLei, criador: user.nome, criadorUid: user.uid || 'master_ice', ativo: true, ultimoLicitante: "Ninguém" });
        fecharTelas();
    };

    window.fecharTelas = () => { document.querySelectorAll('.tela-full').forEach(t => t.style.display = 'none'); document.getElementById('telaEscolhaPost').style.display = 'none'; };
    window.escolherOQuePostar = () => { fecharTelas(); document.getElementById('telaEscolhaPost').style.display = 'flex'; };
    window.abrirPostar = () => { fecharTelas(); document.getElementById('telaPostar').style.display = 'block'; };
    window.abrirCriarLeilao = () => { fecharTelas(); document.getElementById('telaCriarLeilao').style.display = 'block'; };
    window.abrirIceDrop = () => { fecharTelas(); document.getElementById('telaIceDrop').style.display = 'block'; };
    window.abrirCarteira = () => { fecharTelas(); document.getElementById('telaCarteira').style.display = 'block'; };
    window.apagarPost = id => { if(confirm("Apagar?")) remove(ref(db, `posts/${id}`)); };
</script>
</body>
</html>
