<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICE - Sistema de Comando</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        :root {
            --bg1:#dff6ff; --bg2:#bfefff; --bg3:#8edcff; --sea:#0f3452;
            --card:#eaf9ff; --line:#7ec8e6; --txt:#12344f; --gold: #ffd700; --blue: #007bff;
        }
        body {
            margin:0; font-family:Arial, sans-serif; color:var(--txt);
            background: linear-gradient(180deg,var(--bg1) 0%,var(--bg3) 100%);
            min-height:100vh;
        }
        /* LOGIN */
        .login-screen { position: fixed; inset: 0; background: var(--bg1); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; }
        .card-login { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 85%; max-width: 320px; text-align: center; border: 1px solid var(--line); }
        
        /* HEADER */
        header {
            padding:14px 16px; background:rgba(234,249,255,.88);
            border-bottom:1px solid var(--line); backdrop-filter:blur(8px);
            position:sticky; top:0; z-index:100; display: flex; justify-content: space-between; align-items: center;
        }
        .brand { display:flex; align-items:center; gap:12px; }
        .logoBox { width:40px; height:40px; border-radius:10px; background:linear-gradient(180deg,#fff,#6fbce1); border:1px solid var(--line); }

        .wrap { max-width:600px; margin:auto; padding:15px; }

        /* POSTAGEM */
        .post-box { background: white; padding: 15px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        textarea { width: 100%; height: 70px; border: 1px solid #ddd; border-radius: 8px; padding: 10px; box-sizing: border-box; font-family: sans-serif; resize: none; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--sea); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:active { transform: scale(0.98); }

        /* FEED */
        .feed-item { background: white; padding: 15px; border-radius: 12px; margin-bottom: 12px; border-left: 6px solid var(--sea); box-shadow: 0 2px 5px rgba(0,0,0,0.05); position: relative; }
        .admin-star { color: var(--gold); font-weight: bold; font-size: 11px; }
        .mod-star { color: var(--blue); font-weight: bold; font-size: 11px; }
        .btn-del { background: #ff6b7a; font-size: 10px; width: auto; padding: 4px 8px; margin-top: 8px; }

        /* GRADE APPS */
        .grid-apps { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin: 20px 0; }
        .app-item { display: flex; flex-direction: column; align-items: center; text-decoration: none; color: var(--txt); }
        .icon-box { width: 55px; height: 55px; background: white; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 22px; margin-bottom: 5px; box-shadow: 0 3px 10px rgba(0,0,0,0.1); color: var(--sea); }
        .app-item span { font-size: 11px; font-weight: bold; }
    </style>
</head>
<body>

<div id="loginScreen" class="login-screen">
    <div class="card-login">
        <div class="logoBox" style="margin: 0 auto 15px auto;"></div>
        <h3 style="margin-top:0">Acesso ICE</h3>
        <input type="text" id="userName" placeholder="Seu Nome">
        <input type="password" id="userPass" placeholder="Senha (ADM: 1533)">
        <button onclick="fazerLogin()">Entrar no Sistema</button>
    </div>
</div>

<div id="appContent" style="display:none">
    <header>
        <div class="brand">
            <div class="logoBox"></div>
            <div>
                <strong id="displayName"></strong>
                <div id="userBadge"></div>
            </div>
        </div>
        <button onclick="location.reload()" style="width: auto; padding: 5px 10px; background: #ff4d4d; font-size: 12px;">Sair</button>
    </header>

    <div class="wrap">
        <div style="text-align: center; font-size: 11px; margin-bottom: 15px;">
            Sincronizado com: <b>icek-9cdd7</b> ✅
        </div>

        <div class="post-box">
            <textarea id="postText" placeholder="Digite uma ordem ou mensagem para a timeline..."></textarea>
            <button onclick="criarPost()" style="margin-top:10px;">PUBLICAR NA TIMELINE</button>
        </div>

        <div class="grid-apps">
            <div class="app-item"><div class="icon-box"><i class="fas fa-user"></i></div><span>Perfil</span></div>
            <div class="app-item"><div class="icon-box"><i class="fas fa-envelope"></i></div><span>Chat</span></div>
            <div class="app-item"><div class="icon-box"><i class="fas fa-gear"></i></div><span>Ajustes</span></div>
        </div>

        <hr style="border: 0; border-top: 1px solid var(--line); margin: 20px 0;">

        <div id="feed">
            <p style="text-align:center; font-size:12px; color: #666;">Carregando timeline...</p>
        </div>
    </div>
</div>

<script type="module">
    // IMPORTAÇÃO DO FIREBASE
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDM5M1_O-wfcBDGYJIiYgiHVbqhiKC-0dw",
      authDomain: "icek-9cdd7.firebaseapp.com",
      databaseURL: "https://icek-9cdd7-default-rtdb.firebaseio.com",
      projectId: "icek-9cdd7",
      appId: "1:929781654380:web:ddda1fdf6689ebd7cc8949"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    window.currentUser = { nome: "", cargo: "" };

    // LOGIN
    window.fazerLogin = () => {
        const nome = document.getElementById('userName').value.trim();
        const pass = document.getElementById('userPass').value;
        if(!nome) return alert("Digite seu nome!");

        window.currentUser = { 
            nome: nome, 
            cargo: (pass === "1533" ? "ADM" : "MODERADOR") 
        };

        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('appContent').style.display = 'block';
        
        const badge = document.getElementById('userBadge');
        if(window.currentUser.cargo === "ADM") {
            badge.innerHTML = '<span class="admin-star">★ ADM OURO</span>';
        } else {
            badge.innerHTML = '<span class="mod-star">★ MOD AZUL</span>';
        }
        document.getElementById('displayName').innerText = window.currentUser.nome;
    };

    // CRIAR POST (ENVIA PARA O FIREBASE)
    window.criarPost = () => {
        const text = document.getElementById('postText').value.trim();
        if(!text) return alert("Escreva algo antes de postar!");

        // Salva no banco de dados
        push(ref(db, 'timeline'), {
            usuario: window.currentUser.nome,
            cargo: window.currentUser.cargo,
            mensagem: text,
            data: Date.now()
        });

        document.getElementById('postText').value = "";
    };

    // ESCUTAR A TIMELINE (CARREGA PARA TODOS EM TEMPO REAL)
    onValue(ref(db, 'timeline'), (snapshot) => {
        const feed = document.getElementById('feed');
        feed.innerHTML = "";
        
        if (!snapshot.exists()) {
            feed.innerHTML = "<p style='text-align:center'>Nenhuma mensagem na timeline.</p>";
            return;
        }

        const posts = [];
        snapshot.forEach((child) => {
            posts.push({ id: child.key, ...child.val() });
        });

        // Inverte para mostrar os mais novos primeiro
        posts.reverse().forEach(post => {
            const item = document.createElement('div');
            item.className = 'feed-item';
            
            const star = post.cargo === "ADM" ? '<span class="admin-star">★</span>' : '<span class="mod-star">★</span>';
            
            item.innerHTML = `
                <div style="font-size:11px; margin-bottom:5px; display:flex; justify-content:space-between">
                    <span>${star} <strong>${post.usuario}</strong></span>
                    <span style="color:#999">${new Date(post.data).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                </div>
                <div style="font-size:14px; line-height:1.4">${post.mensagem}</div>
                ${window.currentUser.cargo === "ADM" ? `
                    <button class="btn-del" onclick="removerPost('${post.id}')">APAGAR</button>
                ` : ''}
            `;
            feed.appendChild(item);
        });
    });

    // REMOVER POST (SÓ ADM)
    window.removerPost = (id) => {
        if(confirm("Deseja apagar esta mensagem da timeline?")) {
            remove(ref(db, `timeline/${id}`));
        }
    };

</script>
</body>
</html>
