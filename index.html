<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ICE TROCAS - Oficial</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        :root { --bg: #0d1117; --sea: #0f3452; --blue: #1877f2; --gold: #FFD700; --white: #fff; --green: #25d366; --red: #ff4d4d; --mod-blue: #00BFFF; --gray: #30363d; }
        body { margin:0; font-family: sans-serif; background: var(--bg); color: white; padding-bottom: 90px; overflow-x: hidden; }
        
        #telaLogin { position: fixed; inset: 0; background: var(--sea); z-index: 5000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: white; padding: 30px; border-radius: 20px; width: 85%; max-width: 350px; text-align: center; color: black; }
        .login-box input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }

        .badge-star { font-size: 16px; margin-left: 5px; vertical-align: middle; }
        .star-mod { color: var(--mod-blue); } .star-adm2 { color: var(--red); } .star-adm1 { color: var(--gold); }

        .side-menu { position: fixed; right: 15px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 12px; z-index: 999; }
        .btn-float { width: 45px; height: 45px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; color: white; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.5); font-size: 18px; }

        header { padding:15px; background: #161b22; display:flex; justify-content:space-between; align-items:center; border-bottom: 1px solid #30363d; position: sticky; top:0; z-index:100; }
        .card-timeline { background: #161b22; border-radius: 15px; overflow: hidden; margin: 15px; border: 1px solid #30363d; }
        .card-timeline img { width: 100%; height: 350px; object-fit: cover; }
        .card-info { padding: 15px; }

        .nav { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); background: #161b22; border: 1px solid #30363d; display: flex; gap: 30px; padding: 12px 35px; border-radius: 40px; z-index: 3000; }
        .nav i { color: #8b949e; font-size: 24px; cursor: pointer; }

        .tela-full { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 2000; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .btn-action { background: var(--blue); color: white; border: none; padding: 14px; border-radius: 10px; width: 100%; font-weight: bold; margin-top: 10px; cursor: pointer; }
        
        .user-photo { width: 110px; height: 110px; border-radius: 50%; object-fit: cover; border: 3px solid var(--blue); margin-bottom: 10px; background: #111; }
        #mensagens { height: 350px; overflow-y: auto; background: #0d1117; border-radius: 10px; padding: 15px; border: 1px solid #30363d; margin-bottom: 10px; display: flex; flex-direction: column; gap: 8px; }
    </style>
</head>
<body>

<div class="side-menu" id="menuFlutuante" style="display:none;">
    <button class="btn-float" style="background: var(--gold); color:black;" onclick="comprar('ADM1', 'R$ 22M')"><i class="fas fa-crown"></i></button>
    <button class="btn-float" style="background: var(--red);" onclick="comprar('ADM2', 'R$ 50')"><i class="fas fa-shield-alt"></i></button>
    <button class="btn-float" style="background: var(--mod-blue);" onclick="comprar('MOD', 'R$ 20')"><i class="fas fa-star"></i></button>
</div>

<div id="telaLogin">
    <div class="login-box">
        <h2>ICE TROCAS</h2>
        <input type="text" id="userIn" placeholder="Nome">
        <input type="password" id="passIn" placeholder="Senha">
        <button class="btn-action" onclick="fazerLogin()">ENTRAR</button>
    </div>
</div>

<div id="app" style="display:none;">
    <header><b>ICE TROCAS</b> <i class="fas fa-user-circle" onclick="abrirPerfil(window.user.uid)" style="font-size:28px; color:var(--blue);"></i></header>
    <div id="feed"></div>
    <div class="nav">
        <i class="fas fa-home" onclick="fecharTelas()"></i>
        <i class="fas fa-plus-circle" onclick="abrirPostar()" style="color:var(--blue); font-size: 30px;"></i>
        <i class="fas fa-wallet" onclick="alert('Saldo: '+window.user.moedasBlue)"></i>
    </div>
</div>

<div id="telaPerfil" class="tela-full">
    <div id="perfilConteudo" style="text-align:center;"></div>
    <div id="areaEditar" style="display:none; text-align:center;">
        <input type="file" id="fFoto" accept="image/*" style="display:none;" onchange="prepararFoto(this)">
        <label for="fFoto" style="color:var(--blue); cursor:pointer;">[ TROCAR FOTO ]</label>
        <button class="btn-action" style="background:var(--green); margin-top:20px;" onclick="salvarPerfil()">SALVAR</button>
        <button class="btn-action" onclick="compartilhar()">CONVIDAR</button>
    </div>
    <div id="painelMestre" style="display:none; border:1px solid var(--gold); padding:10px; border-radius:10px; margin-top:10px;">
        <h3 style="color:var(--gold)">ADM1 MASTER</h3>
        <button class="btn-action" onclick="mudarCargo('MOD')">MOD</button>
        <button class="btn-action" onclick="mudarCargo('ADM2')">ADM2</button>
        <button class="btn-action" onclick="mudarCargo('ADM1')">ADM1</button>
    </div>
    <button class="btn-action" style="background:var(--gray)" onclick="fecharTelas()">VOLTAR</button>
</div>

<div id="telaChat" class="tela-full">
    <h2 id="chatTitle">Chat</h2>
    <div id="mensagens"></div>
    <input type="text" id="msgIn" placeholder="Texto..." style="width:70%; padding:10px; border-radius:5px;">
    <button class="btn-action" style="width:25%; margin:0;" onclick="enviarMsg()">OK</button>
    <button class="btn-action" style="background:var(--gray)" onclick="fecharTelas()">FECHAR</button>
</div>

<div id="telaPostar" class="tela-full">
    <h2>Postar</h2>
    <input type="file" id="fPost" accept="image/*" onchange="prepararFotoPost(this)">
    <input type="text" id="descPost" placeholder="Descrição..." style="width:100%; padding:10px; margin:10px 0;">
    <button class="btn-action" onclick="enviarPost()">POSTAR</button>
    <button class="btn-action" style="background:var(--red)" onclick="fecharTelas()">CANCELAR</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, update, set, push, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const config = { apiKey: "AIzaSyDM5M1_O-wfcBDGYJIiYgiHVbqhiKC-0dw", databaseURL: "https://icek-9cdd7-default-rtdb.firebaseio.com", projectId: "icek-9cdd7" };
    const app = initializeApp(config);
    const db = getDatabase(app);
    const auth = getAuth(app);

    window.user = null;
    let targetUid = null, base64Foto = "", base64Post = "", chatID = "";
    const refPai = new URLSearchParams(window.location.search).get('ref');

    function getBadge(c) {
        if(c==='ADM1') return '<i class="fas fa-crown star-adm1 badge-star"></i>';
        if(c==='ADM2') return '<i class="fas fa-star star-adm2 badge-star"></i>';
        if(c==='MOD') return '<i class="fas fa-star star-mod badge-star"></i>';
        return '';
    }

    window.fazerLogin = async () => {
        const u = document.getElementById('userIn').value;
        const p = document.getElementById('passIn').value;

        // LOGIN MASTER IMEDIATO
        if(u.toUpperCase()==="ADM" && p==="1533"){
            const master = { nome: "ICE MASTER", cargo: "ADM1", uid: "master_ice", moedasBlue: 1000000, filhos: 0 };
            localStorage.setItem('ice_master', JSON.stringify(master));
            window.user = master;
            montarApp(); return;
        }

        const email = u.trim().replace(/\s+/g, '') + "@ice.com";
        try {
            const res = await signInWithEmailAndPassword(auth, email, p);
        } catch(e) {
            try {
                const res = await createUserWithEmailAndPassword(auth, email, p);
                const novo = { nome: u, cargo: 'user', uid: res.user.uid, moedasBlue: 0, filhos: 0, pai: refPai || "" };
                await set(ref(db, 'usuarios/'+res.user.uid), novo);
                if(refPai) {
                    const sP = await get(ref(db, 'usuarios/'+refPai));
                    if(sP.exists()) update(ref(db, 'usuarios/'+refPai), { filhos: (sP.val().filhos || 0) + 1 });
                }
            } catch(err) { alert("Use um nome maior e senha de 6 digitos."); }
        }
    };

    onAuthStateChanged(auth, async (u) => {
        const masterSaved = localStorage.getItem('ice_master');
        if(masterSaved) { window.user = JSON.parse(masterSaved); montarApp(); }
        else if(u) {
            const s = await get(ref(db, 'usuarios/'+u.uid));
            window.user = s.val(); montarApp();
        }
    });

    function montarApp() {
        if(!window.user) return;
        document.getElementById('telaLogin').style.display='none';
        document.getElementById('app').style.display='block';
        document.getElementById('menuFlutuante').style.display='flex';
        onValue(ref(db, 'posts'), snap => {
            const f = document.getElementById('feed'); f.innerHTML = "";
            snap.forEach(p => { 
                const pt = p.val();
                f.innerHTML = `<div class="card-timeline"><img src="${pt.foto}" onclick="abrirPerfil('${pt.uid}')"><div class="card-info"><b>${pt.nome}</b> ${getBadge(pt.cargo)}<br><small>${pt.desc}</small><button class="btn-action" onclick="abrirChat('${pt.nome}', '${pt.uid}')">NEGOCIAR</button></div></div>` + f.innerHTML;
            });
        });
    }

    window.abrirPerfil = async (uid) => {
        targetUid = uid;
        const s = await get(ref(db, 'usuarios/'+uid)); const t = s.val() || window.user;
        document.getElementById('perfilConteudo').innerHTML = `
            <img src="${t.foto || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" class="user-photo">
            <h2>${t.nome} ${getBadge(t.cargo)}</h2>
            <p>BLUE: ${t.moedasBlue || 0} | Pai de: ${t.filhos || 0}</p>
        `;
        document.getElementById('areaEditar').style.display = (uid === window.user.uid) ? 'block' : 'none';
        document.getElementById('painelMestre').style.display = (window.user.cargo === 'ADM1' && uid !== window.user.uid) ? 'block' : 'none';
        document.getElementById('telaPerfil').style.display = 'block';
    };

    window.abrirChat = (nome, destUid) => {
        chatID = [window.user.uid, destUid].sort().join('_');
        document.getElementById('chatTitle').innerText = nome;
        document.getElementById('telaChat').style.display = 'block';
        onValue(ref(db, 'chats/'+chatID), snap => {
            const box = document.getElementById('mensagens'); box.innerHTML = "";
            snap.forEach(m => {
                const msg = m.val();
                box.innerHTML += `<div style="text-align:${msg.id===window.user.uid?'right':'left'}; padding:5px;"><b>${msg.id===window.user.uid?'Eu':nome}:</b> ${msg.txt}</div>`;
            });
        });
    };

    window.enviarMsg = async () => {
        const txt = document.getElementById('msgIn').value;
        if(txt) { await push(ref(db, 'chats/'+chatID), { id: window.user.uid, txt: txt }); document.getElementById('msgIn').value = ""; }
    };

    window.mudarCargo = async (c) => { await update(ref(db, 'usuarios/'+targetUid), {cargo:c}); alert("Promovido!"); abrirPerfil(targetUid); };
    window.prepararFoto = (i) => { const r = new FileReader(); r.onload=(e)=> base64Foto=e.target.result; r.readAsDataURL(i.files[0]); };
    window.salvarPerfil = async () => { await update(ref(db, 'usuarios/'+window.user.uid), {foto: base64Foto}); alert("Salvo!"); };
    window.prepararFotoPost = (i) => { const r = new FileReader(); r.onload=(e)=> base64Post=e.target.result; r.readAsDataURL(i.files[0]); };
    window.enviarPost = async () => {
        await push(ref(db, 'posts'), { uid: window.user.uid, nome: window.user.nome, cargo: window.user.cargo, foto: base64Post, desc: document.getElementById('descPost').value });
        fecharTelas();
    };

    window.fecharTelas = () => { document.querySelectorAll('.tela-full').forEach(t=>t.style.display='none'); };
    window.abrirPostar = () => document.getElementById('telaPostar').style.display='block';
    window.compartilhar = () => { navigator.clipboard.writeText(window.location.origin + window.location.pathname + "?ref=" + window.user.uid); alert("Link copiado!"); };
    window.comprar = (c, v) => alert("Cargo: "+c+" | Valor: "+v+" | PIX: thiago00dudu@gmail.com");
</script>
</body>
</html>
