<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICE - Comando e Promoção</title>
<style>
:root { --bg: #dff6ff; --sea: #0f3452; --gold: #ffd700; --yellow: #ffff00; --blue: #007bff; --red: #ff4d4d; --green: #23c79c; }
body { margin: 0; font-family: sans-serif; background: var(--bg); color: var(--sea); }
.header { padding: 15px; background: rgba(255,255,255,0.8); display: flex; justify-content: space-between; border-bottom: 1px solid #7ec8e6; position: sticky; top: 0; z-index: 100; }

/* Estrelas */
.star-adm1 { color: var(--gold); font-weight: bold; text-shadow: 0 0 3px rgba(0,0,0,0.2); }
.star-adm2 { color: var(--yellow); font-weight: bold; }
.star-mod { color: var(--blue); font-weight: bold; }

.screen { display: none; padding: 15px; }
.active { display: block; }
.card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); position: relative; }
input, textarea { padding: 12px; border-radius: 10px; border: 1px solid #ccc; width: 100%; margin-bottom: 10px; box-sizing: border-box; }

/* Botões de Comando */
.btn-cmd { padding: 5px 8px; font-size: 9px; color: white; border: none; border-radius: 4px; margin-right: 4px; cursor: pointer; font-weight: bold; }
.btn-chat { background: var(--green); color: white; width: 100%; padding: 10px; border: none; border-radius: 8px; margin-top: 10px; font-weight: bold; }

/* Chat */
#chatBox { position: fixed; inset: 0; background: white; z-index: 1000; display: none; flex-direction: column; }
.chat-h { padding: 15px; background: var(--sea); color: white; display: flex; justify-content: space-between; }
#chatMsgs { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
.m { padding: 8px 12px; border-radius: 12px; max-width: 70%; font-size: 14px; }
.m.me { background: var(--sea); color: white; align-self: flex-end; }
.m.ht { background: #eee; align-self: flex-start; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" class="active" style="position:fixed; inset:0; background:white; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:2000;">
    <h2 style="color:var(--sea)">ICE SISTEMA</h2>
    <input type="text" id="loginNome" placeholder="Seu Nome" style="width:70%">
    <input type="password" id="loginPass" placeholder="Senha (Só ADM 1)" style="width:70%">
    <button onclick="entrar()" style="background:var(--sea); color:white; padding:15px 40px; border-radius:30px; border:none; font-weight:bold;">ENTRAR</button>
</div>

<!-- APP -->
<div id="app" class="screen">
    <header class="header">
        <div id="meuStatus"></div>
        <button onclick="location.reload()" style="background:none; border:none; color:red; font-size:12px;">SAIR</button>
    </header>

    <div class="card" style="margin-top:15px">
        <textarea id="postTxt" placeholder="O que deseja postar ou trocar?"></textarea>
        <button onclick="novoPost()" style="background:var(--sea); color:white; width:100%; padding:10px; border:none; border-radius:8px; font-weight:bold;">POSTAR AGORA</button>
    </div>

    <div id="timeline"></div>
</div>

<!-- CHAT -->
<div id="chatBox">
    <div class="chat-h"><span id="comQuem">Chat</span> <button onclick="fecharChat()" style="background:none; border:none; color:white; font-weight:bold;">X</button></div>
    <div id="chatMsgs"></div>
    <div style="padding:10px; display:flex; gap:5px; border-top:1px solid #ddd;">
        <input type="text" id="msgIn" placeholder="Mensagem..." style="margin:0">
        <button onclick="enviarMsg()" style="background:var(--green); color:white; border:none; padding:10px; border-radius:8px;">ENVIAR</button>
    </div>
</div>

<script>
let meuUser = { nome: "", cargo: "COMUM" };

function entrar() {
    const n = document.getElementById('loginNome').value;
    const p = document.getElementById('loginPass').value;
    if(!n) return alert("Digite seu nome");

    if(p === "1533") {
        meuUser = { nome: n, cargo: "ADM1" };
    } else {
        meuUser = { nome: n, cargo: "COMUM" };
    }

    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').classList.add('active');
    atualizarPerfil();
}

function atualizarPerfil() {
    const status = document.getElementById('meuStatus');
    let e = "";
    if(meuUser.cargo === "ADM1") e = '<span class="star-adm1">★ ADM SUPREMO</span>';
    else if(meuUser.cargo === "ADM2") e = '<span class="star-adm2">★ ADM 2 CLASSE</span>';
    else if(meuUser.cargo === "MOD") e = '<span class="star-mod">★ MODERADOR</span>';
    else e = '<span>Usuário Comum</span>';
    status.innerHTML = `${e}<br><strong>${meuUser.nome}</strong>`;
}

function novoPost() {
    const t = document.getElementById('postTxt').value;
    if(!t) return;
    
    const feed = document.getElementById('timeline');
    const card = document.createElement('div');
    card.className = 'card';
    
    let estrelaPost = "";
    if(meuUser.cargo === "ADM1") estrelaPost = "star-adm1";
    else if(meuUser.cargo === "ADM2") estrelaPost = "star-adm2";
    else if(meuUser.cargo === "MOD") estrelaPost = "star-mod";

    let botoes = "";
    // Lógica de Comando Dinâmico
    if(meuUser.cargo === "ADM1") {
        botoes += `<button class="btn-cmd" style="background:var(--red)" onclick="this.closest('.card').remove()">BANIR</button>`;
        botoes += `<button class="btn-cmd" style="background:var(--yellow); color:#333" onclick="alert('Promovido a ADM 2')">UP ADM 2</button>`;
        botoes += `<button class="btn-cmd" style="background:var(--blue)" onclick="alert('Promovido a MOD')">UP MOD</button>`;
    } else if(meuUser.cargo === "ADM2") {
        botoes += `<button class="btn-cmd" style="background:#666" onclick="this.closest('.card').style.opacity='0.3'">BLOCK</button>`;
        botoes += `<button class="btn-cmd" style="background:var(--yellow); color:#333" onclick="alert('Promovido a ADM 2')">UP ADM 2</button>`;
        botoes += `<button class="btn-cmd" style="background:var(--blue)" onclick="alert('Promovido a MOD')">UP MOD</button>`;
    } else if(meuUser.cargo === "MOD") {
        botoes += `<button class="btn-cmd" style="background:#666" onclick="this.closest('.card').style.opacity='0.3'">BLOCK</button>`;
        botoes += `<button class="btn-cmd" style="background:var(--blue)" onclick="alert('Promovido a MOD')">UP MOD</button>`;
    }

    card.innerHTML = `
        <div style="font-size:12px"><span class="${estrelaPost}">★</span> <strong>${meuUser.nome}</strong></div>
        <p>${t}</p>
        <div>${botoes}</div>
        <button class="btn-chat" onclick="abrirChat('${meuUser.nome}')">CHAMAR NO CHAT</button>
    `;
    feed.prepend(card);
    document.getElementById('postTxt').value = "";
}

function abrirChat(n) {
    document.getElementById('comQuem').innerText = "Chat com: " + n;
    document.getElementById('chatBox').style.display = 'flex';
}
function fecharChat() { document.getElementById('chatBox').style.display = 'none'; }
function enviarMsg() {
    const i = document.getElementById('msgIn');
    if(!i.value) return;
    const m = document.createElement('div');
    m.className = 'm me';
    m.innerText = i.value;
    document.getElementById('chatMsgs').appendChild(m);
    i.value = "";
}
</script>

    initializeApp(firebaseConfig);
</script>
</body>
</html>
