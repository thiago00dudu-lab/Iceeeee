<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="google-site-verification" content="VYruh3znNDFAefM5Rn82etwaMrQLV0m2JvXM7-8HHUw" />
    
    <meta name="robots" content="index, follow">
    <meta name="description" content="ICE TROCAS - Global platform for trading, negotiations and BLUE coins. A plataforma oficial de trocas.">
    <meta name="keywords" content="trade, exchange, trocas, marketplace, crypto, blue coins, negociação, world trade">
    <link rel="canonical" href="https://iceeeee.vercel.app/">
    <meta property="og:title" content="ICE TROCAS - Oficial">
    <meta property="og:description" content="Trade anything, anywhere. Global trading platform.">

    <title>ICE TROCAS - Oficial</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        /* CORES E EFEITO ANTÁRTIDA (GELO) */
        :root { 
            --bg: #050a0f; 
            --sea: rgba(15, 52, 82, 0.7); 
            --blue: #1877f2; 
            --ice: rgba(255, 255, 255, 0.1); /* Efeito vidro */
            --gold: #FFD700; 
            --white: #fff; 
            --green: #25d366; 
            --red: #ff4d4d; 
            --mod-blue: #00BFFF; 
            --gray: rgba(48, 54, 61, 0.6); 
        }

        body { 
            margin:0; 
            font-family: sans-serif; 
            background: radial-gradient(circle at top, #102a43, #050a0f); 
            color: white; 
            padding-bottom: 90px; 
            overflow-x: hidden; 
        }
        
        #telaLogin { position: fixed; inset: 0; background: #050a0f; z-index: 5000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: rgba(255,255,255,0.9); padding: 30px; border-radius: 20px; width: 85%; max-width: 350px; text-align: center; color: black; }
        .login-box input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }

        .badge-star { font-size: 14px; display: flex; gap: 4px; align-items: center; justify-content: center; margin-bottom: 5px; }
        .star-mod { color: var(--mod-blue); }
        .star-adm2 { color: var(--red); }
        .star-adm1 { color: var(--gold); }

        .side-menu { position: fixed; right: 15px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 10px; z-index: 4000; }
        .btn-float { width: 42px; height: 42px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; color: white; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.4); font-size: 16px; }

        /* CABEÇALHO COM TRANSPARÊNCIA */
        header { 
            padding:15px; 
            background: rgba(22, 27, 34, 0.7); 
            backdrop-filter: blur(10px); 
            display:flex; 
            justify-content:space-between; 
            align-items:center; 
            border-bottom: 1px solid rgba(255,255,255,0.1); 
            position: sticky; 
            top:0; 
            z-index:100; 
        }
        
        .header-actions { display: flex; gap: 15px; align-items: center; }

        .perfil-icon-container { position: relative; cursor: pointer; }
        .notificacao-balao { position: absolute; top: -5px; right: -5px; background: var(--red); width: 12px; height: 12px; border-radius: 50%; border: 2px solid #161b22; display: none; }

        /* CARD COM EFEITO VIDRO GELO */
        .card-timeline { 
            background: var(--ice); 
            backdrop-filter: blur(10px);
            border-radius: 15px; 
            overflow: hidden; 
            margin: 15px; 
            border: 1px solid rgba(255,255,255,0.1); 
            position: relative; 
        }
        .card-timeline img { width: 100%; height: 320px; object-fit: cover; }
        .card-info { padding: 15px; }

        .btn-delete-post { position: absolute; top: 10px; right: 10px; background: rgba(255, 77, 77, 0.8); color: white; border: none; width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 10; font-size: 14px; }

        /* NAV COM TRANSPARÊNCIA */
        .nav { 
            position: fixed; 
            bottom: 15px; 
            left: 50%; 
            transform: translateX(-50%); 
            background: rgba(22, 27, 34, 0.8); 
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1); 
            display: flex; 
            gap: 25px; 
            padding: 12px 30px; 
            border-radius: 40px; 
            z-index: 3000; 
        }
        .nav i { color: #8b949e; font-size: 22px; cursor: pointer; }
        .nav i.active { color: var(--mod-blue); }

        .tela-full { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background: rgba(5, 10, 15, 0.95); 
            backdrop-filter: blur(15px);
            z-index: 2000; 
            overflow-y: auto; 
            padding: 20px; 
            box-sizing: border-box; 
        }
        .btn-action { background: var(--blue); color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; margin-top: 10px; cursor: pointer; }
        
        .grid-postagens { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-top: 15px; }
        .grid-postagens img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 5px; }
        
        .conversa-item { background: var(--ice); padding: 12px; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.1); }

        .painel-adm { background: rgba(255, 215, 0, 0.05); border: 2px solid var(--gold); padding: 15px; border-radius: 15px; margin-top: 15px; }
        .user-photo { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; border: 3px solid var(--mod-blue); margin-bottom: 10px; background: #161b22; }
        .file-label { display: block; background: #30363d; color: white; padding: 10px; border-radius: 5px; cursor: pointer; margin-bottom: 10px; font-size: 12px; text-align: center; }

        .card-troca-concluida { background: rgba(28, 33, 40, 0.8); border: 1px solid var(--green); border-radius: 10px; padding: 10px; margin-top: 10px; text-align: left; position: relative; }
        .card-troca-concluida img { width: 100%; height: 120px; object-fit: cover; border-radius: 8px; margin-bottom: 5px; }
        .stars-display { color: var(--gold); font-size: 12px; }
        .badge-concluido { position: absolute; top: 5px; right: 5px; background: var(--green); font-size: 10px; padding: 2px 6px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="side-menu" id="menuFlutuante" style="display:none;">
    <button class="btn-float" style="background: var(--gold); color:black;" onclick="comprar('ADM1 SUPREMO', 'R$ 22.000.000')"><i class="fas fa-crown"></i></button>
    <button class="btn-float" style="background: var(--red);" onclick="comprar('ADM2', 'R$ 50')"><i class="fas fa-shield-alt"></i></button>
    <button class="btn-float" style="background: var(--mod-blue);" onclick="comprar('MOD', 'R$ 20')"><i class="fas fa-star"></i></button>
    <button class="btn-float" style="background: var(--green);" onclick="window.open('https://wa.me/5511983602504')"><i class="fab fa-whatsapp"></i></button>
</div>

<div id="telaLogin">
    <div class="login-box">
        <h2>ICE TROCAS</h2>
        <input type="text" id="userIn" placeholder="Login">
        <input type="password" id="passIn" placeholder="Senha">
        <button class="btn-action" onclick="fazerLogin()">ENTRAR</button>
    </div>
</div>

<div id="app" style="display:none;">
    <header>
        <b style="color: var(--mod-blue);">ICE TROCAS</b> 
        <div class="header-actions">
            <i class="fas fa-share-alt" style="font-size:22px; color:var(--white); cursor:pointer;" onclick="compartilharSite()"></i>
            
            <div class="perfil-icon-container" onclick="abrirMeuPerfil()">
                <i class="fas fa-user-circle" style="font-size:26px; color:var(--mod-blue);"></i>
                <div id="balaoAlerta" class="notificacao-balao"></div>
            </div>
        </div>
    </header>
    <div id="feed"></div>
    <div class="nav">
        <i class="fas fa-home active" onclick="fecharTelas()"></i>
        <i class="fas fa-plus-circle" onclick="abrirPostar()" style="color:var(--mod-blue); font-size: 28px;"></i>
        <i class="fas fa-wallet" onclick="abrirCarteira()"></i>
    </div>
</div>

<div id="telaPerfil" class="tela-full">
    <div id="perfilConteudo" style="text-align:center;"></div>
    
    <div id="minhasConversas" style="margin-top: 20px; display:none;">
        <h4 style="color:var(--mod-blue); border-bottom: 1px solid #333; padding-bottom: 5px;"><i class="fas fa-comments"></i> Minhas Negociações</h4>
        <div id="listaConversas"></div>
    </div>

    <div id="secaoTrocasConcluidas" style="margin-top:20px;">
        <h4 style="color:var(--green); border-bottom: 1px solid #333; padding-bottom: 5px;"><i class="fas fa-check-double"></i> Trocas Realizadas</h4>
        <div id="gridTrocasConcluidas" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;"></div>
    </div>

    <div id="areaEditarPerfil" style="display:none; margin-top:15px; background: rgba(22, 27, 34, 0.8); padding: 15px; border-radius: 15px;">
        <label for="editFotoFile" class="file-label"><i class="fas fa-image"></i> Alterar Foto da Galeria</label>
        <input type="file" id="editFotoFile" accept="image/*" style="display:none;" onchange="prepararFotoPerfil(this)">
        <input type="text" id="editBio" placeholder="Sua Bio" style="width:100%; padding:10px; margin-bottom:10px; border-radius:5px; border:none; box-sizing:border-box; background: #30363d; color: white;">
        <button class="btn-action" style="background:var(--green); margin-bottom:10px;" onclick="salvarPerfil()">SALVAR PERFIL</button>
    </div>

    <div id="painelAdmControle" class="painel-adm" style="display:none;">
        <h4 style="color:var(--gold); text-align:center; margin-top:0;">👑 MASTER CONTROL</h4>
        <div style="display:flex; gap:5px;">
            <button class="btn-action" style="background:var(--gold); color:black; font-size:10px;" onclick="mudarCargo('ADM1')">ADM1</button>
            <button class="btn-action" style="background:var(--red); font-size:10px;" onclick="mudarCargo('ADM2')">ADM2</button>
            <button class="btn-action" style="background:var(--mod-blue); font-size:10px;" onclick="mudarCargo('MOD')">MOD</button>
        </div>
        <button class="btn-action" style="background:var(--gray); width:100%; margin-top:10px; color:var(--red);" onclick="bloquearUsuario()"><i class="fas fa-ban"></i> BLOQUEAR USUÁRIO</button>
    </div>

    <h4>Postagens</h4>
    <div id="gridUser" class="grid-postagens"></div>
    <button class="btn-action" style="background:var(--gray); margin-top:20px;" onclick="fecharTelas()">VOLTAR</button>
</div>

<div id="telaFinalizarTroca" class="tela-full" style="z-index: 3500;">
    <h2>Finalizar Troca</h2>
    <p><small>Descreva o que foi trocado para evitar fraudes e avalie o usuário.</small></p>
    <input type="text" id="trocaDesc" placeholder="Ex: Trocamos um Celular por Blue Coins" style="width:100%; padding:12px; margin-bottom:15px; border-radius:8px; border:none; box-sizing:border-box; background:#161b22; color:white;">
    <p>Sua Avaliação:</p>
    <div id="ratingInput" style="font-size:30px; color:var(--gold); display:flex; gap:10px; justify-content:center; margin-bottom:20px;">
        <i class="far fa-star" onclick="setRating(1)" data-val="1"></i>
        <i class="far fa-star" onclick="setRating(2)" data-val="2"></i>
        <i class="far fa-star" onclick="setRating(3)" data-val="3"></i>
        <i class="far fa-star" onclick="setRating(4)" data-val="4"></i>
        <i class="far fa-star" onclick="setRating(5)" data-val="5"></i>
    </div>
    <button class="btn-action" style="background:var(--green);" onclick="confirmarConclusaoTroca()">CONCLUIR E CONGELAR NO PERFIL</button>
    <button class="btn-action" style="background:none;" onclick="document.getElementById('telaFinalizarTroca').style.display='none'">CANCELAR</button>
</div>

<div id="telaChat" class="tela-full">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2 id="chatTitle" style="margin:0;">Negociação</h2>
        <button onclick="abrirFinalizarTroca()" style="background:var(--green); border:none; color:white; padding:5px 10px; border-radius:5px; font-size:10px; font-weight:bold;"><i class="fas fa-check-circle"></i> FINALIZAR TROCA</button>
    </div>
    <div id="chatBox" style="height:350px; background:rgba(0,0,0,0.3); border-radius:15px; padding:15px; overflow-y:auto; margin-top:10px;"></div>
    <div style="display:flex; gap:8px; margin-top:15px; align-items:center;">
        <label for="fileChat" class="btn-action" style="width:auto; margin:0; padding:12px 15px; background:var(--gray); cursor:pointer;"><i class="fas fa-camera"></i></label>
        <input type="file" id="fileChat" accept="image/*" style="display:none;" onchange="prepararFotoChat(this)">
        <input type="text" id="chatMsg" placeholder="Digite uma mensagem..." style="flex:1; padding:12px; border-radius:8px; border:none; box-sizing:border-box; background: rgba(255,255,255,0.1); color: white;">
        <button class="btn-action" style="width:auto; margin:0; padding:12px 15px; background:var(--green);" onclick="enviarMensagem()"><i class="fas fa-paper-plane"></i></button>
    </div>
    <button class="btn-action" style="margin-top:20px;" onclick="fecharTelas()">VOLTAR</button>
</div>

<div id="telaCarteira" class="tela-full">
    <div style="background:var(--sea); padding:30px; border-radius:20px; text-align:center;"><p>Saldo BLUE</p><h1 id="saldoBlue">0</h1></div>
    <button class="btn-action" onclick="fecharTelas()">VOLTAR</button>
</div>

<div id="telaPostar" class="tela-full">
    <h2>Nova Postagem</h2>
    <label for="filePost" class="file-label">Escolher Foto</label>
    <input type="file" id="filePost" accept="image/*" style="display:none;" onchange="prepararFotoPost(this)">
    <input type="text" id="descPost" placeholder="Descrição" style="width:100%; padding:12px; border-radius:8px; border:none; background:rgba(255,255,255,0.1); color:white; margin-bottom:10px;">
    <button class="btn-action" onclick="enviarPost()">POSTAR</button>
    <button class="btn-action" style="background:none" onclick="fecharTelas()">CANCELAR</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, update, set, push, get, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = { apiKey: "AIzaSyDM5M1_O-wfcBDGYJIiYgiHVbqhiKC-0dw", databaseURL: "https://icek-9cdd7-default-rtdb.firebaseio.com", projectId: "icek-9cdd7" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    window.user = null;
    let targetUid = null;
    let currentRating = 0;
    let fotoPerfilBase64 = null;
    let fotoPostBase64 = null;
    let idDoChatAtual = null;
    let targetNomeChat = "";
    let fotoChatBase64 = null;

    const urlParams = new URLSearchParams(window.location.search);
    const idPai = urlParams.get('ref');

    function getBadge(cargo) {
        if(cargo === 'ADM1') return '<div class="badge-star star-adm1"><i class="fas fa-star"></i><i class="fas fa-crown"></i></div>';
        if(cargo === 'ADM2') return '<div class="badge-star star-adm2"><i class="fas fa-star"></i></div>';
        if(cargo === 'MOD') return '<div class="badge-star star-mod"><i class="fas fa-star"></i></div>';
        return '';
    }

    // FUNÇÃO PARA COMPARTILHAR O SITE
    window.compartilharSite = () => {
        const link = "https://iceeeee.vercel.app/";
        if (navigator.share) {
            navigator.share({
                title: 'ICE TROCAS - Oficial',
                text: 'Entre na plataforma oficial de trocas!',
                url: link
            }).catch(console.error);
        } else {
            navigator.clipboard.writeText(link);
            alert("Link copiado para a área de transferência!");
        }
    };

    function monitorarNotificacoes() {
        onValue(ref(db, 'chats'), snap => {
            let temNova = false;
            snap.forEach(chat => {
                if (chat.key.includes(window.user.uid)) {
                    const msgs = Object.values(chat.val());
                    const ultima = msgs[msgs.length - 1];
                    if (ultima.remetente !== window.user.uid && (Date.now() - ultima.timestamp < 10000)) temNova = true;
                }
            });
            document.getElementById('balaoAlerta').style.display = temNova ? 'block' : 'none';
        });
    }

    window.fazerLogin = async () => {
        let u = document.getElementById('userIn').value.trim();
        const p = document.getElementById('passIn').value;
        if(u.toUpperCase() === "ADM" && p === "1533") {
            const m = { nome: "MASTER ADM1", cargo: "ADM1", uid: "master_ice", moedasBlue: 1000000, foto: "", bio: "", pai: "", filhos: 0 };
            await set(ref(db, `usuarios/master_ice`), m);
            localStorage.setItem('ice_user', JSON.stringify(m));
            location.reload(); return;
        }
        const emailFake = u.includes('@') ? u : u + "@ice.com";
        try { await signInWithEmailAndPassword(auth, emailFake, p); } catch (e) { 
            try {
                const res = await createUserWithEmailAndPassword(auth, emailFake, p);
                const novoUser = { nome: u, cargo: 'user', uid: res.user.uid, moedasBlue: 0, foto:"", bio:"", pai: idPai || "", filhos: 0 };
                await set(ref(db, `usuarios/${res.user.uid}`), novoUser);
            } catch (err) { alert("Erro ao entrar."); }
        }
    };

    onAuthStateChanged(auth, async (u) => {
        const local = localStorage.getItem('ice_user');
        if (local) { window.user = JSON.parse(local); showApp(); }
        else if (u) {
            const s = await get(ref(db, `usuarios/${u.uid}`));
            window.user = s.val(); showApp();
        }
    });

    function showApp() {
        document.getElementById('telaLogin').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        document.getElementById('menuFlutuante').style.display = 'flex';
        monitorarNotificacoes();
        
        onValue(ref(db, 'posts'), snap => {
            const f = document.getElementById('feed'); f.innerHTML = "";
            snap.forEach(p => { 
                const pt = p.val();
                const postId = p.key;
                const ehAdm = window.user && (window.user.cargo === 'ADM1' || window.user.cargo === 'ADM2');
                f.innerHTML = `
                <div class="card-timeline">
                    ${ehAdm ? `<button class="btn-delete-post" onclick="removerPost('${postId}')"><i class="fas fa-trash"></i></button>` : ""}
                    <img src="${pt.i1}" onclick="abrirPerfil('${pt.uid}')">
                    <div class="card-info">
                        ${getBadge(pt.cargo)} <b>${pt.u1}</b><br>
                        <small style="color:#aaa;">${pt.d1}</small>
                        <button class="btn-action" style="background:rgba(15, 52, 82, 0.8);" onclick="abrirChat('${pt.uid}', '${pt.u1}')">NEGOCIAR</button>
                    </div>
                </div>` + f.innerHTML;
            });
        });
    }

    window.setRating = (v) => {
        currentRating = v;
        const stars = document.querySelectorAll('#ratingInput i');
        stars.forEach((s, idx) => {
            if(idx < v) { s.classList.remove('far'); s.classList.add('fas'); }
            else { s.classList.remove('fas'); s.classList.add('far'); }
        });
    };

    window.abrirFinalizarTroca = () => { document.getElementById('telaFinalizarTroca').style.display = 'block'; };

    window.confirmarConclusaoTroca = async () => {
        const desc = document.getElementById('trocaDesc').value;
        if(!desc || currentRating === 0) return alert("Por favor, preencha a descrição e avalie com estrelas!");
        
        const partes = idDoChatAtual.split('_');
        const outroUid = partes[0] === window.user.uid ? partes[1] : partes[0];

        const dadosTroca = {
            idTroca: idDoChatAtual,
            participantes: [window.user.uid, outroUid],
            descricao: desc,
            nota: currentRating,
            data: Date.now(),
            nomeAvaliador: window.user.nome
        };

        await push(ref(db, `trocas_concluidas/${window.user.uid}`), dadosTroca);
        await push(ref(db, `trocas_concluidas/${outroUid}`), dadosTroca);

        alert("Troca Concluída com sucesso! Histórico gerado no perfil.");
        document.getElementById('telaFinalizarTroca').style.display = 'none';
        fecharTelas();
    };

    window.abrirPerfil = async (uid) => {
        targetUid = uid;
        const s = await get(ref(db, `usuarios/${uid}`));
        const t = s.val();
        const souEu = window.user.uid === uid;
        
        document.getElementById('areaEditarPerfil').style.display = souEu ? 'block' : 'none';
        document.getElementById('minhasConversas').style.display = souEu ? 'block' : 'none';
        document.getElementById('perfilConteudo').innerHTML = `<img src="${t.foto || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" class="user-photo">${getBadge(t.cargo)}<h2>${t.nome}</h2><p style="color:#aaa;">${t.bio || 'Membro do Ice Trocas'}</p><div style="background:var(--ice); padding:10px; border-radius:10px; display:inline-block;"><b>SALDO: ${t.moedasBlue || 0} BLUE</b></div>`;
        
        const grid = document.getElementById('gridUser'); grid.innerHTML = "";
        const allPosts = await get(ref(db, 'posts'));
        allPosts.forEach(p => { if(p.val().uid === uid) grid.innerHTML += `<img src="${p.val().i1}">`; });

        const gridConcluidas = document.getElementById('gridTrocasConcluidas');
        gridConcluidas.innerHTML = "";
        const sConcluidas = await get(ref(db, `trocas_concluidas/${uid}`));
        if(sConcluidas.exists()){
            sConcluidas.forEach(tr => {
                const troca = tr.val();
                let estrelas = "";
                for(let i=0; i<5; i++) estrelas += `<i class="${i < troca.nota ? 'fas' : 'far'} fa-star"></i>`;
                gridConcluidas.innerHTML += `
                <div class="card-troca-concluida">
                    <div class="badge-concluido">CONCLUÍDO</div>
                    <div class="stars-display">${estrelas}</div>
                    <p style="font-size:10px; margin:5px 0;"><b>${troca.nomeAvaliador}:</b> ${troca.descricao}</p>
                </div>`;
            });
        }
        document.getElementById('telaPerfil').style.display = 'block';
    };

    window.abrirMeuPerfil = () => {
        abrirPerfil(window.user.uid);
        const lista = document.getElementById('listaConversas');
        lista.innerHTML = "";
        get(ref(db, 'chats')).then(snap => {
            snap.forEach(chat => {
                if(chat.key.includes(window.user.uid)) {
                    const outroUid = chat.key.split('_').find(id => id !== window.user.uid);
                    get(ref(db, `usuarios/${outroUid}`)).then(uSnap => {
                        const ou = uSnap.val();
                        lista.innerHTML += `<div class="conversa-item"><span><b>${ou.nome}</b></span><button class="btn-action" style="width:auto; padding:5px 15px; margin:0; font-size:12px;" onclick="abrirChat('${ou.uid}', '${ou.nome}')">ABRIR</button></div>`;
                    });
                }
            });
        });
    };

    window.abrirChat = (alvoUid, n) => { 
        if(alvoUid === window.user.uid) return;
        targetNomeChat = n;
        document.getElementById('chatTitle').innerText = "Chat com " + n; 
        document.getElementById('telaChat').style.display='block'; 
        idDoChatAtual = window.user.uid < alvoUid ? window.user.uid + "_" + alvoUid : alvoUid + "_" + window.user.uid;
        onValue(ref(db, `chats/${idDoChatAtual}`), snap => {
            const cb = document.getElementById('chatBox'); cb.innerHTML = "";
            if(snap.exists()){
                snap.forEach(m => {
                    const msg = m.val();
                    const souEu = msg.remetente === window.user.uid;
                    cb.innerHTML += `<div style="align-self:${souEu?'flex-end':'flex-start'}; background:${souEu?'var(--sea)':'rgba(255,255,255,0.1)'}; padding:10px; border-radius:12px; max-width:80%; margin-bottom:10px; margin-left:${souEu?'auto':'0'};"><small style="color:var(--gold); font-size:10px;">${msg.nomeRemetente}</small><p style="margin:0; font-size:14px;">${msg.texto || ''}</p></div>`;
                });
                cb.scrollTop = cb.scrollHeight; 
            }
        });
    };

    window.enviarMensagem = async () => {
        const t = document.getElementById('chatMsg').value;
        if(!t.trim()) return;
        await push(ref(db, `chats/${idDoChatAtual}`), { remetente: window.user.uid, nomeRemetente: window.user.nome, texto: t, timestamp: Date.now() });
        document.getElementById('chatMsg').value = "";
    };

    window.fecharTelas = () => { document.querySelectorAll('.tela-full').forEach(t => t.style.display = 'none'); };
    window.abrirPostar = () => { document.getElementById('telaPostar').style.display='block'; };
    window.abrirCarteira = () => { document.getElementById('telaCarteira').style.display='block'; };
    window.prepararFotoPost = (i) => { const r = new FileReader(); r.onload=(e)=>{ fotoPostBase64=e.target.result; }; r.readAsDataURL(i.files[0]); };
    window.enviarPost = async () => {
        if(!fotoPostBase64) return;
        await push(ref(db, 'posts'), { u1: window.user.nome, uid: window.user.uid, cargo: window.user.cargo, i1: fotoPostBase64, d1: document.getElementById('descPost').value });
        fecharTelas();
    };
    window.prepararFotoPerfil = (i) => { const r = new FileReader(); r.onload=(e)=>{ fotoPerfilBase64=e.target.result; }; r.readAsDataURL(i.files[0]); };
    window.salvarPerfil = async () => {
        const up = { bio: document.getElementById('editBio').value };
        if(fotoPerfilBase64) up.foto = fotoPerfilBase64;
        await update(ref(db, `usuarios/${window.user.uid}`), up);
        alert("Salvo!");
    };
    window.removerPost = async (id) => { if(confirm("Apagar post?")) await remove(ref(db, `posts/${id}`)); };
</script>
</body>
</html>
