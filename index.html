<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ICE</title>

<style>
:root{
  --bg1:#dff6ff;
  --bg2:#bfefff;
  --bg3:#8edcff;
  --sea:#0f3452;
  --sea2:#1d5277;
  --card:#eaf9ff;
  --card2:#d7f3ff;
  --line:#7ec8e6;
  --txt:#12344f;
  --mut:#4c7695;
  --ice:#6ed8ff;
  --ok:#23c79c;
  --bad:#ff6b7a;
  --gold:#ffd54f;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  color:var(--txt);
  background:
    radial-gradient(circle at 10% 20%, rgba(255,255,255,.55) 0 8px, transparent 9px),
    radial-gradient(circle at 22% 80%, rgba(255,255,255,.35) 0 5px, transparent 6px),
    radial-gradient(circle at 85% 15%, rgba(255,255,255,.38) 0 7px, transparent 8px),
    radial-gradient(circle at 70% 70%, rgba(255,255,255,.30) 0 4px, transparent 5px),
    linear-gradient(180deg,var(--bg1) 0%,var(--bg2) 45%,var(--bg3) 100%);
  min-height:100vh;
  position:relative;
  overflow-x:hidden;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  opacity:.22;
  background-image:
    url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180' viewBox='0 0 180 180'><g fill='none' stroke='%230f587e' stroke-width='3' opacity='.7'><path d='M25 150c12-22 12-45 0-67M35 150c12-18 14-36 8-56M15 150c10-14 8-28 0-42'/><path d='M120 150c0-22 8-44 20-62c8 10 10 24 6 40c12-10 20-20 24-34'/><path d='M70 138c10-16 12-28 8-42c16 6 22 18 24 30'/></g><g fill='%231a6a90' opacity='.7'><circle cx='145' cy='35' r='8'/><circle cx='154' cy='28' r='4'/><circle cx='155' cy='43' r='4'/><circle cx='136' cy='43' r='4'/><circle cx='136' cy='28' r='4'/></g><g fill='%232d82ad' opacity='.65'><path d='M92 26c6 10 7 18 2 25c-4-8-5-16-2-25Z'/><path d='M80 38c8 2 13 6 16 12c-8 1-14-2-16-12Z'/><path d='M104 39c-8 2-13 6-16 12c8 1 14-2 16-12Z'/></g></svg>");
  background-size:220px 220px;
  background-repeat:repeat;
}

header{
  padding:14px 16px;
  background:rgba(234,249,255,.88);
  border-bottom:1px solid var(--line);
  backdrop-filter:blur(8px);
  position:sticky;
  top:0;
  z-index:20;
}

.top{
  max-width:980px;
  margin:auto;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}

.brand{
  display:flex;
  align-items:center;
  gap:12px;
}

.logoBox{
  width:56px;
  height:56px;
  border-radius:18px;
  position:relative;
  overflow:hidden;
  border:1px solid #8bd4ec;
  background:linear-gradient(180deg,#ffffff,#bdeeff 60%,#6fbce1 100%);
  box-shadow:0 8px 24px rgba(0,0,0,.08);
}

.logoBox::before{
  content:"";
  position:absolute;
  left:8px;
  bottom:8px;
  width:40px;
  height:28px;
  background:linear-gradient(180deg,#fff,#d8f6ff);
  clip-path:polygon(50% 0,100% 100%,0 100%);
}

.logoBox::after{
  content:"";
  position:absolute;
  left:23px;
  bottom:8px;
  width:22px;
  height:18px;
  background:linear-gradient(180deg,#fff,#cbf0ff);
  clip-path:polygon(50% 0,100% 100%,0 100%);
}

.brand h1{
  margin:0;
  font-size:24px;
  letter-spacing:1px;
  color:#0f3452;
}

.brand small{
  display:block;
  color:var(--mut);
}

.wrap{
  max-width:980px;
  margin:auto;
  padding:16px;
  padding-bottom:96px;
}

.card{
  background:linear-gradient(180deg,var(--card),var(--card2));
  border:1px solid var(--line);
  border-radius:16px;
  padding:14px;
  margin-bottom:14px;
  box-shadow:0 10px 28px rgba(15,52,82,.07);
}

input,textarea{
  width:100%;
  padding:11px 12px;
  margin:6px 0;
  background:#ffffff;
  border:1px solid #9ad9ef;
  color:var(--txt);
  border-radius:10px;
  box-sizing:border-box;
}

button{
  padding:10px 14px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  margin-top:6px;
  font-weight:700;
}

.btn{
  background:var(--ice);
  color:#08314f;
}

.btn-danger{
  background:var(--bad);
  color:#fff;
}
</style>
</head>
<body>

  <!-- Conteúdo Visual do App -->
  <header>
    <div class="top">
      <div class="brand">
        <div class="logoBox"></div>
        <div>
          <h1>ICE</h1>
          <small>Sistema Conectado</small>
        </div>
      </div>
    </div>
  </header>

  <div class="wrap">
    <div class="card">

    </div>
  </div>

</html>
