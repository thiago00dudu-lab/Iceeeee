<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICE TROCAS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        :root { --bg: #e3effd; --sea: #0f3452; --blue: #1877f2; --white: #fff; }
        body { margin:0; font-family: 'Segoe UI', sans-serif; background: var(--bg); padding-bottom: 80px; }
        header { padding: 15px; background: var(--sea); color: white; text-align: center; font-weight: 900; position: sticky; top: 0; z-index: 100; }
        .wrap { max-width: 500px; margin: auto; padding: 15px; }
        .card { background: var(--white); border-radius: 20px; overflow: hidden; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); cursor: pointer; }
        .card img { width: 100%; height: 300px; object-fit: cover; }
        .card-info { padding: 15px; display: flex; align-items: center; gap: 10px; }
        /* Estilo da tela de perfil */
        #telaPerfil { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 2000; overflow-y: auto; }
        .capa { height: 150px; background: linear-gradient(to bottom, var(--blue), var(--sea)); position: relative; }
        .back-btn { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.5); color: white; border: none; border-radius: 50%; width: 40px; height: 40px; }
        .avatar-perfil { width: 90px; height: 90px; border-radius: 50%; border: 4px solid white; position: absolute; bottom: -45px; left: 20px; background: #ccc center/cover; }
        .perfil-content { margin-top: 55px; padding: 20px; }
        .nav { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); background: var(--sea); display: flex; gap: 60px; padding: 12px 40px; border-radius: 50px; }
        .nav i { color: white; font-size: 22px; }
    </style>
</head>
<body>

<header>ICE TROCAS</header>

<div class="wrap" id="feed">
    </div>

<div id="telaPerfil">
    <div class="capa">
        <button class="back-btn" onclick="fecharPerfil()"><i class="fas fa-arrow-left"></i></button>
        <div class="avatar-perfil"></div>
    </div>
    <div class="perfil-content">
        <h2 id="nomeNoPerfil">Usuário</h2>
        <p style="color: #666;">Interessado em trocas 🧊</p>
        <hr>
        <button style="width: 100%; padding: 15px; background: var(--blue); color: white; border: none; border-radius: 10px; font-weight: bold;">
            SOLICITAR TROCA
        </button>
    </div>
</div>

<div class="nav">
    <i class="fas fa-home" onclick="fecharPerfil()"></i>
    <i class="fas fa-plus-circle"></i>
    <i class="fas fa-user"></i>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyDM5M1_O-wfcBDGYJIiYgiHVbqhiKC-0dw", 
        databaseURL: "https://icek-9cdd7-default-rtdb.firebaseio.com", 
        projectId: "icek-9cdd7" 
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Carregar postagens e dar a função de clique
    onValue(ref(db, 'posts'), (snap) => {
        const feed = document.getElementById('feed');
        feed.innerHTML = "";
        snap.forEach(c => {
            const p = c.val();
            const card = document.createElement('div');
            card.className = "card";
            // AQUI ESTÁ A MÁGICA: Ao clicar em qualquer lugar do card, vai pro perfil
            card.onclick = () => abrirPerfil(p.u1); 
            
            card.innerHTML = `
                <img src="${p.i1}">
                <div class="card-info">
                    <i class="fas fa-user-circle" style="font-size: 24px; color: var(--sea)"></i>
                    <b style="color: var(--sea)">${p.u1}</b>
                </div>
            `;
            feed.prepend(card);
        });
    });

    window.abrirPerfil = (nome) => {
        document.getElementById('nomeNoPerfil').innerText = nome;
        document.getElementById('telaPerfil').style.display = 'block';
    };

    window.fecharPerfil = () => {
        document.getElementById('telaPerfil').style.display = 'none';
    };
</script>

</body>
</html>
