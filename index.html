<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ICE TROCAS - Oficial</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        :root { --bg: #0d1117; --sea: #0f3452; --blue: #1877f2; --gold: #FFD700; --white: #fff; --green: #25d366; --red: #ff4d4d; --mod-blue: #00BFFF; }
        body { margin:0; font-family: sans-serif; background: var(--bg); color: white; padding-bottom: 90px; overflow-x: hidden; }
        
        /* LOGIN */
        #telaLogin { position: fixed; inset: 0; background: var(--sea); z-index: 5000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: white; padding: 30px; border-radius: 20px; width: 85%; max-width: 350px; text-align: center; color: black; }
        .login-box input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }

        /* BANNER */
        .hero-banner { width: 100%; height: 220px; background: url('https://img2.unifans.io/67b9308608886.jpg') center/cover; position: relative; border-bottom: 3px solid var(--blue); }
        .hero-overlay { position: absolute; bottom: 0; background: linear-gradient(transparent, rgba(0,0,0,0.9)); width: 100%; padding: 15px; box-sizing: border-box; }

        /* ADS */
        .ads-side { position: fixed; right: 10px; top: 40%; transform: translateY(-50%); z-index: 4000; display: flex; flex-direction: column; gap: 12px; }
        .ad-circle { width: 70px; height: 70px; border-radius: 50%; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 9px; font-weight: bold; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5); cursor: pointer; border: 2px solid rgba(255,255,255,0.3); }
        
        /* BADGES */
        .badge { font-size: 11px; font-weight: bold; text-transform: uppercase; margin-bottom: 4px; display: block; }
        .badge-gold { color: var(--gold); }
        .badge-red { color: var(--red); }
        .badge-blue { color: var(--mod-blue); }

        header { padding:15px; background: #161b22; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:100; border-bottom: 1px solid #30363d; }
        .card-timeline { background: #161b22; border-radius: 15px; overflow: hidden; margin: 15px; border: 1px solid #30363d; cursor: pointer; }
        .card-timeline img { width: 100%; height: 300px; object-fit: cover; }

        .nav { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); background: #161b22; border: 1px solid #30363d; display: flex; gap: 25px; padding: 12px 30px; border-radius: 40px; z-index: 3000; }
        .nav i { color: #8b949e; font-size: 22px; cursor: pointer; }

        .tela-full { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 2000; overflow-y: auto; padding: 20px; }
        .btn-action { background: var(--blue); color: white; border: none; padding: 14px; border-radius: 8px; width: 100%; font-weight: bold; margin-top: 10px; cursor: pointer; }
        
        /* PAINEL ADM NO PERFIL */
        .painel-adm { background: #1c2128; padding: 15px; border-radius: 12px; margin-top: 20px; border: 1px dashed var(--blue); }
        .adm-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
    </style>
</head>
<body>

<div id="telaLogin">
    <div class="login-box">
        <h2>ICE LOGIN</h2>
        <input type="text" id="userIn" placeholder="E-mail ou ADM">
        <input type="password" id="passIn" placeholder="Senha">
        <button class="btn-action" style="background:var(--sea);" onclick="fazerLogin()">ENTRAR</button>
        <button class="btn-action" style="background:#db4437;" onclick="loginGoogle()">GOOGLE AUTH</button>
    </div>
</div>

<div class="ads-side">
    <div class="ad-circle" style="background: var(--mod-blue);" onclick="comprarCargo('MOD', 20)">MOD<br>R$ 20</div>
    <div class="ad-circle" style="background: var(--red);" onclick="comprarCargo('ADM2', 1000)">ADM 2<br>R$ 1k</div>
    <div class="ad-circle" style="background: var(--gold); color: black;" onclick="comprarCargo('ADM1', 'ice')">DONO<br>ICE $</div>
</div>

<div id="app" style="display:none;">
    <header>
        <div><b>ICE TROCAS</b><br><small id="btcValue" style="color:var(--blue);"></small></div>
        <button onclick="deslogar()" style="border:none; background:none; color:red; font-weight:bold;">SAIR</button>
    </header>
    <div class="hero-banner"><div class="hero-overlay"><h2>O que vamos trocar?</h2><small>1 BLUE = R$ 1,00</small></div></div>
    <div id="feed"></div>
    <div class="nav">
        <i class="fas fa-home" onclick="fecharTelas()"></i>
        <i class="fas fa-plus-circle" onclick="abrirPostar()" style="color: var(--blue);"></i>
        <i class="fas fa-wallet" onclick="abrirCarteira()"></i>
    </div>
</div>

<div id="telaPerfil" class="tela-full">
    <div id="perfilConteudo"></div>
    <button class="btn-action" style="background:#30363d;" onclick="fecharTelas()">VOLTAR AO FEED</button>
</div>

<div id="telaPostar" class="tela-full">
    <h2>Nova Postagem</h2>
    <input type="file" id="filePost" accept="image/*" style="color:white;"><br><br>
    <input type="text" id="descPost" placeholder="Descrição da troca..." style="width:100%; padding:12px; border-radius:8px; background:#161b22; color:white; border:1px solid #30363d;">
    <button class="btn-action" onclick="enviarPost()">POSTAR</button>
</div>

<div id="telaCarteira" class="tela-full">
    <div style="background:linear-gradient(135deg, var(--sea), var(--blue)); padding:40px; border-radius:20px; text-align:center;">
        <p>Meu Saldo</p>
        <h1 id="saldoBlue">0</h1>
        <small>BLUE COINS</small>
    </div>
    <button class="btn-action" style="background:white; color:black;" onclick="fecharTelas()">VOLTAR</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, update, set, push, runTransaction, get, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = { apiKey: "AIzaSyDM5M1_O-wfcBDGYJIiYgiHVbqhiKC-0dw", databaseURL: "https://icek-9cdd7-default-rtdb.firebaseio.com", projectId: "icek-9cdd7" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    window.user = null;

    // LOGIN
    window.fazerLogin = () => {
        const u = document.getElementById('userIn').value;
        const p = document.getElementById('passIn').value;
        if(u.toUpperCase() === "ADM" && p === "1533") {
            const master = { nome: "ADM MASTER", cargo: "ADM1", uid: "master", moedasBlue: 999999 };
            localStorage.setItem('ice_master', JSON.stringify(master));
            location.reload();
        }
    };
    window.loginGoogle = () => signInWithPopup(auth, provider);

    onAuthStateChanged(auth, async (u) => {
        const local = localStorage.getItem('ice_master');
        if (local) { window.user = JSON.parse(local); mostrarApp(); } 
        else if (u) {
            const snap = await get(ref(db, `usuarios/${u.uid}`));
            let dados = snap.val() || { nome: u.displayName, cargo: 'user', moedasBlue: 0, uid: u.uid, status: 'ativo' };
            if(dados.status === 'banido') { alert("BANIDO!"); signOut(auth); return; }
            if(!snap.val()) set(ref(db, `usuarios/${u.uid}`), dados);
            window.user = dados; mostrarApp();
        }
    });

    function mostrarApp() {
        document.getElementById('telaLogin').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        onValue(ref(db, 'posts'), carregarFeed);
        onValue(ref(db, 'economia/valor_ice'), s => { document.getElementById('btcValue').innerText = "ICE: $" + (s.val() || 0.7099).toFixed(4); });
        if(window.user.uid !== 'master') {
            onValue(ref(db, `usuarios/${window.user.uid}`), s => { document.getElementById('saldoBlue').innerText = s.val()?.moedasBlue || 0; });
        }
    }

    function carregarFeed(snap) {
        const f = document.getElementById('feed'); f.innerHTML = "";
        snap.forEach(c => {
            const p = c.val();
            const pid = c.key;
            let star = p.cargoUser === 'ADM1' ? 'badge-gold' : (p.cargoUser === 'ADM2' ? 'badge-red' : 'badge-blue');
            let starName = p.cargoUser === 'user' ? '' : `<span class="badge ${star}"><i class="fas fa-star"></i> ${p.cargoUser}</span>`;

            const div = document.createElement('div');
            div.className = "card-timeline";
            div.onclick = () => abrirPerfilAlheio(p.uid);
            div.innerHTML = `<img src="${p.i1}"><div style="padding:15px;">${starName}<b>${p.u1}</b><br><small>${p.d1}</small></div>`;
            f.prepend(div);
        });
    }

    // ABRIR PERFIL E MOSTRAR PAINEL ADM
    window.abrirPerfilAlheio = async (targetUid) => {
        const snap = await get(ref(db, `usuarios/${targetUid}`));
        const u = snap.val();
        if(!u) return;

        let painelAdm = "";
        if(window.user.cargo !== 'user') {
            painelAdm = `
                <div class="painel-adm">
                    <h3 style="margin-top:0; color:var(--blue);">Painel de Controle</h3>
                    <p>Cargo Atual: <b>${u.cargo}</b> | Blues: <b>${u.moedasBlue || 0}</b></p>
                    <div class="adm-grid">
                        <button onclick="mudarCargo('${u.uid}', 1)" style="background:var(--green); border:none; padding:10px; border-radius:5px; color:white; font-weight:bold;">SUBIR CARGO</button>
                        <button onclick="mudarCargo('${u.uid}', -1)" style="background:orange; border:none; padding:10px; border-radius:5px; color:white; font-weight:bold;">REBAIXAR</button>
                        ${window.user.cargo === 'ADM1' ? `<button onclick="gerirMoeda('${u.uid}')" style="background:var(--blue); border:none; padding:10px; border-radius:5px; color:white; font-weight:bold;">DAR BLUES</button>` : ''}
                        <button onclick="banirUsuario('${u.uid}')" style="background:var(--red); border:none; padding:10px; border-radius:5px; color:white; font-weight:bold;">BANIR</button>
                    </div>
                </div>`;
        }

        document.getElementById('perfilConteudo').innerHTML = `
            <div style="text-align:center; padding:20px;">
                <i class="fas fa-user-circle" style="font-size:80px; color:var(--blue);"></i>
                <h2>${u.nome}</h2>
                <p>Status: ${u.status}</p>
                <button class="btn-action" onclick="window.open('https://wa.me/5511983602504')">NEGOCIAR TROCA</button>
            </div>
            ${painelAdm}
        `;
        document.getElementById('telaPerfil').style.display = 'block';
    };

    // PODERES CORRIGIDOS
    window.gerirMoeda = (uid) => {
        let v = prompt("Quantos Blues dar ou tirar? (Ex: 100 ou -50)");
        if(v) {
            runTransaction(ref(db, `usuarios/${uid}/moedasBlue`), val => (val || 0) + parseInt(v))
            .then(() => { alert("Saldo atualizado!"); abrirPerfilAlheio(uid); });
        }
    };

    window.mudarCargo = async (uid, dir) => {
        const cargos = ["user", "MOD", "ADM2", "ADM1"];
        const s = await get(ref(db, `usuarios/${uid}`));
        let novoIdx = cargos.indexOf(s.val().cargo) + dir;
        if(novoIdx >= 0 && novoIdx < cargos.length) {
            await update(ref(db, `usuarios/${uid}`), { cargo: cargos[novoIdx] });
            alert("Cargo alterado!");
            abrirPerfilAlheio(uid);
        }
    };

    window.banirUsuario = (uid) => { if(confirm("Banir?")) update(ref(db, `usuarios/${uid}`), {status:'banido'}); };

    window.enviarPost = () => {
        const file = document.getElementById('filePost').files[0];
        const r = new FileReader();
        r.onload = (e) => {
            push(ref(db, 'posts'), { u1: window.user.nome, uid: window.user.uid, cargoUser: window.user.cargo, i1: e.target.result, d1: document.getElementById('descPost').value });
            fecharTelas();
        };
        r.readAsDataURL(file);
    };

    window.comprarCargo = (c, p) => { alert("PIX COPIADO!"); window.open("https://wa.me/5511983602504"); };
    window.fecharTelas = () => { document.querySelectorAll('.tela-full').forEach(t=>t.style.display='none'); };
    window.abrirPostar = () => document.getElementById('telaPostar').style.display='block';
    window.abrirCarteira = () => document.getElementById('telaCarteira').style.display='block';
    window.deslogar = () => { localStorage.clear(); signOut(auth); location.reload(); };
</script>
</body>
        </html>
