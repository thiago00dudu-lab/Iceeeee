<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ICE TROCAS - Oficial</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        :root { --bg: #0d1117; --sea: #0f3452; --blue: #1877f2; --gold: #FFD700; --white: #fff; --green: #25d366; --red: #ff4d4d; --mod-blue: #00BFFF; --gray: #30363d; }
        body { margin:0; font-family: sans-serif; background: var(--bg); color: white; padding-bottom: 90px; overflow-x: hidden; }
        
        #telaLogin { position: fixed; inset: 0; background: var(--sea); z-index: 5000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: white; padding: 30px; border-radius: 20px; width: 85%; max-width: 350px; text-align: center; color: black; }
        .login-box input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }

        .badge-star { font-size: 14px; display: flex; gap: 4px; align-items: center; justify-content: center; margin-bottom: 5px; }
        .star-mod { color: var(--mod-blue); }
        .star-adm2 { color: var(--red); }
        .star-adm1 { color: var(--gold); }

        .side-menu { position: fixed; right: 15px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 15px; z-index: 4000; }
        .btn-float { width: 45px; height: 45px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; color: white; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.4); font-size: 18px; }

        header { padding:15px; background: #161b22; display:flex; justify-content:space-between; align-items:center; border-bottom: 1px solid #30363d; }
        .card-timeline { background: #161b22; border-radius: 15px; overflow: hidden; margin: 15px; border: 1px solid #30363d; }
        .card-timeline img { width: 100%; height: 320px; object-fit: cover; }
        .card-info { padding: 15px; }

        .nav { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); background: #161b22; border: 1px solid #30363d; display: flex; gap: 25px; padding: 12px 30px; border-radius: 40px; z-index: 3000; }
        .nav i { color: #8b949e; font-size: 22px; cursor: pointer; }
        .nav i.active { color: var(--blue); }

        .tela-full { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 2000; overflow-y: auto; padding: 20px; }
        .btn-action { background: var(--blue); color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; margin-top: 10px; cursor: pointer; }
        
        .grid-postagens { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-top: 15px; }
        .grid-postagens img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 5px; background: #161b22; }
        
        .painel-adm { background: rgba(255, 215, 0, 0.1); border: 2px solid var(--gold); padding: 15px; border-radius: 15px; margin-top: 15px; }
    </style>
</head>
<body>

<div class="side-menu" id="menuFlutuante" style="display:none;">
    <button class="btn-float" style="background: var(--mod-blue);" onclick="comprar('MOD', 'R$ 20')"><i class="fas fa-star"></i></button>
    <button class="btn-float" style="background: var(--red);" onclick="comprar('ADM2', 'R$ 50')"><i class="fas fa-crown"></i></button>
    <button class="btn-float" style="background: var(--green);" onclick="window.open('https://wa.me/5511983602504')"><i class="fab fa-whatsapp"></i></button>
</div>

<div id="telaLogin">
    <div class="login-box">
        <h2>ICE TROCAS</h2>
        <input type="text" id="userIn" placeholder="Login">
        <input type="password" id="passIn" placeholder="Senha">
        <button class="btn-action" onclick="fazerLogin()">ENTRAR</button>
    </div>
</div>

<div id="app" style="display:none;">
    <header><b>ICE TROCAS</b> <i class="fas fa-user-circle" onclick="abrirMeuPerfil()" style="font-size:26px; color:var(--blue);"></i></header>
    <div id="feed"></div>
    <div class="nav">
        <i class="fas fa-home active" onclick="fecharTelas()"></i>
        <i class="fas fa-plus-circle" onclick="abrirPostar()" style="color:var(--blue); font-size: 28px;"></i>
        <i class="fas fa-wallet" onclick="abrirCarteira()"></i>
    </div>
</div>

<div id="telaPerfil" class="tela-full">
    <div id="perfilConteudo"></div>
    
    <div id="painelAdmControle" class="painel-adm" style="display:none;">
        <h4 style="color:var(--gold); text-align:center; margin-top:0;">👑 CONTROLE MASTER</h4>
        <div style="display:flex; flex-wrap:wrap; gap:5px;">
            <button class="btn-action" style="background:var(--gold); color:black; flex:1; font-size:10px;" onclick="mudarCargo('ADM1')">DAR ADM1</button>
            <button class="btn-action" style="background:var(--red); flex:1; font-size:10px;" onclick="mudarCargo('ADM2')">DAR ADM2</button>
            <button class="btn-action" style="background:var(--mod-blue); flex:1; font-size:10px;" onclick="mudarCargo('MOD')">DAR MOD</button>
        </div>
        <div style="display:flex; gap:5px; margin-top:10px;">
            <button class="btn-action" style="background:var(--green); flex:1;" onclick="addMoedas(true)"><i class="fas fa-plus"></i> BLUE</button>
            <button class="btn-action" style="background:var(--red); flex:1;" onclick="addMoedas(false)"><i class="fas fa-minus"></i> BLUE</button>
        </div>
    </div>

    <h4>Postagens do Usuário</h4>
    <div id="gridUser" class="grid-postagens"></div>
    <button class="btn-action" style="background:var(--gray); margin-top:20px;" onclick="fecharTelas()">VOLTAR</button>
</div>

<div id="telaCarteira" class="tela-full">
    <div style="background:var(--sea); padding:30px; border-radius:20px; text-align:center;">
        <p>Saldo BLUE</p>
        <h1 id="saldoBlue">0</h1>
    </div>
    <button class="btn-action" onclick="fecharTelas()">VOLTAR</button>
</div>

<div id="telaPostar" class="tela-full">
    <h2>Nova Postagem</h2>
    <input type="file" id="filePost" accept="image/*">
    <input type="text" id="descPost" placeholder="O que você quer trocar?">
    <button class="btn-action" onclick="enviarPost()">POSTAR</button>
    <button class="btn-action" style="background:none" onclick="fecharTelas()">CANCELAR</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, update, set, push, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = { apiKey: "AIzaSyDM5M1_O-wfcBDGYJIiYgiHVbqhiKC-0dw", databaseURL: "https://icek-9cdd7-default-rtdb.firebaseio.com", projectId: "icek-9cdd7" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    window.user = null;
    let targetUid = null;

    function getBadge(cargo) {
        if(cargo === 'ADM1') return '<div class="badge-star star-adm1"><i class="fas fa-star"></i><i class="fas fa-crown"></i></div>';
        if(cargo === 'ADM2') return '<div class="badge-star star-adm2"><i class="fas fa-star"></i></div>';
        if(cargo === 'MOD') return '<div class="badge-star star-mod"><i class="fas fa-star"></i></div>';
        return '';
    }

    window.fazerLogin = async () => {
        const u = document.getElementById('userIn').value;
        const p = document.getElementById('passIn').value;
        if(u.toUpperCase() === "ADM" && p === "1533") {
            const m = { nome: "MASTER ADM1", cargo: "ADM1", uid: "master_ice", moedasBlue: 1000000 };
            await set(ref(db, `usuarios/master_ice`), m);
            localStorage.setItem('ice_user', JSON.stringify(m));
            location.reload(); return;
        }
        try { await signInWithEmailAndPassword(auth, u, p); } catch (e) { 
            const res = await createUserWithEmailAndPassword(auth, u, p);
            await set(ref(db, `usuarios/${res.user.uid}`), { nome: u.split('@')[0], cargo: 'user', uid: res.user.uid, moedasBlue: 0 });
        }
    };

    onAuthStateChanged(auth, async (u) => {
        const local = localStorage.getItem('ice_user');
        if (local) { window.user = JSON.parse(local); showApp(); }
        else if (u) {
            const s = await get(ref(db, `usuarios/${u.uid}`));
            window.user = s.val(); showApp();
        }
    });

    function showApp() {
        document.getElementById('telaLogin').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        document.getElementById('menuFlutuante').style.display = 'flex';
        
        onValue(ref(db, 'posts'), snap => {
            const f = document.getElementById('feed'); f.innerHTML = "";
            snap.forEach(p => {
                const pt = p.val();
                f.innerHTML = `<div class="card-timeline">
                    <img src="${pt.i1}" onclick="abrirPerfil('${pt.uid}')">
                    <div class="card-info">
                        ${getBadge(pt.cargo)} <b>${pt.u1}</b><br><small>${pt.d1}</small>
                        <button class="btn-action" onclick="abrirPerfil('${pt.uid}')">NEGOCIAR</button>
                    </div>
                </div>` + f.innerHTML;
            });
        });
        onValue(ref(db, `usuarios/${window.user.uid}`), s => { if(s.exists()){ window.user = s.val(); document.getElementById('saldoBlue').innerText = s.val().moedasBlue; }});
    }

    window.abrirPerfil = async (uid) => {
        targetUid = uid;
        const s = await get(ref(db, `usuarios/${uid}`));
        const t = s.val();
        
        document.getElementById('painelAdmControle').style.display = (window.user.cargo === 'ADM1' && window.user.uid !== uid) ? 'block' : 'none';

        document.getElementById('perfilConteudo').innerHTML = `
            <div style="text-align:center; padding:20px;">
                <i class="fas fa-user-circle" style="font-size:60px; color:var(--blue);"></i>
                ${getBadge(t.cargo)} <h2>${t.nome}</h2>
                <div style="background:#161b22; padding:10px; border-radius:10px; border:1px solid #30363d;">
                    <b>SALDO: ${t.moedasBlue || 0} BLUE</b>
                </div>
            </div>`;

        const grid = document.getElementById('gridUser'); grid.innerHTML = "";
        const allPosts = await get(ref(db, 'posts'));
        allPosts.forEach(p => { if(p.val().uid === uid) grid.innerHTML += `<img src="${p.val().i1}">`; });

        document.getElementById('telaPerfil').style.display = 'block';
    };

    window.mudarCargo = async (c) => { await update(ref(db, `usuarios/${targetUid}`), { cargo: c }); alert("Cargo OK"); abrirPerfil(targetUid); };
    
    window.addMoedas = async (somar) => {
        const v = prompt("Quanto?"); if(!v) return;
        const s = await get(ref(db, `usuarios/${targetUid}`));
        const novo = somar ? (s.val().moedasBlue + parseInt(v)) : (s.val().moedasBlue - parseInt(v));
        await update(ref(db, `usuarios/${targetUid}`), { moedasBlue: Math.max(0, novo) });
        abrirPerfil(targetUid);
    };

    window.enviarPost = () => {
        const f = document.getElementById('filePost').files[0];
        const r = new FileReader();
        r.onload = (e) => {
            push(ref(db, 'posts'), { u1: window.user.nome, uid: window.user.uid, cargo: window.user.cargo, i1: e.target.result, d1: document.getElementById('descPost').value });
            fecharTelas();
        };
        r.readAsDataURL(f);
    };

    window.comprar = (cargo, valor) => alert(`PIX: thiago00dudu@gmail.com\nValor: ${valor}\nEnvie comprovante no Zap: 11983602504`);
    window.fecharTelas = () => { document.querySelectorAll('.tela-full').forEach(t=>t.style.display='none'); };
    window.abrirMeuPerfil = () => abrirPerfil(window.user.uid);
    window.abrirPostar = () => document.getElementById('telaPostar').style.display='block';
    window.abrirCarteira = () => document.getElementById('telaCarteira').style.display='block';
</script>
</body>
</html>
