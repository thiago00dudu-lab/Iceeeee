<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="description" content="ICE TROCAS - Global platform for trading, negotiations and BLUE coins.">
    <title>ICE TROCAS - Oficial</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        /* MANTIDO SEU TEMA ORIGINAL EXATAMENTE COMO SOLICITADO */
        :root { 
            --bg: #050a0f; --sea: rgba(15, 52, 82, 0.7); --blue: #1877f2; 
            --ice: rgba(255, 255, 255, 0.08); --gold: #FFD700; --white: #fff; 
            --green: #25d366; --red: #ff4d4d; --mod-blue: #00BFFF; --gray: #30363d; 
        }
        body { margin:0; font-family: sans-serif; background: radial-gradient(circle at top, #0d1d2d, #050a0f); color: white; padding-bottom: 90px; overflow-x: hidden; }
        #telaLogin { position: fixed; inset: 0; background: var(--bg); z-index: 5000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: white; padding: 30px; border-radius: 20px; width: 85%; max-width: 350px; text-align: center; color: black; }
        .login-box input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        .badge-star { font-size: 14px; display: flex; gap: 4px; align-items: center; justify-content: center; margin-bottom: 5px; }
        .star-mod { color: var(--mod-blue); }
        .star-adm2 { color: var(--red); }
        .star-adm1 { color: var(--gold); }
        .side-menu { position: fixed; right: 15px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 10px; z-index: 4000; }
        .btn-float { width: 42px; height: 42px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; color: white; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.4); font-size: 16px; }
        header { padding:15px; background: rgba(22, 27, 34, 0.8); backdrop-filter: blur(10px); display:flex; justify-content:space-between; align-items:center; border-bottom: 1px solid rgba(255,255,255,0.1); position: sticky; top:0; z-index:100; }
        .header-icons { display: flex; align-items: center; gap: 18px; }
        .perfil-icon-container { position: relative; cursor: pointer; z-index: 101; }
        .notificacao-balao { position: absolute; top: -5px; right: -5px; background: var(--red); width: 12px; height: 12px; border-radius: 50%; border: 2px solid #161b22; display: none; }
        .card-timeline { background: var(--ice); backdrop-filter: blur(5px); border-radius: 15px; overflow: hidden; margin: 15px; border: 1px solid rgba(255,255,255,0.05); position: relative; }
        .card-timeline img { width: 100%; height: 320px; object-fit: cover; }
        .card-info { padding: 15px; }
        .btn-delete-post { position: absolute; top: 10px; right: 10px; background: rgba(255, 77, 77, 0.8); color: white; border: none; width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 10; font-size: 14px; }
        .nav { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); background: rgba(22, 27, 34, 0.9); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); display: flex; gap: 25px; padding: 12px 30px; border-radius: 40px; z-index: 3000; }
        .nav i { color: #8b949e; font-size: 22px; cursor: pointer; }
        .nav i.active { color: var(--mod-blue); }
        .tela-full { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 2000; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .btn-action { background: var(--blue); color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .grid-postagens { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-top: 15px; }
        .grid-postagens img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 5px; }
        .conversa-item { background: var(--ice); padding: 12px; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.1); }
        .painel-adm { background: rgba(255, 215, 0, 0.05); border: 2px solid var(--gold); padding: 15px; border-radius: 15px; margin-top: 15px; }
        .user-photo { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; border: 3px solid var(--mod-blue); margin-bottom: 10px; background: #161b22; }
        .file-label { display: block; background: #30363d; color: white; padding: 10px; border-radius: 5px; cursor: pointer; margin-bottom: 10px; font-size: 12px; text-align: center; }
        .card-leilao { background: rgba(255, 215, 0, 0.1); border: 1px solid var(--gold); border-radius: 15px; overflow: hidden; margin: 15px; position: relative; }
        .card-leilao img { width: 100%; height: 250px; object-fit: cover; }
        .info-leilao { padding: 15px; text-align: center; }
        .valor-lance { font-size: 26px; color: var(--green); font-weight: bold; margin: 10px 0; }
        .btn-lance { background: var(--green); color: white; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; }
        .btn-arrematar { background: var(--gold); color: black; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top:5px;}
        .leilao-encerrado { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; color: var(--gold); font-size: 24px; font-weight: bold; z-index: 10; text-align: center; }
        
        #chatConteudo { display: flex; flex-direction: column; height: 80vh; }
        #mensagensChat { flex-grow: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px; border-radius: 10px; max-width: 80%; }
        .msg-me { background: var(--blue); align-self: flex-end; }
        .msg-them { background: var(--gray); align-self: flex-start; }

        /* ESTILO DA CARTEIRA */
        .wallet-card { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); padding: 25px; border-radius: 20px; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.3); margin-bottom: 20px; }
        .blue-amount { font-size: 36px; font-weight: bold; color: #00BFFF; text-shadow: 0 0 10px rgba(0,191,255,0.5); }
    </style>
</head>
<body>

<div class="side-menu" id="menuFlutuante" style="display:none;">
    <button class="btn-float" style="background: var(--gold); color:black;" onclick="comprar('ADM1', 'R$ 22.000.000')"><i class="fas fa-crown"></i></button>
    <button class="btn-float" style="background: var(--red);" onclick="comprar('ADM2', 'R$ 50')"><i class="fas fa-shield-alt"></i></button>
    <button class="btn-float" style="background: var(--mod-blue);" onclick="comprar('MOD', 'R$ 20')"><i class="fas fa-star"></i></button>
    <button class="btn-float" style="background: var(--green);" onclick="window.open('https://wa.me/5511983602504')"><i class="fab fa-whatsapp"></i></button>
</div>

<div id="telaLogin">
    <div class="login-box">
        <h2>ICE TROCAS</h2>
        <input type="text" id="userIn" placeholder="Login">
        <input type="password" id="passIn" placeholder="Senha">
        <button class="btn-action" onclick="fazerLogin()">ENTRAR</button>
    </div>
</div>

<div id="app" style="display:none;">
    <header>
        <b style="color: var(--mod-blue);">ICE TROCAS</b> 
        <div class="header-icons">
            <i class="fas fa-share-nodes" style="font-size:22px; color:white; cursor:pointer;" onclick="compartilharSite()"></i>
            <div class="perfil-icon-container" onclick="abrirMeuPerfil()">
                <i class="fas fa-user-circle" style="font-size:26px; color:var(--mod-blue);"></i>
                <div id="balaoAlerta" class="notificacao-balao"></div>
            </div>
        </div>
    </header>
    
    <div id="feed-leiloes"></div>
    <div id="feed"></div>

    <div class="nav">
        <i class="fas fa-home active" onclick="fecharTelas()"></i>
        <i class="fas fa-plus-circle" onclick="abrirPostar()" style="color:var(--mod-blue); font-size: 28px;"></i>
        <i class="fas fa-wallet" onclick="abrirCarteira()"></i>
    </div>
</div>

<div id="telaPerfil" class="tela-full">
    <div id="perfilConteudo" style="text-align:center;"></div>
    
    <div id="painelStaffLeilao" class="painel-adm" style="display:none; border-color: var(--mod-blue);">
        <h4 style="color:var(--mod-blue); text-align:center; margin-top:0;"><i class="fas fa-gavel"></i> PAINEL STAFF</h4>
        <button class="btn-action" style="background:var(--mod-blue);" onclick="document.getElementById('telaCriarLeilao').style.display='block'">ABRIR NOVO LEILÃO</button>
    </div>

    <div id="painelAdmControle" class="painel-adm" style="display:none;">
        <h4 style="color:var(--gold); text-align:center; margin-top:0;">👑 MASTER CONTROL</h4>
        <div style="display:flex; gap:5px; margin-bottom: 15px;">
            <button class="btn-action" style="background:var(--gold); color:black; font-size:10px;" onclick="mudarCargo('ADM1')">ADM1</button>
            <button class="btn-action" style="background:var(--red); font-size:10px;" onclick="mudarCargo('ADM2')">ADM2</button>
            <button class="btn-action" style="background:var(--mod-blue); font-size:10px;" onclick="mudarCargo('MOD')">MOD</button>
        </div>
        <hr style="opacity: 0.2;">
        <p style="text-align: center; font-size: 12px; color: var(--gold);">GERENCIAR BLUE COINS</p>
        <div style="display:flex; gap:5px;">
            <button class="btn-action" style="background:var(--green); font-size:10px;" onclick="ajustarBlues(100)">+100 BLUES</button>
            <button class="btn-action" style="background:var(--red); font-size:10px;" onclick="ajustarBlues(-100)">-100 BLUES</button>
        </div>
        <input type="number" id="valorPersonalizadoBlues" placeholder="Valor exato" style="width:100%; margin-top:10px; padding:8px; border-radius:5px; background:#161b22; color:white; border:1px solid var(--gray);">
        <button class="btn-action" style="background:var(--blue); font-size:10px;" onclick="definirBlues()">DEFINIR SALDO</button>
    </div>

    <h4>Postagens</h4>
    <div id="gridUser" class="grid-postagens"></div>
    <button class="btn-action" style="background:var(--gray); margin-top:20px;" onclick="fecharTelas()">VOLTAR</button>
</div>

<div id="telaCarteira" class="tela-full">
    <h3 style="text-align: center;"><i class="fas fa-wallet" style="color: var(--mod-blue);"></i> MINHA CARTEIRA</h3>
    <div class="wallet-card">
        <p style="margin: 0; opacity: 0.8; font-size: 14px;">Saldo Disponível</p>
        <div class="blue-amount" id="saldoCarteira">0</div>
        <p style="margin: 5px 0 0 0; font-size: 12px; color: #00BFFF;">BLUE COINS</p>
    </div>
    <button class="btn-action" style="background: var(--green);" onclick="comprar('BLUE COINS', 'PIX')"><i class="fas fa-plus-circle"></i> RECARREGAR BLUES</button>
    <button class="btn-action" style="background: var(--gray); margin-top: 15px;" onclick="fecharTelas()">FECHAR</button>
</div>

<div id="telaPostar" class="tela-full">
    <h3>NOVA TROCA</h3>
    <label class="file-label" for="postFoto"><i class="fas fa-camera"></i> Escolher Foto</label>
    <input type="file" id="postFoto" accept="image/*" style="display:none;" onchange="prepararPost(this)">
    <img id="previewPost" style="width:100%; display:none; border-radius:10px; margin-bottom:10px;">
    <button class="btn-action" onclick="publicarPost()">POSTAR</button>
    <button class="btn-action" style="background:var(--gray);" onclick="fecharTelas()">CANCELAR</button>
</div>

<div id="telaChat" class="tela-full">
    <h3 id="chatTitulo">Negociação</h3>
    <div id="chatConteudo">
        <div id="mensagensChat"></div>
        <div style="display:flex; gap:5px; padding:10px;">
            <input type="text" id="msgInput" placeholder="Digite sua proposta..." style="flex-grow:1; padding:10px; border-radius:5px; border:none;">
            <button onclick="enviarMensagem()" style="background:var(--blue); border:none; color:white; padding:10px; border-radius:5px;"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>
    <button class="btn-action" style="background:var(--gray);" onclick="fecharTelas()">VOLTAR</button>
</div>

<div id="telaCriarLeilao" class="tela-full">
    <h3 style="color: var(--gold); text-align: center;"><i class="fas fa-gavel"></i> INICIAR LEILÃO</h3>
    <input type="text" id="leilaoItem" placeholder="Nome do Item" class="input-leilao" style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px; border:1px solid #ddd; box-sizing:border-box; color:black;">
    <input type="number" id="leilaoValor" placeholder="Valor Inicial" class="input-leilao" style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px; border:1px solid #ddd; box-sizing:border-box; color:black;">
    <label class="file-label" for="leilaoFoto"><i class="fas fa-camera"></i> Foto do Item</label>
    <input type="file" id="leilaoFoto" accept="image/*" style="display:none;" onchange="prepararFotoLeilao(this)">
    <img id="previewFotoLeilao" style="width:100%; display:none; border-radius:10px; margin-bottom:15px;">
    <button class="btn-action" style="background:var(--gold); color:black;" onclick="publicarLeilao()">PUBLICAR</button>
    <button class="btn-action" style="background:var(--gray);" onclick="fecharTelas()">CANCELAR</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, update, set, push, get, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = { apiKey: "AIzaSyDM5M1_O-wfcBDGYJIiYgiHVbqhiKC-0dw", databaseURL: "https://icek-9cdd7-default-rtdb.firebaseio.com", projectId: "icek-9cdd7" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    window.user = null;
    window.targetUid = null;
    let fotoPostBase64 = null;
    let fotoLeilaoBase64 = null;
    let chatAtivoId = null;

    // --- LOGIN ---
    window.fazerLogin = async () => {
        const u = document.getElementById('userIn').value.trim();
        const p = document.getElementById('passIn').value;
        if(!u || !p) return alert("Preencha tudo!");

        if(u.toUpperCase() === "ADM" && p === "1533") {
            const m = { nome: "MASTER ADM1", cargo: "ADM1", uid: "master_ice", moedasBlue: 22000000 };
            await set(ref(db, `usuarios/master_ice`), m);
            localStorage.setItem('ice_user', JSON.stringify(m));
            window.user = m;
            location.reload();
            return;
        }

        const email = u.includes('@') ? u : u + "@ice.com";
        try { 
            await signInWithEmailAndPassword(auth, email, p); 
        } catch (e) { 
            try {
                const res = await createUserWithEmailAndPassword(auth, email, p);
                const novo = { nome: u, cargo: 'user', uid: res.user.uid, moedasBlue: 0 };
                await set(ref(db, `usuarios/${res.user.uid}`), novo);
            } catch (err) { alert("Erro: " + err.message); }
        }
    };

    onAuthStateChanged(auth, async (u) => {
        if(u) {
            onValue(ref(db, `usuarios/${u.uid}`), (s) => {
                window.user = s.val();
                if(window.user) {
                    document.getElementById('saldoCarteira').innerText = window.user.moedasBlue || 0;
                    iniciarApp();
                }
            });
        } else {
            const local = localStorage.getItem('ice_user');
            if(local) { window.user = JSON.parse(local); iniciarApp(); }
        }
    });

    function iniciarApp() {
        document.getElementById('telaLogin').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        document.getElementById('menuFlutuante').style.display = 'flex';
        carregarFeeds();
    }

    // --- FEEDS ---
    function carregarFeeds() {
        onValue(ref(db, 'leiloes'), snap => {
            const div = document.getElementById('feed-leiloes'); div.innerHTML = "";
            snap.forEach(l => {
                const le = l.val();
                div.innerHTML = `
                <div class="card-leilao">
                    ${!le.ativo ? '<div class="leilao-encerrado">ARREMATADO</div>' : ''}
                    <img src="${le.imagem}">
                    <div class="info-leilao">
                        <small>Leilão de ${le.criadorNome}</small>
                        <h3>${le.item}</h3>
                        <div class="valor-lance">R$ ${le.lanceAtual}</div>
                        ${le.ativo ? `<button class="btn-lance" onclick="window.darLance('${l.key}', ${le.lanceAtual})">LANCE + R$ 50</button>` : ''}
                    </div>
                </div>` + div.innerHTML;
            });
        });

        onValue(ref(db, 'posts'), snap => {
            const div = document.getElementById('feed'); div.innerHTML = "";
            snap.forEach(p => {
                const pt = p.val();
                // ADICIONADO: Lógica para exibir o botão de apagar post para o dono ou ADM1
                const podeApagar = window.user && (window.user.uid === pt.uid || window.user.cargo === 'ADM1');
                const btnApagar = podeApagar ? `<button class="btn-delete-post" onclick="window.apagarPost('${p.key}')"><i class="fas fa-trash"></i></button>` : '';

                div.innerHTML = `
                <div class="card-timeline">
                    ${btnApagar}
                    <img src="${pt.i1}" onclick="window.abrirPerfil('${pt.uid}')">
                    <div class="card-info">
                        <b>${pt.u1}</b>
                        <button class="btn-action" style="background:var(--sea);" onclick="window.abrirChat('${pt.uid}', '${pt.u1}')">NEGOCIAR</button>
                    </div>
                </div>` + div.innerHTML;
            });
        });
    }

    // ADICIONADO: Função para deletar o post no banco de dados
    window.apagarPost = async (pid) => {
        if(confirm("Deseja realmente apagar esta postagem?")) {
            await remove(ref(db, `posts/${pid}`));
            alert("Postagem apagada!");
        }
    };

    // --- CARTEIRA ---
    window.abrirCarteira = () => {
        document.getElementById('telaCarteira').style.display = 'block';
    };

    // --- AJUSTE DE BLUES (ADM) ---
    window.ajustarBlues = async (quantidade) => {
        const s = await get(ref(db, `usuarios/${window.targetUid}`));
        const val = s.val() || {};
        const atual = val.moedasBlue || 0;
        await update(ref(db, `usuarios/${window.targetUid}`), { moedasBlue: atual + quantidade });
        alert("Blues atualizados!");
        window.abrirPerfil(window.targetUid); 
    };

    // CORRIGIDO: Função Definir Blues agora lê o valor de forma segura e limpa o campo
    window.definirBlues = async () => {
        const inputElement = document.getElementById('valorPersonalizadoBlues');
        const val = parseInt(inputElement.value);
        if(isNaN(val)) return alert("Por favor, digite um número válido.");
        await update(ref(db, `usuarios/${window.targetUid}`), { moedasBlue: val });
        inputElement.value = ''; 
        alert("Saldo definido com sucesso!");
        window.abrirPerfil(window.targetUid); 
    };

    // --- FUNÇÕES GLOBAIS ---
    window.abrirPerfil = async (uid) => {
        const s = await get(ref(db, `usuarios/${uid}`));
        const t = s.val();
        const souEu = window.user.uid === uid;
        const ehMaster = window.user.cargo === 'ADM1';

        document.getElementById('perfilConteudo').innerHTML = `
            <img src="${t.foto || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" class="user-photo">
            <h2>${t.nome}</h2><p>${t.cargo}</p>
            <p style="color:var(--mod-blue); font-weight:bold;">Saldo: ${t.moedasBlue || 0} Blues</p>`;
        
        document.getElementById('painelStaffLeilao').style.display = (souEu && t.cargo !== 'user') ? 'block' : 'none';
        document.getElementById('painelAdmControle').style.display = (ehMaster && !souEu) ? 'block' : 'none';
        
        window.targetUid = uid;
        document.getElementById('telaPerfil').style.display = 'block';
    };

    window.abrirMeuPerfil = () => window.abrirPerfil(window.user.uid);
    window.fecharTelas = () => document.querySelectorAll('.tela-full').forEach(t => t.style.display = 'none');
    
    window.comprar = (tipo, valor) => {
        window.open(`https://wa.me/5511983602504?text=Quero comprar ${tipo} - Valor: ${valor}`);
    };

    window.abrirChat = (outroUid, outroNome) => {
        if(outroUid === window.user.uid) return alert("Você não pode negociar consigo mesmo!");
        chatAtivoId = window.user.uid < outroUid ? window.user.uid + outroUid : outroUid + window.user.uid;
        document.getElementById('chatTitulo').innerText = "Negociar com " + outroNome;
        document.getElementById('telaChat').style.display = 'block';
        
        onValue(ref(db, `chats/${chatAtivoId}`), snap => {
            const div = document.getElementById('mensagensChat'); div.innerHTML = "";
            snap.forEach(m => {
                const msg = m.val();
                const classe = msg.uid === window.user.uid ? 'msg-me' : 'msg-them';
                div.innerHTML += `<div class="msg ${classe}">${msg.texto}</div>`;
            });
            div.scrollTop = div.scrollHeight;
        });
    };

    window.enviarMensagem = async () => {
        const txt = document.getElementById('msgInput').value;
        if(!txt) return;
        await push(ref(db, `chats/${chatAtivoId}`), { uid: window.user.uid, texto: txt, time: Date.now() });
        document.getElementById('msgInput').value = "";
    };

    window.darLance = async (lid, atual) => {
        await update(ref(db, `leiloes/${lid}`), { lanceAtual: atual + 50, maiorLicitante: window.user.uid });
    };

    window.prepararPost = (input) => {
        const reader = new FileReader();
        reader.onload = e => { 
            fotoPostBase64 = e.target.result; 
            document.getElementById('previewPost').src = e.target.result;
            document.getElementById('previewPost').style.display = 'block';
        };
        if(input.files[0]) reader.readAsDataURL(input.files[0]);
    };

    window.publicarPost = async () => {
        if(!fotoPostBase64) return alert("Selecione uma foto!");
        await push(ref(db, 'posts'), { u1: window.user.nome, uid: window.user.uid, i1: fotoPostBase64, cargo: window.user.cargo });
        fecharTelas();
    };

    window.abrirPostar = () => document.getElementById('telaPostar').style.display = 'block';
    
    window.prepararFotoLeilao = (input) => {
        const reader = new FileReader();
        reader.onload = e => { 
            fotoLeilaoBase64 = e.target.result; 
            document.getElementById('previewFotoLeilao').src = e.target.result;
            document.getElementById('previewFotoLeilao').style.display = 'block';
        };
        if(input.files[0]) reader.readAsDataURL(input.files[0]);
    };

    window.publicarLeilao = async () => {
        const nomeItem = document.getElementById('leilaoItem').value.trim();
        const valorInicial = parseInt(document.getElementById('leilaoValor').value);

        if(!fotoLeilaoBase64) return alert("Selecione uma foto para o leilão!");
        if(!nomeItem || isNaN(valorInicial)) return alert("Preencha o nome do item e o valor inicial!");

        await push(ref(db, 'leiloes'), { 
            item: nomeItem, 
            valorInicial: valorInicial, 
            lanceAtual: valorInicial, 
            imagem: fotoLeilaoBase64, 
            criadorUid: window.user.uid, 
            criadorNome: window.user.nome,
            ativo: true,
            maiorLicitante: null
        });

        document.getElementById('leilaoItem').value = '';
        document.getElementById('leilaoValor').value = '';
        document.getElementById('previewFotoLeilao').style.display = 'none';
        fotoLeilaoBase64 = null;
        
        fecharTelas();
        alert("Leilão criado com sucesso!");
    };

    window.mudarCargo = async (novo) => {
        await update(ref(db, `usuarios/${window.targetUid}`), { cargo: novo });
        alert("Cargo alterado!");
        window.abrirPerfil(window.targetUid);
    };

</script>
</body>
</html>
