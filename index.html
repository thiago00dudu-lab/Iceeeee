<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICE TROCAS - Oficial</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        :root { --bg: #f4f7f9; --sea: #0f3452; --blue: #1877f2; --gold: #FFD700; --white: #fff; --green: #25d366; --red: #ff4d4d; }
        body { margin:0; font-family: sans-serif; background: var(--bg); padding-bottom: 90px; }
        header { padding:15px; background: var(--white); display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:100; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .wrap { max-width: 500px; margin: auto; padding: 15px; }
        
        /* CARDS E DUELOS */
        .card-timeline { background: var(--white); border-radius: 15px; overflow: hidden; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .card-timeline img { width: 100%; height: 320px; object-fit: cover; cursor: pointer; }
        
        .dupla-box { display: flex; gap: 10px; margin-top: 20px; position: relative; background: white; padding: 10px; border-radius: 12px; border: 1px solid #ddd; }
        .lado { flex: 1; text-align: center; }
        .lado img { width: 100%; height: 130px; object-fit: cover; border-radius: 8px; }
        .vs-circle { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); background: var(--sea); color: white; border-radius: 50%; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; font-size: 10px; border: 2px solid white; z-index: 5; }
        
        /* MENU RODAPÉ */
        .nav { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); background: var(--sea); display: flex; gap: 30px; padding: 12px 30px; border-radius: 40px; z-index: 3000; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .nav i { color: white; font-size: 22px; cursor: pointer; }

        /* TELAS */
        #telaPerfil, #telaChat, #telaFinanceiro { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 2000; overflow-y: auto; }
        #msgs { flex:1; overflow-y:auto; padding:15px; background:#e5ddd5; display:flex; flex-direction:column; gap: 10px; min-height: 75vh; }
        
        .bubble { padding: 10px; border-radius: 15px; max-width: 80%; font-size: 14px; }
        .mine { background: #dcf8c6; align-self: flex-end; }
        .other { background: white; align-self: flex-start; }

        /* FINANCEIRO */
        .card-financeiro { background: white; padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 15px; border: 1px solid #ddd; }
        .btn-compra { background: var(--sea); color: white; border: none; padding: 10px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-whats { background: var(--green); color: white; text-decoration: none; display: block; padding: 12px; border-radius: 8px; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div id="app">
    <header>
        <div><b>ICE TROCAS</b><br><small id="btcValue" style="color:var(--blue); font-weight: bold;"></small></div>
        <button onclick="location.reload()" style="border:none; background:none; color:red; font-weight:bold;">SAIR</button>
    </header>
    
    <div class="wrap" id="feed"></div>
    
    <div class="nav">
        <i class="fas fa-home" onclick="fecharTelas()"></i>
        <i class="fas fa-university" onclick="abrirFin()"></i>
        <i class="fas fa-wallet" onclick="abrirFin()"></i>
        <i class="fas fa-user-circle" onclick="abrirPerfil(window.user.nome)"></i>
    </div>
</div>

<div id="telaFinanceiro">
    <div class="wrap">
        <h2 style="text-align:center; color:var(--sea);">Loja de Cargos</h2>
        
        <div class="card-financeiro">
            <h3 style="margin:0;">Cargo: MODERADOR</h3>
            <p style="color: var(--green); font-size: 20px; font-weight: bold;">R$ 20,00</p>
            <p style="font-size: 12px; color: #666;">Poder de banir e editar publicações livres.</p>
            <button class="btn-compra" onclick="copyPix('20.00')">COPIAR PIX R$ 20</button>
        </div>

        <div class="card-financeiro">
            <h3 style="margin:0;">Cargo: ADM2</h3>
            <p style="color: var(--blue); font-size: 20px; font-weight: bold;">CONSULTAR SUPORTE</p>
            <p style="font-size: 12px; color: #666;">Gerenciamento total de moedas e usuários.</p>
            <button class="btn-compra" onclick="copyPix('Manual')">COPIAR CHAVE PIX</button>
        </div>

        <div style="background:white; padding:15px; border-radius:15px; text-align:center;">
            <p style="font-size:13px;">Chave: <b>thiago00dudu@gmail.com</b></p>
            <a href="https://wa.me/5511983602504?text=Enviei o Pix de 20 reais para Moderador!" class="btn-whats">
                <i class="fab fa-whatsapp"></i> ENVIAR COMPROVANTE
            </a>
            <button onclick="fecharTelas()" style="margin-top:20px; border:none; background:none; color:red;">Voltar ao App</button>
        </div>
    </div>
</div>

<div id="telaPerfil">
    <div style="height:140px; background:var(--sea);" id="pCapa">
        <button onclick="fecharTelas()" style="margin:10px; border:none; background:rgba(0,0,0,0.5); color:white; border-radius:50%; width:35px; height:35px;">←</button>
    </div>
    <div class="wrap" style="margin-top:-45px;">
        <div id="pAvatar" style="width:90px; height:90px; border-radius:50%; border:4px solid white; background:#eee no-repeat center/cover;"></div>
        <h2 id="perfNome" style="margin-bottom:0;"></h2>
        <p id="perfCargo" style="font-size:12px; color:var(--blue); margin-top:5px; font-weight:bold;"></p>
        <hr>
        <h4>Trocas Ativas</h4>
        <div id="perfilPosts"></div>
    </div>
</div>

<div id="telaChat" style="flex-direction:column;">
    <div style="background:var(--sea); color:white; padding:15px; display:flex; justify-content:space-between; align-items:center;">
        <button onclick="fecharTelas()" style="color:white; background:none; border:none; font-size:18px;">←</button>
        <b id="chatUser">Chat</b>
        <div style="width:20px;"></div>
    </div>
    <div id="msgs"></div>
    <div style="padding:15px; background:white; display:flex; gap:10px; align-items:center;">
        <label style="cursor:pointer; color:var(--sea); font-size:20px;">
            <i class="fas fa-image"></i>
            <input type="file" id="chatFile" accept="image/*,video/*" style="display:none;" onchange="enviarMidia()">
        </label>
        <input type="text" id="itxtMsg" placeholder="Sua mensagem..." style="flex:1; padding:12px; border-radius:20px; border:1px solid #ddd;">
        <button onclick="enviarMsg()" style="background:var(--blue); color:white; border:none; border-radius:50%; width:45px; height:45px;"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push, onValue, update, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = { apiKey: "AIzaSyDM5M1_O-wfcBDGYJIiYgiHVbqhiKC-0dw", databaseURL: "https://icek-9cdd7-default-rtdb.firebaseio.com", projectId: "icek-9cdd7" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let chatAtivoId = "";
    window.user = { nome: "Visitante", cargo: "USER" };

    // LÓGICA DE MOEDA ESTILO BTC
    function atualizarMoeda() {
        const estoqueTotal = 21000000; // Igual ao BTC
        const baseValor = 0.0001; 
        // Simulação: A cada segundo o valor sobe um pouquinho baseado no "estoque"
        let valorSimulado = (Math.random() * 1.5).toFixed(4);
        document.getElementById('btcValue').innerHTML = `<i class="fas fa-coins"></i> ICE: $${valorSimulado}`;
    }
    setInterval(atualizarMoeda, 3000);
    atualizarMoeda();

    // FEED
    onValue(ref(db, 'posts'), (snap) => {
        const f = document.getElementById('feed'); f.innerHTML = "";
        snap.forEach(c => {
            const p = c.val();
            const div = document.createElement('div');
            div.className = "card-timeline";
            div.innerHTML = `<img src="${p.i1}" onclick="abrirPerfil('${p.u1}')">
                <div style="padding:15px;"><b>${p.u1}</b><p style="font-size:12px; margin:5px 0;">${p.d1 || ''}</p></div>`;
            f.prepend(div);
        });
    });

    window.abrirPerfil = (nome) => {
        onValue(ref(db, 'usuarios/' + nome), (snap) => {
            const d = snap.val() || { nome: nome, cargo: "USER" };
            document.getElementById('perfNome').innerText = d.nome;
            document.getElementById('perfCargo').innerText = "Cargo: " + d.cargo;
            document.getElementById('pAvatar').style.backgroundImage = `url(${d.avatar || ''})`;
            
            const pBox = document.getElementById('perfilPosts'); pBox.innerHTML = "";
            onValue(ref(db, 'posts'), (postSnap) => {
                postSnap.forEach(c => {
                    const p = c.val();
                    if(p.u1 === nome){
                        const dDiv = document.createElement('div');
                        dDiv.className = "dupla-box";
                        dDiv.innerHTML = `<div class="lado"><img src="${p.i1}"></div>
                            <div class="vs-circle">VS</div>
                            <div class="lado" onclick="abrirChat('${nome}')">
                                ${p.i2 ? `<img src="${p.i2}">` : `<div style="padding-top:55px; color:var(--blue); font-size:11px; font-weight:bold;">OFERECER</div>`}
                            </div>
                            <button onclick="abrirChat('${nome}')" style="position:absolute; bottom:-15px; left:50%; transform:translateX(-50%); background:var(--green); color:white; border:none; padding:6px 15px; border-radius:20px; font-size:10px; font-weight:bold; cursor:pointer; width:80%;">CHAT DA TROCA</button>`;
                        dDiv.style.marginBottom = "35px";
                        pBox.prepend(dDiv);
                    }
                });
            }, { onlyOnce: true });
            document.getElementById('telaPerfil').style.display = 'block';
        }, { onlyOnce: true });
    };

    window.abrirChat = (outro) => {
        chatAtivoId = [window.user.nome, outro].sort().join("-");
        document.getElementById('chatUser').innerText = outro;
        document.getElementById('telaChat').style.display = 'flex';
        onValue(ref(db, `privado/${chatAtivoId}`), (snap) => {
            const box = document.getElementById('msgs'); box.innerHTML = "";
            snap.forEach(c => {
                const m = c.val();
                const d = document.createElement('div');
                d.className = `bubble ${m.u === window.user.nome ? 'mine' : 'other'}`;
                let content = m.t ? `<div>${m.t}</div>` : "";
                if(m.type === "img") content += `<img src="${m.url}" style="width:100%; border-radius:10px;">`;
                if(m.type === "vid") content += `<video src="${m.url}" controls style="width:100%; border-radius:10px;"></video>`;
                d.innerHTML = content;
                box.appendChild(d);
            });
            box.scrollTop = box.scrollHeight;
        });
    };

    window.enviarMsg = () => {
        const t = document.getElementById('itxtMsg').value;
        if(!t) return;
        push(ref(db, `privado/${chatAtivoId}`), { u: window.user.nome, t: t });
        document.getElementById('itxtMsg').value = "";
    };

    window.enviarMidia = () => {
        const file = document.getElementById('chatFile').files[0];
        if(!file) return;
        const r = new FileReader();
        r.onload = (e) => {
            const type = file.type.includes('image') ? 'img' : 'vid';
            push(ref(db, `privado/${chatAtivoId}`), { u: window.user.nome, url: e.target.result, type: type });
        };
        r.readAsDataURL(file);
    };

    window.copyPix = (val) => {
        navigator.clipboard.writeText("thiago00dudu@gmail.com");
        alert("Chave Copiada! Pague R$ " + val + " e mande o comprovante.");
    };

    window.abrirFin = () => { fecharTelas(); document.getElementById('telaFinanceiro').style.display = 'block'; };
    window.fecharTelas = () => { document.querySelectorAll('#telaPerfil, #telaChat, #telaFinanceiro').forEach(t => t.style.display = 'none'); };
</script>
</body>
</html>
