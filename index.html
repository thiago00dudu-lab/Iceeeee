<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICE</title>

<style>
body{
margin:0;
font-family:Arial;
background:#07131f;
color:white;
}

header{
padding:15px;
background:#0c2031;
border-bottom:1px solid #294861;
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
z-index:20;
}

h1{
margin:0;
font-size:22px;
}

.wrap{
max-width:900px;
margin:auto;
padding:15px;
padding-bottom:90px;
}

.card{
background:#0d1e31;
padding:15px;
border-radius:12px;
margin-bottom:15px;
border:1px solid #294861;
}

input,textarea{
width:100%;
padding:10px;
margin:5px 0;
background:#081521;
border:1px solid #294861;
color:white;
border-radius:8px;
box-sizing:border-box;
}

button{
padding:10px 15px;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:5px;
}

.btn{
background:#67d7ff;
color:#001320;
font-weight:bold;
}

.btn-danger{
background:#ff6b6b;
color:white;
}

.btn-ok{
background:#1dd1a1;
color:#001a14;
}

.btn-alt{
background:#1a3046;
color:white;
border:1px solid #31526d;
}

.timeline-post{
background:#10253b;
padding:12px;
border-radius:10px;
margin-bottom:10px;
cursor:pointer;
border:1px solid #294861;
}

.timeline-post img{
width:100%;
border-radius:10px;
margin-top:8px;
max-height:280px;
object-fit:cover;
}

.star-admin{
color:#ffd700;
font-size:18px;
text-shadow:0 0 8px #ffd700,0 0 18px rgba(255,215,0,.9);
font-weight:bold;
}

.star-mod{
color:#00eaff;
font-size:18px;
text-shadow:0 0 8px #00eaff,0 0 18px rgba(0,234,255,.8);
font-weight:bold;
}

.star-user{
color:#4a7fa0;
opacity:.4;
font-size:18px;
font-weight:bold;
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.8);
display:none;
justify-content:center;
align-items:center;
padding:20px;
z-index:50;
}

.modal-content{
background:#0d1e31;
padding:15px;
border-radius:12px;
width:100%;
max-width:900px;
max-height:90vh;
overflow:auto;
border:1px solid #294861;
}

.profile-cover{
height:160px;
background:#24445f;
border-radius:10px;
margin-bottom:10px;
overflow:hidden;
}

.profile-cover img{
width:100%;
height:100%;
object-fit:cover;
}

.profile-avatar{
width:80px;
height:80px;
border-radius:50%;
background:#274b69;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
margin-top:-40px;
border:3px solid #0d1e31;
overflow:hidden;
}

.profile-avatar img{
width:100%;
height:100%;
object-fit:cover;
}

.nav{
position:fixed;
bottom:10px;
left:10px;
right:10px;
display:flex;
gap:10px;
z-index:30;
}

.nav button{
flex:1;
background:#0d1e31;
color:white;
border:1px solid #31526d;
}

.promo{
position:fixed;
bottom:80px;
left:50%;
transform:translateX(-50%);
background:#163047;
padding:12px 20px;
border-radius:10px;
border:1px solid #4f7aa0;
display:none;
z-index:40;
text-align:center;
max-width:92vw;
}

.split{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

@media(max-width:700px){
.split{
grid-template-columns:1fr;
}
}

.trade-box{
background:#10253b;
padding:12px;
border-radius:10px;
border:1px solid #294861;
}

.trade-box img{
width:100%;
border-radius:10px;
margin-top:8px;
max-height:250px;
object-fit:cover;
}

.chat-box{
background:#081521;
border:1px solid #294861;
border-radius:10px;
padding:10px;
max-height:250px;
overflow:auto;
margin-bottom:10px;
}

.chat-msg{
background:#14314d;
padding:8px 10px;
border-radius:8px;
margin-bottom:8px;
}

.chat-msg.me{
background:#0f5a67;
}

.badge{
display:inline-block;
padding:5px 10px;
border-radius:999px;
background:#173149;
border:1px solid #34556e;
font-size:12px;
margin-right:6px;
margin-top:6px;
}

.small{
font-size:12px;
opacity:.8;
}

.profile-actions{
display:flex;
gap:10px;
flex-wrap:wrap;
margin:10px 0;
}

.post-mini{
background:#10253b;
padding:10px;
border-radius:10px;
margin-top:8px;
border:1px solid #294861;
}

.post-mini img{
width:100%;
border-radius:10px;
margin-top:8px;
max-height:220px;
object-fit:cover;
}
</style>
</head>

<body>

<header>
<h1>ICE</h1>
<div id="status">Não logado</div>
</header>

<div class="promo" id="promoBox">
Suporte Ice, compra de moderação, <b>11983602504</b>
</div>

<div class="wrap">

<div class="card">
<h3>Login</h3>
<input id="user" placeholder="Usuário">
<input id="pass" type="password" placeholder="Senha">
<button class="btn" onclick="login()">Entrar</button>
</div>

<div class="card">
<h3>Publicar troca</h3>
<input id="titulo" placeholder="Nome do item">
<textarea id="desc" placeholder="Descrição"></textarea>
<input type="file" id="foto" accept="image/*,video/*">
<button class="btn" onclick="publicar()">Publicar</button>
</div>

<div class="card">
<h3>Timeline</h3>
<div id="timeline"></div>
</div>

</div>

<div class="nav">
<button onclick="minhasTrocas()">Trocas</button>
<button onclick="abrirPerfil(usuario?.nome)">Perfil</button>
</div>

<!-- Perfil -->
<div class="modal" id="perfilModal">
  <div class="modal-content">
    <div id="perfilBody"></div>
    <button class="btn-alt" onclick="fecharPerfil()">Fechar</button>
  </div>
</div>

<!-- Troca dupla -->
<div class="modal" id="trocaModal">
  <div class="modal-content">
    <h3>Troca</h3>

    <div class="split">
      <div class="trade-box">
        <h4>Postagem original</h4>
        <div id="tradeOriginal"></div>
      </div>

      <div class="trade-box">
        <h4>Sua proposta</h4>
        <input id="propTitulo" placeholder="Nome do item que você oferece">
        <textarea id="propDesc" placeholder="Descrição da sua proposta"></textarea>
        <input type="file" id="propFoto" accept="image/*,video/*">
        <button class="btn" onclick="enviarProposta()">Enviar proposta</button>
      </div>
    </div>

    <div class="card" style="margin-top:12px">
      <h4>Propostas recebidas</h4>
      <div id="listaPropostas">Nenhuma proposta ainda.</div>
    </div>

    <button class="btn-alt" onclick="fecharTroca()">Fechar</button>
  </div>
</div>

<!-- Chat -->
<div class="modal" id="chatModal">
  <div class="modal-content">
    <h3>Chat privado</h3>
    <div id="chatInfo" class="small"></div>
    <div id="chatMensagens" class="chat-box"></div>
    <input id="chatInput" placeholder="Digite sua mensagem">
    <button class="btn" onclick="enviarMensagem()">Enviar</button>
    <button class="btn-alt" onclick="fecharChat()">Fechar</button>
  </div>
</div>

<script>
let usuario = null

let usuarios = JSON.parse(localStorage.getItem("usuarios") || "{}")
let posts = JSON.parse(localStorage.getItem("posts") || "[]")
let propostas = JSON.parse(localStorage.getItem("propostas") || "[]")
let chats = JSON.parse(localStorage.getItem("chats") || "[]")

let trocaAtual = null
let chatAtual = null

function salvar(){
  localStorage.setItem("usuarios", JSON.stringify(usuarios))
  localStorage.setItem("posts", JSON.stringify(posts))
  localStorage.setItem("propostas", JSON.stringify(propostas))
  localStorage.setItem("chats", JSON.stringify(chats))
}

function garantirUser(nome){
  if(!nome) return
  if(!usuarios[nome]){
    usuarios[nome] = {
      nome:nome,
      tipo:"normal",
      bio:"",
      foto:"",
      capa:"",
      bloqueado:false
    }
  }
}

function login(){
  let u = document.getElementById("user").value.trim()
  let p = document.getElementById("pass").value.trim()
  if(!u) return alert("Digite um usuário")

  garantirUser(u)

  if(u === "ADM" && p === "1533"){
    usuarios[u].tipo = "admin"
    usuario = { nome:u, tipo:"admin" }
  } else {
    usuario = { nome:u, tipo:usuarios[u].tipo || "normal" }
  }

  salvar()
  status()
  renderTimeline()
}

function status(){
  if(!usuario){
    document.getElementById("status").innerText = "Não logado"
    return
  }
  document.getElementById("status").innerHTML = nomeExibicao(usuario.nome)
}

function nomeExibicao(nome){
  garantirUser(nome)
  let u = usuarios[nome]

  if(u.tipo === "admin") return `<span class="star-admin">★</span> ${nome}`
  if(u.tipo === "mod") return `<span class="star-mod">★</span> ${nome}`

  return `<span class="star-user">★</span> ${nome}`
}

function publicar(){
  if(!usuario) return alert("login primeiro")
  if(usuarios[usuario.nome].bloqueado) return alert("Seu usuário está bloqueado")

  let titulo = document.getElementById("titulo").value.trim()
  let desc = document.getElementById("desc").value.trim()
  let file = document.getElementById("foto").files[0]

  if(!titulo || !desc) return alert("Preencha título e descrição")

  let post = {
    id: Date.now().toString(),
    titulo,
    desc,
    dono: usuario.nome,
    img: "",
    data: new Date().toLocaleString()
  }

  const finalizar = ()=>{
    posts.unshift(post)
    salvar()
    renderTimeline()
    document.getElementById("titulo").value = ""
    document.getElementById("desc").value = ""
    document.getElementById("foto").value = ""
  }

  if(file){
    let r = new FileReader()
    r.onload = e=>{
      post.img = e.target.result
      finalizar()
    }
    r.readAsDataURL(file)
  } else {
    finalizar()
  }
}

function renderTimeline(){
  let t = document.getElementById("timeline")
  t.innerHTML = ""

  posts.forEach(p=>{
    if(usuarios[p.dono] && usuarios[p.dono].oculto) return

    let div = document.createElement("div")
    div.className = "timeline-post"
    div.onclick = ()=>abrirTroca(p.id)

    div.innerHTML = `
      <b>${p.titulo}</b><br>
      ${p.desc}<br>
      <small>${nomeExibicao(p.dono)} • ${p.data}</small><br>
      <button onclick="event.stopPropagation();abrirPerfil('${p.dono}')">Ver perfil</button>
      ${p.img ? `<img src="${p.img}">` : ""}
    `
    t.appendChild(div)
  })
}

function minhasTrocas(){
  if(!usuario) return alert("Faça login primeiro")

  let t = document.getElementById("timeline")
  t.innerHTML = ""

  let minhas = posts.filter(p=>p.dono === usuario.nome)

  if(minhas.length === 0){
    t.innerHTML = `<div class="small">Você ainda não tem postagens de troca.</div>`
    return
  }

  minhas.forEach(p=>{
    let div = document.createElement("div")
    div.className = "timeline-post"
    div.onclick = ()=>abrirTroca(p.id)
    div.innerHTML = `
      <b>${p.titulo}</b><br>
      ${p.desc}<br>
      <small>${nomeExibicao(p.dono)} • ${p.data}</small>
      ${p.img ? `<img src="${p.img}">` : ""}
    `
    t.appendChild(div)
  })
}

function abrirPerfil(nome){
  if(!nome) return alert("Faça login primeiro")

  garantirUser(nome)
  let u = usuarios[nome]
  let postsUser = posts.filter(p=>p.dono === nome)

  let html = `
    <div class="profile-cover">
      ${u.capa ? `<img src="${u.capa}">` : ""}
    </div>

    <div class="profile-avatar">
      ${u.foto ? `<img src="${u.foto}">` : nome[0]}
    </div>

    <h2>${nomeExibicao(nome)}</h2>

    <div class="small">Perfil do usuário</div>

    <textarea id="bioInput">${u.bio || ""}</textarea>
    ${usuario && usuario.nome === nome ? `<button class="btn" onclick="salvarBio('${nome}')">Salvar bio</button>` : ""}

    <div class="profile-actions">
  `

  if(usuario?.nome === "ADM" && nome !== "ADM"){
    if(u.tipo !== "mod"){
      html += `<button class="btn-ok" onclick="tornarModerador('${nome}')"><span class="star-user">★</span> Tornar moderador</button>`
    } else {
      html += `<span class="badge"><span class="star-mod">★</span> Moderador ativo</span>`
    }

    html += `<button class="btn-danger" onclick="bloquear('${nome}')">Bloquear</button>`
  }

  if(usuario?.tipo === "mod" && usuarios[nome].tipo === "normal" && nome !== usuario.nome){
    html += `<button class="btn-danger" onclick="bloquear('${nome}')">Bloquear</button>`
  }

  html += `</div>`

  html += `<div class="card"><h4>Postagens</h4>`

  if(postsUser.length){
    postsUser.forEach(p=>{
      html += `
        <div class="post-mini">
          <b>${p.titulo}</b><br>
          ${p.desc}<br>
          <small>${p.data}</small>
          ${p.img ? `<img src="${p.img}">` : ""}
        </div>
      `
    })
  } else {
    html += `<div class="small">Sem postagens ainda.</div>`
  }

  html += `</div>`

  document.getElementById("perfilBody").innerHTML = html
  document.getElementById("perfilModal").style.display = "flex"
}

function fecharPerfil(){
  document.getElementById("perfilModal").style.display = "none"
}

function salvarBio(nome){
  usuarios[nome].bio = document.getElementById("bioInput").value
  salvar()
  abrirPerfil(nome)
}

function tornarModerador(nome){
  if(usuario?.nome !== "ADM") return alert("Só o ADM pode fazer isso")
  if(nome === "ADM") return alert("ADM é intocável")

  garantirUser(nome)
  usuarios[nome].tipo = "mod"
  salvar()

  abrirPerfil(nome)
  renderTimeline()
  status()

  alert(nome + " agora é moderador")
}

function bloquear(nome){
  if(nome === "ADM") return alert("ADM é intocável")
  if(!usuario) return

  if(usuario.nome === "ADM"){
    usuarios[nome].bloqueado = true
    salvar()
    abrirPerfil(nome)
    alert("Usuário bloqueado")
    return
  }

  if(usuario.tipo === "mod"){
    if(usuarios[nome].tipo === "normal"){
      usuarios[nome].bloqueado = true
      salvar()
      abrirPerfil(nome)
      alert("Usuário bloqueado")
    } else {
      alert("Moderador só pode bloquear usuários normais")
    }
  }
}

function abrirTroca(id){
  if(!usuario) return alert("Faça login primeiro")
  if(usuarios[usuario.nome].bloqueado) return alert("Seu usuário está bloqueado")

  let post = posts.find(p=>String(p.id) === String(id))
  if(!post) return alert("Post não encontrado")

  trocaAtual = post

  document.getElementById("tradeOriginal").innerHTML = `
    <b>${post.titulo}</b><br>
    ${post.desc}<br>
    <small>${nomeExibicao(post.dono)} • ${post.data}</small>
    ${post.img ? `<img src="${post.img}">` : ""}
  `

  document.getElementById("propTitulo").value = ""
  document.getElementById("propDesc").value = ""
  document.getElementById("propFoto").value = ""

  renderPropostas()
  document.getElementById("trocaModal").style.display = "flex"
}

function fecharTroca(){
  document.getElementById("trocaModal").style.display = "none"
}

function enviarProposta(){
  if(!usuario || !trocaAtual) return
  if(usuario.nome === trocaAtual.dono) return alert("Você não pode propor no seu próprio item")

  let titulo = document.getElementById("propTitulo").value.trim()
  let desc = document.getElementById("propDesc").value.trim()
  let file = document.getElementById("propFoto").files[0]

  if(!titulo || !desc) return alert("Preencha a proposta")

  let prop = {
    id: "prop_" + Date.now(),
    postId: trocaAtual.id,
    autor: usuario.nome,
    donoPost: trocaAtual.dono,
    titulo,
    desc,
    img: "",
    status: "pendente"
  }

  const finalizar = ()=>{
    propostas.unshift(prop)
    salvar()
    renderPropostas()
    alert("Proposta enviada")
  }

  if(file){
    let r = new FileReader()
    r.onload = e=>{
      prop.img = e.target.result
      finalizar()
    }
    r.readAsDataURL(file)
  } else {
    finalizar()
  }
}

function renderPropostas(){
  let box = document.getElementById("listaPropostas")
  let lista = propostas.filter(p=>String(p.postId) === String(trocaAtual.id))

  if(lista.length === 0){
    box.innerHTML = "Nenhuma proposta ainda."
    return
  }

  box.innerHTML = ""

  lista.forEach(p=>{
    let div = document.createElement("div")
    div.className = "card"

    div.innerHTML = `
      <b>${p.titulo}</b><br>
      ${p.desc}<br>
      <small>${nomeExibicao(p.autor)}</small><br>
      <span class="badge">Status: ${p.status}</span>
      ${p.img ? `<img class="preview" src="${p.img}">` : ""}
      ${
        usuario && usuario.nome === trocaAtual.dono && p.status === "pendente"
        ? `<br><button class="btn-ok" onclick="aceitarProposta('${p.id}')">Aceitar troca</button>`
        : ""
      }
      ${
        usuario && (usuario.nome === p.autor || usuario.nome === trocaAtual.dono) && p.status === "aceita"
        ? `<br><button class="btn" onclick="abrirChat('${p.id}')">Abrir chat</button>`
        : ""
      }
    `
    box.appendChild(div)
  })
}

function aceitarProposta(id){
  let p = propostas.find(x=>x.id === id)
  if(!p) return

  p.status = "aceita"

  if(!chats.find(c=>c.propId === id)){
    chats.push({
      id: "chat_" + id,
      propId: id,
      users: [p.autor, p.donoPost],
      msgs: [
        {autor:"sistema", texto:"Troca aceita. Agora vocês podem conversar."}
      ]
    })
  }

  salvar()
  renderPropostas()
}

function abrirChat(propId){
  let c = chats.find(x=>x.propId === propId)
  if(!c || !c.users.includes(usuario.nome)) return alert("Chat privado")

  chatAtual = c
  document.getElementById("chatInfo").innerText = "Chat entre: " + c.users.join(" e ")
  renderMensagens()
  document.getElementById("chatModal").style.display = "flex"
}

function fecharChat(){
  document.getElementById("chatModal").style.display = "none"
}

function renderMensagens(){
  let box = document.getElementById("chatMensagens")
  box.innerHTML = ""

  if(!chatAtual) return

  chatAtual.msgs.forEach(m=>{
    let div = document.createElement("div")
    div.className = "chat-msg" + (m.autor === usuario.nome ? " me" : "")
    div.innerHTML = `<b>${m.autor}</b><br>${m.texto}`
    box.appendChild(div)
  })

  box.scrollTop = box.scrollHeight
}

function enviarMensagem(){
  let txt = document.getElementById("chatInput").value.trim()
  if(!txt || !chatAtual) return

  chatAtual.msgs.push({
    autor: usuario.nome,
    texto: txt
  })

  document.getElementById("chatInput").value = ""
  salvar()
  renderMensagens()
}

function promo(){
  let p = document.getElementById("promoBox")
  p.style.display = "block"
  setTimeout(()=>{
    p.style.display = "none"
  },7000)
}

setTimeout(promo,8000)
setInterval(promo,240000)

renderTimeline()
status()

</script>

</body>
</html>
