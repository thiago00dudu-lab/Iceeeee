<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="description" content="ICE TROCAS - Plataforma oficial de trocas.">
    <title>ICE TROCAS - Oficial</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    
    <style>
        :root { --bg: #0d1117; --sea: #0f3452; --blue: #1877f2; --gold: #FFD700; --white: #fff; --green: #25d366; --red: #ff4d4d; --mod-blue: #00BFFF; --gray: #30363d; }
        body { margin:0; font-family: sans-serif; background: var(--bg); color: white; padding-bottom: 90px; overflow-x: hidden; }
        
        /* Telas */
        #telaLogin { position: fixed; inset: 0; background: var(--sea); z-index: 5000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: white; padding: 30px; border-radius: 20px; width: 85%; max-width: 350px; text-align: center; color: black; }
        .login-box input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }

        header { padding:15px; background: #161b22; display:flex; justify-content:space-between; align-items:center; border-bottom: 1px solid #30363d; position: sticky; top:0; z-index:100; }
        .header-icons { display: flex; gap: 15px; align-items: center; }

        .card-timeline { background: #161b22; border-radius: 15px; overflow: hidden; margin: 15px; border: 1px solid #30363d; position: relative; }
        .card-timeline img { width: 100%; height: 320px; object-fit: cover; }
        .card-info { padding: 15px; }

        .nav { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); background: #161b22; border: 1px solid #30363d; display: flex; gap: 25px; padding: 12px 30px; border-radius: 40px; z-index: 3000; }
        .nav i { color: #8b949e; font-size: 22px; cursor: pointer; }
        .nav i.active { color: var(--blue); }

        .tela-full { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 2000; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .btn-action { background: var(--blue); color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; margin-top: 10px; cursor: pointer; }
        
        .grid-postagens { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-top: 15px; }
        .grid-postagens img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 5px; }

        .user-photo { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; border: 3px solid var(--blue); margin-bottom: 10px; background: #161b22; }
    </style>
</head>
<body>

<div id="telaLogin">
    <div class="login-box">
        <h2>ICE TROCAS</h2>
        <input type="text" id="userIn" placeholder="Seu Nome/Login">
        <input type="password" id="passIn" placeholder="Senha">
        <button class="btn-action" onclick="fazerLogin()">ENTRAR / CADASTRAR</button>
    </div>
</div>

<div id="app" style="display:none;">
    <header>
        <b>ICE TROCAS</b> 
        <div class="header-icons">
            <i class="fas fa-share-nodes" onclick="compartilharSite()" style="font-size:22px; color:var(--blue); cursor:pointer;"></i>
            <div onclick="abrirMeuPerfil()" style="position:relative; cursor:pointer;">
                <i class="fas fa-user-circle" style="font-size:26px; color:var(--white);"></i>
                <div id="balaoAlerta" style="position:absolute; top:-2px; right:-2px; background:red; width:10px; height:10px; border-radius:50%; display:none;"></div>
            </div>
        </div>
    </header>

    <div id="feed"></div>

    <div class="nav">
        <i class="fas fa-home active" onclick="fecharTelas()"></i>
        <i class="fas fa-plus-circle" onclick="abrirPostar()" style="color:var(--blue); font-size: 28px;"></i>
        <i class="fas fa-wallet" onclick="abrirCarteira()"></i>
    </div>
</div>

<div id="telaPerfil" class="tela-full">
    <div id="perfilConteudo" style="text-align:center;"></div>
    <h4>Minhas Postagens</h4>
    <div id="gridUser" class="grid-postagens"></div>
    <button class="btn-action" style="background:var(--gray); margin-top:20px;" onclick="fecharTelas()">VOLTAR</button>
</div>

<div id="telaPostar" class="tela-full">
    <h2>Nova Postagem</h2>
    <input type="file" id="filePost" accept="image/*" onchange="prepararFotoPost(this)">
    <input type="text" id="descPost" placeholder="O que você está trocando?" style="width:100%; padding:10px; margin-top:10px;">
    <button class="btn-action" onclick="enviarPost()">POSTAR AGORA</button>
    <button class="btn-action" style="background:none" onclick="fecharTelas()">CANCELAR</button>
</div>

<div id="telaCarteira" class="tela-full">
    <div style="background:var(--sea); padding:30px; border-radius:20px; text-align:center;">
        <p>Saldo BLUE</p>
        <h1 id="saldoBlue">0</h1>
    </div>
    <button class="btn-action" onclick="fecharTelas()">VOLTAR</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, set, push, get, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    // Configuração Firebase (Sua configuração original)
    const firebaseConfig = { 
        apiKey: "AIzaSyDM5M1_O-wfcBDGYJIiYgiHVbqhiKC-0dw", 
        databaseURL: "https://icek-9cdd7-default-rtdb.firebaseio.com", 
        projectId: "icek-9cdd7" 
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    window.user = null;
    let fotoPostBase64 = null;

    // --- FUNÇÃO COMPARTILHAR SITE ---
    window.compartilharSite = () => {
        const linkSite = "https://iceeeee.vercel.app/";
        if (navigator.share) {
            navigator.share({
                title: 'ICE TROCAS',
                text: 'Olha que top essa plataforma de trocas!',
                url: linkSite
            }).catch(console.error);
        } else {
            navigator.clipboard.writeText(linkSite);
            alert("Link do site copiado para a área de transferência!");
        }
    };

    // --- LOGIN ---
    window.fazerLogin = async () => {
        const u = document.getElementById('userIn').value.trim();
        const p = document.getElementById('passIn').value;
        if(!u || !p) return alert("Preencha tudo!");

        const emailFake = u.includes('@') ? u : u + "@ice.com";
        try {
            await signInWithEmailAndPassword(auth, emailFake, p);
        } catch (e) {
            try {
                const res = await createUserWithEmailAndPassword(auth, emailFake, p);
                const novoUser = { nome: u, cargo: 'user', uid: res.user.uid, moedasBlue: 0, foto: "", bio: "" };
                await set(ref(db, `usuarios/${res.user.uid}`), novoUser);
            } catch (err) { alert("Erro ao entrar: " + err.message); }
        }
    };

    onAuthStateChanged(auth, async (u) => {
        if (u) {
            const s = await get(ref(db, `usuarios/${u.uid}`));
            window.user = s.val();
            document.getElementById('telaLogin').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            carregarFeed();
        }
    });

    function carregarFeed() {
        onValue(ref(db, 'posts'), snap => {
            const f = document.getElementById('feed');
            f.innerHTML = "";
            snap.forEach(p => {
                const pt = p.val();
                f.innerHTML = `
                <div class="card-timeline">
                    <img src="${pt.i1}">
                    <div class="card-info">
                        <b>${pt.u1}</b><br>
                        <small>${pt.d1}</small>
                        <button class="btn-action">NEGOCIAR</button>
                    </div>
                </div>` + f.innerHTML;
            });
        });
    }

    window.abrirMeuPerfil = () => {
        const t = window.user;
        document.getElementById('telaPerfil').style.display = 'block';
        document.getElementById('perfilConteudo').innerHTML = `
            <img src="${t.foto || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" class="user-photo">
            <h2>${t.nome}</h2>
            <p>${t.bio || 'Sem biografia'}</p>
        `;
    };

    window.fecharTelas = () => {
        document.querySelectorAll('.tela-full').forEach(t => t.style.display = 'none');
    };

    window.abrirPostar = () => document.getElementById('telaPostar').style.display = 'block';
    window.abrirCarteira = () => {
        document.getElementById('telaCarteira').style.display = 'block';
        document.getElementById('saldoBlue').innerText = window.user.moedasBlue;
    };

    window.prepararFotoPost = (input) => {
        const reader = new FileReader();
        reader.onload = (e) => fotoPostBase64 = e.target.result;
        reader.readAsDataURL(input.files[0]);
    };

    window.enviarPost = async () => {
        if(!fotoPostBase64) return alert("Selecione uma foto!");
        const novo = { 
            uid: window.user.uid, 
            u1: window.user.nome, 
            d1: document.getElementById('descPost').value, 
            i1: fotoPostBase64, 
            t: Date.now() 
        };
        await push(ref(db, 'posts'), novo);
        fecharTelas();
    };

</script>
</body>
</html>
