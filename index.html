<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ICE TROCAS - Oficial</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        :root { --bg: #0d1117; --sea: #0f3452; --blue: #1877f2; --gold: #FFD700; --white: #fff; --green: #25d366; --red: #ff4d4d; --mod-blue: #00BFFF; --gray: #30363d; }
        body { margin:0; font-family: sans-serif; background: var(--bg); color: white; padding-bottom: 90px; overflow-x: hidden; }
        #telaLogin { position: fixed; inset: 0; background: var(--sea); z-index: 5000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: white; padding: 30px; border-radius: 20px; width: 85%; max-width: 350px; text-align: center; color: black; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .login-box input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
        .badge-star { font-size: 18px; margin-left: 5px; vertical-align: middle; }
        .star-mod { color: var(--mod-blue); } .star-adm2 { color: var(--red); } .star-adm1 { color: var(--gold); }
        .side-menu { position: fixed; right: 15px; top: 40%; display: flex; flex-direction: column; gap: 10px; z-index: 999; }
        .btn-float { width: 45px; height: 45px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; color: white; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3); font-size: 18px; }
        header { padding:15px; background: #161b22; display:flex; justify-content:space-between; align-items:center; border-bottom: 1px solid #30363d; position: sticky; top:0; z-index:100; }
        .card-timeline { background: #161b22; border-radius: 15px; overflow: hidden; margin: 15px; border: 1px solid #30363d; }
        .card-timeline img { width: 100%; height: 350px; object-fit: cover; background: #111; cursor: pointer; }
        .card-info { padding: 15px; }
        .nav { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); background: #161b22; border: 1px solid #30363d; display: flex; gap: 35px; padding: 12px 40px; border-radius: 40px; z-index: 3000; box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
        .nav i { color: #8b949e; font-size: 26px; cursor: pointer; }
        .tela-full { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 2000; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .btn-action { background: var(--blue); color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .user-photo { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 3px solid var(--blue); margin-bottom: 10px; }
        #mensagens { height: 60vh; overflow-y: auto; background: #161b22; border-radius: 15px; padding: 15px; border: 1px solid #30363d; margin-bottom: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg-bubble { padding: 10px 15px; border-radius: 15px; max-width: 80%; font-size: 14px; }
        .input-chat-area { display: flex; gap: 10px; position: sticky; bottom: 0; background: var(--bg); padding: 10px 0; }
    </style>
</head>
<body>

<div class="side-menu" id="menuFlutuante" style="display:none;">
    <button class="btn-float" style="background: var(--gold); color:black;" onclick="comprar('ADM1', 'R$ 22M')"><i class="fas fa-crown"></i></button>
    <button class="btn-float" style="background: var(--red);" onclick="comprar('ADM2', 'R$ 50')"><i class="fas fa-shield-alt"></i></button>
    <button class="btn-float" style="background: var(--mod-blue);" onclick="comprar('MOD', 'R$ 20')"><i class="fas fa-star"></i></button>
    <button class="btn-float" style="background: var(--green);" onclick="window.open('https://wa.me/5511983602504')"><i class="fab fa-whatsapp"></i></button>
</div>

<div id="telaLogin">
    <div class="login-box">
        <h2>ICE TROCAS</h2>
        <input type="text" id="userIn" placeholder="Nome de usuário">
        <input type="password" id="passIn" placeholder="Senha">
        <button class="btn-action" onclick="fazerLogin()">ENTRAR NO APP</button>
    </div>
</div>

<div id="app" style="display:none;">
    <header><b>ICE TROCAS</b> <i class="fas fa-user-circle" onclick="abrirPerfil(window.user.uid)" style="font-size:30px; color:var(--blue);"></i></header>
    <div id="feed"></div>
    <div class="nav">
        <i class="fas fa-home" onclick="fecharTelas()"></i>
        <i class="fas fa-plus-circle" onclick="abrirPostar()" style="color:var(--blue); font-size: 32px;"></i>
        <i class="fas fa-wallet" onclick="alert('Saldo: '+window.user.moedasBlue+' BLUE')"></i>
    </div>
</div>

<div id="telaPerfil" class="tela-full"><div id="perfilConteudo" style="text-align:center;"></div><div id="areaEditar" style="display:none; text-align:center;"><input type="file" id="fFoto" accept="image/*" style="display:none;" onchange="prepararFoto(this)"><label for="fFoto" style="color:var(--blue); cursor:pointer; font-weight:bold;">[ ALTERAR FOTO ]</label><button class="btn-action" onclick="salvarPerfil()">SALVAR</button></div><div id="painelMestre" style="display:none; border:2px solid var(--gold); padding:15px; border-radius:15px; margin-top:20px;"> <button class="btn-action" onclick="addMoedas()">ADICIONAR MOEDAS</button></div><button class="btn-action" style="background:var(--gray)" onclick="fecharTelas()">VOLTAR</button></div>

<div id="telaChat" class="tela-full"><h2 id="chatTitle">Negociação</h2><div id="mensagens"></div><div class="input-chat-area"><input type="text" id="msgIn" placeholder="Mensagem..."><button class="btn-action" style="width:auto;" onclick="enviarMsg()">ENVIAR</button></div><button class="btn-action" style="background:var(--gray)" onclick="fecharTelas()">SAIR</button></div>

<div id="telaPostar" class="tela-full"><h2>Nova Troca</h2><input type="file" id="fPost" accept="image/*" onchange="prepararFotoPost(this)"><input type="text" id="descPost" placeholder="O que está trocando?" style="width:100%; padding:15px; margin:15px 0; border-radius:10px; background:#161b22; color:white;"><button class="btn-action" onclick="enviarPost()">PUBLICAR</button><button class="btn-action" style="background:var(--red)" onclick="fecharTelas()">CANCELAR</button></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, update, set, push, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const config = { apiKey: "AIzaSyDM5M1_O-wfcBDGYJIiYgiHVbqhiKC-0dw", databaseURL: "https://icek-9cdd7-default-rtdb.firebaseio.com", projectId: "icek-9cdd7" };
    const app = initializeApp(config);
    const db = getDatabase(app);
    const auth = getAuth(app);
    let targetUid = null, base64Foto = "", base64Post = "", chatID = "";

    function getBadge(c) {
        if(c==='ADM1') return '<i class="fas fa-crown star-adm1 badge-star"></i>';
        if(c==='ADM2') return '<i class="fas fa-star star-adm2 badge-star"></i>';
        if(c==='MOD') return '<i class="fas fa-star star-mod badge-star"></i>';
        return '';
    }

    window.fazerLogin = async () => {
        const u = document.getElementById('userIn').value.trim();
        const p = document.getElementById('passIn').value;
        if(u.toUpperCase()==="ADM" && p==="1533"){
            const master = { nome: "THIAGO ICE", cargo: "ADM1", uid: "master_ice", moedasBlue: 1000000 };
            localStorage.setItem('ice_master', JSON.stringify(master));
            window.user = master; montarApp(); return;
        }
        const email = u.replace(/\s+/g, '') + "@ice.com";
        try { await signInWithEmailAndPassword(auth, email, p); } 
        catch(e) { 
            const res = await createUserWithEmailAndPassword(auth, email, p);
            await set(ref(db, 'usuarios/'+res.user.uid), { nome: u, cargo: 'user', uid: res.user.uid, moedasBlue: 0 });
        }
    };

    onAuthStateChanged(auth, async (u) => {
        const mS = localStorage.getItem('ice_master');
        if(mS) { window.user = JSON.parse(mS); montarApp(); }
        else if(u) { const s = await get(ref(db, 'usuarios/'+u.uid)); window.user = s.val(); montarApp(); }
    });

    function montarApp() {
        document.getElementById('telaLogin').style.display='none';
        document.getElementById('app').style.display='block';
        document.getElementById('menuFlutuante').style.display='flex';
        onValue(ref(db, 'posts'), snap => {
            const f = document.getElementById('feed'); f.innerHTML = "";
            snap.forEach(p => { 
                const pt = p.val();
                f.insertAdjacentHTML('afterbegin', `
                <div class="card-timeline">
                    <img src="${pt.foto}" onclick="abrirPerfil('${pt.uid}')">
                    <div class="card-info"><b>${pt.nome}</b> ${getBadge(pt.cargo)}<br><small>${pt.desc}</small>
                    <button class="btn-action" onclick="abrirChat('${pt.nome}', '${pt.uid}')">NEGOCIAR</button></div>
                </div>`);
            });
        });
    }

    window.abrirPerfil = async (uid) => {
        targetUid = uid;
        const s = await get(ref(db, 'usuarios/'+uid)); const t = s.val();
        document.getElementById('perfilConteudo').innerHTML = `<img src="${t.foto||'https://via.placeholder.com/120'}" class="user-photo"><h2>${t.nome} ${getBadge(t.cargo)}</h2>`;
        document.getElementById('areaEditar').style.display = (uid === window.user.uid) ? 'block' : 'none';
        document.getElementById('painelMestre').style.display = (window.user.cargo === 'ADM1') ? 'block' : 'none';
        document.getElementById('telaPerfil').style.display = 'block';
    };

    window.abrirChat = (nome, destUid) => {
        chatID = [window.user.uid, destUid].sort().join('_');
        document.getElementById('chatTitle').innerText = "Conversa com " + nome;
        document.getElementById('telaChat').style.display = 'block';
        onValue(ref(db, 'chats/'+chatID), snap => {
            const box = document.getElementById('mensagens'); box.innerHTML = "";
            snap.forEach(m => {
                const msg = m.val();
                box.innerHTML += `<div class="msg-bubble" style="align-self:${msg.id===window.user.uid?'flex-end':'flex-start'}; background:${msg.id===window.user.uid?'var(--blue)':'#333'};">${msg.txt}</div>`;
            });
        });
    };

    window.enviarMsg = async () => {
        const t = document.getElementById('msgIn').value;
        if(t) { await push(ref(db, 'chats/'+chatID), { id: window.user.uid, txt: t }); document.getElementById('msgIn').value = ""; }
    };

    window.prepararFoto = (i) => { const r = new FileReader(); r.onload=(e)=> base64Foto=e.target.result; r.readAsDataURL(i.files[0]); };
    window.salvarPerfil = async () => { if(base64Foto) await update(ref(db, 'usuarios/'+window.user.uid), {foto: base64Foto}); alert("Salvo!"); };
    window.prepararFotoPost = (i) => { const r = new FileReader(); r.onload=(e)=> base64Post=e.target.result; r.readAsDataURL(i.files[0]); };
    window.enviarPost = async () => {
        await push(ref(db, 'posts'), { uid: window.user.uid, nome: window.user.nome, cargo: window.user.cargo, foto: base64Post, desc: document.getElementById('descPost').value });
        fecharTelas();
    };

    window.addMoedas = async () => { 
        const q = prompt("Quantos BLUE?"); 
        if(q) { const s = await get(ref(db, 'usuarios/'+targetUid)); await update(ref(db, 'usuarios/'+targetUid), {moedasBlue: (s.val().moedasBlue || 0) + parseInt(q)}); }
    };
    
    window.fecharTelas = () => { document.querySelectorAll('.tela-full').forEach(t=>t.style.display='none'); };
    window.abrirPostar = () => document.getElementById('telaPostar').style.display='block';
    window.comprar = (c, v) => alert("PIX: thiago00dudu@gmail.com | Cargo: " + c);
</script>
</body>
</html>
