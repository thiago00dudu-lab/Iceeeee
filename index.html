<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ICE TROCAS - Oficial</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        :root { --bg: #0d1117; --sea: #0f3452; --blue: #1877f2; --gold: #FFD700; --white: #fff; --green: #25d366; --red: #ff4d4d; --mod-blue: #00BFFF; --gray: #30363d; }
        body { margin:0; font-family: sans-serif; background: var(--bg); color: white; padding-bottom: 90px; overflow-x: hidden; }
        
        /* LOGIN */
        #telaLogin { position: fixed; inset: 0; background: var(--sea); z-index: 5000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: white; padding: 30px; border-radius: 20px; width: 85%; max-width: 350px; text-align: center; color: black; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .login-box input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }

        /* ESTRELAS E ICONES */
        .badge-container { display: flex; flex-direction: column; align-items: flex-start; gap: 2px; }
        .badge-star { font-size: 14px; margin-bottom: 2px; display: flex; gap: 4px; align-items: center; }
        .star-mod { color: var(--mod-blue); }
        .star-adm2 { color: var(--red); }
        .star-adm1 { color: var(--gold); }

        /* MENU FLUTUANTE */
        .side-menu { position: fixed; right: 15px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 15px; z-index: 4000; }
        .btn-float { width: 45px; height: 45px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; color: white; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.4); font-size: 18px; transition: 0.3s; }
        
        /* FEED */
        header { padding:15px; background: #161b22; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:100; border-bottom: 1px solid #30363d; }
        .card-timeline { background: #161b22; border-radius: 15px; overflow: hidden; margin: 15px; border: 1px solid #30363d; }
        .card-timeline img { width: 100%; height: 320px; object-fit: cover; }
        .card-info { padding: 15px; }

        .nav { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); background: #161b22; border: 1px solid #30363d; display: flex; gap: 25px; padding: 12px 30px; border-radius: 40px; z-index: 3000; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .nav i { color: #8b949e; font-size: 22px; cursor: pointer; }
        .nav i.active { color: var(--blue); }

        .tela-full { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 2000; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .btn-action { background: var(--blue); color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; margin-top: 10px; cursor: pointer; }
        
        #chatBox { height: 60vh; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding: 10px; }
        .msg { padding: 10px; border-radius: 10px; max-width: 85%; }
        .msg-me { background: var(--blue); align-self: flex-end; }
        .msg-them { background: var(--gray); align-self: flex-start; }
        .grid-postagens { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-top: 15px; }
        .grid-postagens img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 5px; background: #161b22; }
    </style>
</head>
<body>

<div class="side-menu" id="menuFlutuante" style="display:none;">
    <button class="btn-float" style="background: var(--mod-blue);" onclick="instrucaoCompra('MOD', '20 Blues')"><i class="fas fa-star"></i></button>
    <button class="btn-float" style="background: var(--red);" onclick="instrucaoCompra('ADM2', '1000 Blues')"><i class="fas fa-crown"></i></button>
    <button class="btn-float" style="background: var(--gold); color:black;" onclick="verBolsa()"><i class="fas fa-chart-line"></i></button>
    <button class="btn-float" style="background: var(--green);" onclick="compartilharLink()"><i class="fas fa-share-alt"></i></button>
</div>

<div id="telaLogin">
    <div class="login-box">
        <h2>ICE TROCAS</h2>
        <input type="text" id="userIn" placeholder="E-mail">
        <input type="password" id="passIn" placeholder="Senha">
        <button class="btn-action" onclick="fazerLogin()">ENTRAR / CADASTRAR</button>
    </div>
</div>

<div id="app" style="display:none;">
    <header>
        <b>ICE TROCAS</b>
        <div onclick="abrirMeuPerfil()"><i class="fas fa-user-circle" style="font-size:26px; color:var(--blue);"></i></div>
    </header>
    <div id="feed"></div>
    <div class="nav">
        <i class="fas fa-home active" onclick="fecharTelas()"></i>
        <i class="fas fa-plus-circle" onclick="abrirPostar()" style="color:var(--blue); font-size: 28px;"></i>
        <i class="fas fa-wallet" onclick="abrirCarteira()"></i>
    </div>
</div>

<div id="telaPerfil" class="tela-full">
    <div id="perfilConteudo"></div>
    
    <div id="painelAdmControle" style="display:none; background:rgba(255,255,255,0.05); border:1px solid var(--gray); padding:15px; border-radius:15px; margin-top:15px;">
        <h4 id="admPanelTitle" style="margin:0 0 10px 0; text-align:center; font-size: 14px;">PAINEL DE CONTROLE</h4>
        
        <div id="areaCargos" style="display:none;">
            <p style="font-size:11px; color:#aaa; margin-bottom:5px;">Gerenciar Cargos:</p>
            <div style="display:flex; flex-wrap:wrap; gap:5px; margin-bottom:10px;">
                <button id="btnDarAdm1" class="btn-action" style="font-size:10px; width:48%; padding:8px; margin:0; background:var(--gold); color:black;" onclick="admAlterarCargo('ADM1')">DAR ADM1</button>
                <button id="btnDarAdm2" class="btn-action" style="font-size:10px; width:48%; padding:8px; margin:0; background:var(--red);" onclick="admAlterarCargo('ADM2')">DAR ADM2</button>
                <button id="btnDarMod" class="btn-action" style="font-size:10px; width:48%; padding:8px; margin:0; background:var(--mod-blue);" onclick="admAlterarCargo('MOD')">DAR MOD</button>
                <button class="btn-action" style="font-size:10px; width:48%; padding:8px; margin:0; background:#444;" onclick="admAlterarCargo('user')">REBAIXAR</button>
            </div>
        </div>

        <div id="areaMoedas" style="display:none;">
            <p style="font-size:11px; color:#aaa; margin-bottom:5px;">Economia (BLUE):</p>
            <div style="display:flex; gap:5px; margin-bottom:10px;">
                <button class="btn-action" style="font-size:10px; padding:8px; margin:0; background:var(--green);" onclick="admAdicionarSaldo()">+ MOEDAS</button>
                <button class="btn-action" style="font-size:10px; padding:8px; margin:0; background:var(--red);" onclick="admRetirarSaldo()">- MOEDAS</button>
            </div>
        </div>

        <div id="areaModeracao" style="display:none;">
            <p style="font-size:11px; color:#aaa; margin-bottom:5px;">Segurança:</p>
            <button class="btn-action" style="font-size:10px; padding:8px; margin:0; background:var(--red); width:100%;" onclick="admBanir()">BANIR USUÁRIO</button>
        </div>
    </div>

    <h4 style="margin:20px 0 10px 0; border-bottom:1px solid #30363d; padding-bottom:5px;">Postagens</h4>
    <div id="minhasPostagens" class="grid-postagens"></div>
    <button class="btn-action" style="background:var(--gray); margin-top:30px;" onclick="fecharTelas()">VOLTAR</button>
</div>

<div id="telaChat" class="tela-full">
    <h3 id="chatTitle">Chat</h3>
    <div id="chatBox"></div>
    <div style="display:flex; gap:8px; margin-top:10px;">
        <input type="text" id="msgIn" placeholder="Digite..." style="flex:1; padding:12px; border-radius:8px; border:none; background:#161b22; color:white;">
        <button onclick="enviarMensagem()" style="background:var(--blue); border:none; color:white; width:50px; border-radius:8px;"><i class="fas fa-paper-plane"></i></button>
    </div>
    <button class="btn-action" style="background:none" onclick="fecharTelas()">FECHAR</button>
</div>

<div id="telaCarteira" class="tela-full">
    <div style="background:linear-gradient(135deg, var(--sea), var(--blue)); padding:40px; border-radius:20px; text-align:center;">
        <p>Meu Saldo</p>
        <h1 id="saldoBlue">0</h1>
        <small>BLUE COINS</small>
        <p style="margin-top:20px; font-size:12px;">ID:<br><span id="userIdDisplay">---</span></p>
    </div>
    <button class="btn-action" style="margin-top:20px;" onclick="fecharTelas()">VOLTAR</button>
</div>

<div id="telaPostar" class="tela-full">
    <h2>Nova Troca</h2>
    <input type="file" id="filePost" accept="image/*">
    <input type="text" id="descPost" placeholder="O que quer trocar?" style="width:100%; padding:15px; margin-top:10px; background:#161b22; color:white; border:1px solid #30363d;">
    <button class="btn-action" onclick="enviarPost()">PUBLICAR</button>
    <button class="btn-action" style="background:none" onclick="fecharTelas()">CANCELAR</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, update, set, push, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = { apiKey: "AIzaSyDM5M1_O-wfcBDGYJIiYgiHVbqhiKC-0dw", databaseURL: "https://icek-9cdd7-default-rtdb.firebaseio.com", projectId: "icek-9cdd7" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    window.user = null;
    let targetUidGlobal = null;
    let chatAtivoId = null;

    function getBadge(cargo) {
        if(cargo === 'ADM1') return '<div class="badge-star star-adm1"><i class="fas fa-star"></i><i class="fas fa-crown"></i></div>';
        if(cargo === 'ADM2') return '<div class="badge-star star-adm2"><i class="fas fa-star"></i></div>';
        if(cargo === 'MOD') return '<div class="badge-star star-mod"><i class="fas fa-star"></i></div>';
        return '';
    }

    window.fazerLogin = async () => {
        const u = document.getElementById('userIn').value;
        const p = document.getElementById('passIn').value;
        if(u.toUpperCase() === "ADM" && p === "1533") {
            window.user = { nome: "ADM MASTER", cargo: "ADM1", uid: "master", moedasBlue: 1000000 };
            localStorage.setItem('ice_master', JSON.stringify(window.user));
            location.reload(); return;
        }
        try { await signInWithEmailAndPassword(auth, u, p); } catch (e) { 
            const res = await createUserWithEmailAndPassword(auth, u, p);
            // Novos usuários sempre começam com 0 moedas
            await set(ref(db, `usuarios/${res.user.uid}`), { nome: u.split('@')[0], cargo: 'user', uid: res.user.uid, moedasBlue: 0 });
        }
    };

    onAuthStateChanged(auth, async (u) => {
        const local = localStorage.getItem('ice_master');
        if (local) { window.user = JSON.parse(local); entrarNoApp(); } 
        else if (u) {
            const snap = await get(ref(db, `usuarios/${u.uid}`));
            window.user = snap.val();
            if(window.user && window.user.banido) { alert("Sua conta foi banida."); auth.signOut(); location.reload(); return; }
            entrarNoApp();
        }
    });

    function entrarNoApp() {
        document.getElementById('telaLogin').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        document.getElementById('menuFlutuante').style.display = 'flex';
        document.getElementById('userIdDisplay').innerText = window.user.uid;
        
        onValue(ref(db, 'posts'), snap => {
            const feed = document.getElementById('feed'); feed.innerHTML = "";
            snap.forEach(p => {
                const post = p.val();
                feed.innerHTML = `<div class="card-timeline">
                    <img src="${post.i1}" onclick="abrirPerfilAlheio('${post.uid}')">
                    <div class="card-info">
                        <div class="badge-container">${getBadge(post.cargo)}<b>${post.u1}</b></div>
                        <small>${post.d1}</small>
                        <button class="btn-action" onclick="abrirChat('${post.uid}', '${post.u1}')">NEGOCIAR</button>
                    </div>
                </div>` + feed.innerHTML;
            });
        });
        onValue(ref(db, `usuarios/${window.user.uid}`), s => { if(s.exists()){ window.user = s.val(); document.getElementById('saldoBlue').innerText = s.val().moedasBlue || 0; } });
    }

    window.abrirPerfilAlheio = async (uid) => {
        targetUidGlobal = uid;
        const snap = await get(ref(db, `usuarios/${uid}`));
        const t = snap.val();
        const eMeu = window.user.uid === uid;
        
        // --- LOGICA DO PAINEL DE CONTROLE ---
        const painel = document.getElementById('painelAdmControle');
        const areaCargos = document.getElementById('areaCargos');
        const areaMoedas = document.getElementById('areaMoedas');
        const areaModeracao = document.getElementById('areaModeracao');
        
        painel.style.display = 'none'; 
        areaCargos.style.display = 'none';
        areaMoedas.style.display = 'none';
        areaModeracao.style.display = 'none';

        // ADM1 É INTOCÁVEL (Ninguém mexe nele, exceto ele mesmo)
        const alvoEhAdm1 = t.cargo === 'ADM1';

        if(!eMeu && !alvoEhAdm1) {
            if(window.user.cargo === 'ADM1') {
                painel.style.display = 'block';
                areaCargos.style.display = 'block';
                areaMoedas.style.display = 'block';
                areaModeracao.style.display = 'block';
                document.getElementById('btnDarAdm1').style.display = 'inline-block';
                document.getElementById('admPanelTitle').innerHTML = "👑 PAINEL MASTER";
            } else if(window.user.cargo === 'ADM2') {
                painel.style.display = 'block';
                areaCargos.style.display = 'block';
                areaModeracao.style.display = 'block';
                document.getElementById('btnDarAdm1').style.display = 'none'; // ADM2 não dá ADM1
                document.getElementById('admPanelTitle').innerHTML = "🛡️ PAINEL ADM2";
            } else if(window.user.cargo === 'MOD') {
                painel.style.display = 'block';
                areaCargos.style.display = 'block'; // Apenas para subir moderador
                document.getElementById('btnDarAdm1').style.display = 'none';
                document.getElementById('btnDarAdm2').style.display = 'none';
                document.getElementById('admPanelTitle').innerHTML = "🔍 PAINEL MODERADOR";
            }
        }

        document.getElementById('perfilConteudo').innerHTML = `
            <div style="text-align:center; padding:20px;">
                <img src="${t.foto || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" style="width:100px; height:100px; border-radius:50%; border:3px solid var(--blue); object-fit:cover;">
                <div style="display:flex; flex-direction:column; align-items:center; margin-top:10px;">
                    ${getBadge(t.cargo)}
                    <h2 style="margin:0;">${t.nome}</h2>
                </div>
                <div style="display:flex; justify-content:space-around; margin:20px 0;">
                    <div><b>${t.moedasBlue || 0}</b><br><small>BLUE</small></div>
                    <div><b>${t.cargo || 'membro'}</b><br><small>RANK</small></div>
                </div>
            </div>`;

        const grid = document.getElementById('minhasPostagens'); grid.innerHTML = "";
        const allPosts = await get(ref(db, 'posts'));
        allPosts.forEach(p => { if(p.val().uid === uid) grid.innerHTML += `<img src="${p.val().i1}">`; });
        document.getElementById('telaPerfil').style.display = 'block';
    };

    // FUNÇÕES DE PODER
    window.admAlterarCargo = async (c) => {
        await update(ref(db, `usuarios/${targetUidGlobal}`), { cargo: c });
        alert("Cargo alterado!");
        abrirPerfilAlheio(targetUidGlobal);
    };

    window.admAdicionarSaldo = async () => {
        const v = prompt("Quanto adicionar?");
        if(!v) return;
        const s = await get(ref(db, `usuarios/${targetUidGlobal}`));
        await update(ref(db, `usuarios/${targetUidGlobal}`), { moedasBlue: (s.val().moedasBlue || 0) + parseInt(v) });
        abrirPerfilAlheio(targetUidGlobal);
    };

    window.admRetirarSaldo = async () => {
        const v = prompt("Quanto retirar?");
        if(!v) return;
        const s = await get(ref(db, `usuarios/${targetUidGlobal}`));
        await update(ref(db, `usuarios/${targetUidGlobal}`), { moedasBlue: Math.max(0, (s.val().moedasBlue || 0) - parseInt(v)) });
        abrirPerfilAlheio(targetUidGlobal);
    };

    window.admBanir = async () => {
        if(confirm("Banir este usuário permanentemente?")) {
            await update(ref(db, `usuarios/${targetUidGlobal}`), { banido: true });
            alert("Usuário Banido!");
            fecharTelas();
        }
    };

    // CHAT E POSTS (Mantidos conforme original)
    window.abrirChat = (uid, nome) => {
        chatAtivoId = [window.user.uid, uid].sort().join("_");
        document.getElementById('chatTitle').innerText = nome;
        document.getElementById('telaChat').style.display = 'block';
        onValue(ref(db, `chats/${chatAtivoId}`), s => {
            const b = document.getElementById('chatBox'); b.innerHTML = "";
            s.forEach(m => { const msg = m.val(); b.innerHTML += `<div class="msg ${msg.uid === window.user.uid ? 'msg-me':'msg-them'}"><b>${msg.u}:</b><br>${msg.t}</div>`; });
            b.scrollTop = b.scrollHeight;
        });
    };

    window.enviarMensagem = () => {
        const t = document.getElementById('msgIn').value;
        if(!t) return;
        push(ref(db, `chats/${chatAtivoId}`), { uid: window.user.uid, u: window.user.nome, t: t });
        document.getElementById('msgIn').value = "";
    };

    window.enviarPost = () => {
        const f = document.getElementById('filePost').files[0];
        const r = new FileReader();
        r.onload = (e) => {
            push(ref(db, 'posts'), { u1: window.user.nome, uid: window.user.uid, cargo: window.user.cargo, i1: e.target.result, d1: document.getElementById('descPost').value });
            fecharTelas();
        };
        r.readAsDataURL(f);
    };

    window.fecharTelas = () => { document.querySelectorAll('.tela-full').forEach(t=>t.style.display='none'); };
    window.abrirMeuPerfil = () => abrirPerfilAlheio(window.user.uid);
    window.abrirPostar = () => document.getElementById('telaPostar').style.display='block';
    window.abrirCarteira = () => document.getElementById('telaCarteira').style.display='block';
    window.verBolsa = () => alert("Market Cap Ice: R$ 22.000.000");
    window.compartilharLink = () => prompt("Seu link:", window.location.origin + "?ref=" + window.user.uid);
</script>
</body>
</html>
